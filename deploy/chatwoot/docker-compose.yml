# Chatwoot Self-Hosted — Spalla Integration
# Deploy: docker compose up -d
# Access: http://localhost:3000 (or your domain)
#
# After first run:
#   1. Create admin account at /app/login
#   2. Add WhatsApp inbox (Settings → Inboxes → Add)
#   3. Create webhook pointing to your Spalla backend:
#      URL: https://your-railway-url/api/webhooks/chatwoot
#      Events: message_created, conversation_created, conversation_status_changed
#   4. Set env vars on Railway:
#      CHATWOOT_BASE_URL=https://chat.yourdomain.com
#      CHATWOOT_API_TOKEN=<from Chatwoot Settings → API Access>
#      CHATWOOT_ACCOUNT_ID=1
#      CHATWOOT_WEBHOOK_SECRET=<from webhook config>

version: '3'

services:
  chatwoot-base: &chatwoot-base
    image: chatwoot/chatwoot:v4.12.1
    env_file: .env
    volumes:
      - chatwoot-storage:/app/storage
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis

  chatwoot-rails:
    <<: *chatwoot-base
    ports:
      - '3000:3000'
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production

  chatwoot-sidekiq:
    <<: *chatwoot-base
    command: bundle exec sidekiq -C config/sidekiq.yml

  chatwoot-postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${CW_POSTGRES_PASSWORD:-chatwoot_secret_change_me}
    volumes:
      - chatwoot-pgdata:/var/lib/postgresql/data
    ports:
      - '5433:5432'

  chatwoot-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${CW_REDIS_PASSWORD:-redis_secret_change_me}
    volumes:
      - chatwoot-redis:/data

volumes:
  chatwoot-storage:
  chatwoot-pgdata:
  chatwoot-redis:
