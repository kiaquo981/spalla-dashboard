<title>Banco de Postos Fixados + Destaques</title><style>
@import url("https://fonts.googleapis.com/css2?family=Open+Sauce+Sans:wght@300;400;500;600;700;800&display=swap");

.modal-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:600;color:var(--brand-700);margin:0}

.modal-section{margin-bottom:var(--sp-4)}

.form-tab{padding:var(--sp-2) var(--sp-4);font-size:var(--text-sm);font-weight:600;border:none;background:transparent;color:var(--cream-700);border-radius:var(--radius-full);cursor:pointer;font-family:var(--font-ui)}
.form-tab.active{background:white;color:var(--brand-700);box-shadow:var(--shadow-xs)}

.form-row{margin-bottom:var(--sp-4)}
.form-row label{display:block;font-size:var(--text-2xs);font-weight:700;color:var(--cream-700);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--sp-1)}
.form-row input,.form-row select,.form-row textarea{width:100%;font-family:var(--font-ui);font-size:var(--text-sm);padding:var(--sp-3);border:1px solid var(--neutral-200);border-radius:var(--radius-md);background:white;color:var(--neutral-800)}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(138,125,82,.12)}
.form-row textarea{resize:vertical;min-height:64px;font-family:var(--font-ui)}
.form-checks{display:flex;gap:var(--sp-4);flex-wrap:wrap}

.json-preview{font-family:ui-monospace,SF Mono,Monaco,Menlo,monospace;font-size:var(--text-xs);background:var(--neutral-800);color:#e5e3dc;padding:var(--sp-3);border-radius:var(--radius-md);max-height:240px;overflow:auto;white-space:pre-wrap;word-break:break-word;margin-top:var(--sp-3)}
.btn-primary{padding:var(--sp-2) var(--sp-4);font-size:var(--text-sm);font-weight:600;border-radius:var(--radius-md);border:none;background:var(--brand-700);color:white;cursor:pointer;font-family:var(--font-ui)}
.btn-primary:hover{background:var(--brand-900)}

.btn-accent:hover{background:var(--accent-700)}

</style></head><body>
<div class="container">
  <div class="header fade-in">
    <div>
      <h1 class="header-title">Postos Fixados + Destaques</h1>
    </div>
    <div class="header-meta">
      <div class="stat"><span class="stat-value">64</span><span class="stat-label">Fixados</span></div>
      <div class="stat"><span class="stat-value">511</span><span class="stat-label">Destaques</span></div>
      <div class="stat"><span class="stat-value">29</span><span class="stat-label">Perfis</span></div>
    </div>
  </div>

  <div class="tabs-main">
    <button class="tab-main active" data-mode="pinned">Postos Fixados</button>
    <button class="tab-main" data-mode="destaques">Destaques</button>
  </div>

  <div class="toolbar">
    <input type="search" class="input input-search" id="q" placeholder="Buscar perfil, título, caption...">
    <select class="select" id="trilha">
      <option value="">Todas trilhas</option>
      <option value="clinic">Clínica</option>
      <option value="scale">Scale</option>
    </select>
    <select class="select" id="tipo"><option value="">Todos tipos</option></select>
    <select class="select" id="origem">
      <option value="">Todas origens</option>
      <option value="benchmark_externo_clinic">Trilha Clínica</option>
      <option value="benchmark_externo_scale">Trilha Mentoria</option>
    </select>
    <button class="btn" id="reset">Limpar</button>
  </div>

  <div id="results"></div>

  <div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-player" id="modalPlayer"></div>
      <div class="modal-side">
        <div class="modal-head">
          <h3 class="modal-title" id="modalTitle">—</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <div class="footer">Captura automática dos perfis de referência · Atualização sob demanda.</div>
  
<button class="btn-add" onclick="openForm()">+ Adicionar referência</button>
<div class="modal-bg" id="modalForm" onclick="if(event.target===this)closeForm()">
  <div class="modal-form">
    <div class="modal-head">
      <h3 class="modal-title">Adicionar referência</h3>
      <button class="modal-close" onclick="closeForm()">×</button>
    </div>
    <div class="form-tabs">
      <button class="form-tab active" data-mode="perfil" onclick="setFormMode('perfil')">Perfil completo</button>
      <button class="form-tab" data-mode="publicacao" onclick="setFormMode('publicacao')">Publicação única</button>
    </div>
    <div class="form-body">
      <div id="formPerfil">
        <div class="form-row">
          <label>Username Instagram (sem @)</label>
          <input type="text" id="f_username" placeholder="ex: clinicavolpe" pattern="[a-zA-Z0-9._]+">
        </div>
        <div class="form-row">
          <label>Trilha</label>
          <select id="f_trilha">
            <option value="clinic">Clínica</option>
            <option value="scale">Mentoria</option>
          </select>
        </div>
        <div class="form-row">
          <label>O que coletar</label>
          <div class="form-checks">
            <label class="form-check"><input type="checkbox" id="f_fixados" checked>Posts fixados (top 3)</label>
            <label class="form-check"><input type="checkbox" id="f_destaques" checked>Destaques (capas + títulos)</label>
            <label class="form-check"><input type="checkbox" id="f_transcrever" checked>Transcrever vídeos fixados</label>
          </div>
        </div>
        <div class="form-row">
          <label>Notas (opcional)</label>
          <textarea id="f_notas_p" placeholder="Por que esse perfil é referência? Ex: dermato com prova social forte"></textarea>
        </div>
      </div>
      <div id="formPub" style="display:none">
        <div class="form-row">
          <label>URL completa do post/reel/IGTV</label>
          <input type="text" id="f_url" placeholder="https://www.instagram.com/p/SHORTCODE/">
        </div>
        <div class="form-row">
          <label>Trilha</label>
          <select id="f_trilha2">
            <option value="clinic">Clínica</option>
            <option value="scale">Mentoria</option>
          </select>
        </div>
        <div class="form-row">
          <label>Categoria estratégica (opcional — se não informar, classificação automática)</label>
          <select id="f_tipo_estrat">
            <option value="">Auto-classificar</option>
            <option value="Apresentação">Apresentação</option>
            <option value="Prova Social">Prova Social</option>
            <option value="Oferta/CTA">Oferta/CTA</option>
            <option value="Quem Sou">Quem Sou (destaque)</option>
            <option value="Resultados">Resultados (destaque)</option>
            <option value="Metodologia/Produto">Metodologia/Produto (destaque)</option>
            <option value="FAQ">FAQ (destaque)</option>
            <option value="Dicas Grátis">Dicas Grátis (destaque)</option>
            <option value="Bastidores">Bastidores (destaque)</option>
          </select>
        </div>
        <div class="form-row">
          <label>Etapa do funil (opcional)</label>
          <select id="f_etapa">
            <option value="">Auto</option>
            <option value="DESCOBERTA">DESCOBERTA</option>
            <option value="CONFIANCA">CONFIANÇA</option>
            <option value="ACAO">AÇÃO</option>
          </select>
        </div>
        <div class="form-row">
          <label>Notas (opcional)</label>
          <textarea id="f_notas_u" placeholder="Por que esta publicação é referência?"></textarea>
        </div>
      </div>
      <div id="jsonOut" style="display:none">
        <label style="display:block;font-size:var(--text-2xs);font-weight:700;color:var(--cream-700);text-transform:uppercase;letter-spacing:.08em;margin-top:var(--sp-4)">JSON gerado</label>
        <div class="json-preview" id="jsonPreview"></div>
      </div>
    </div>
    <div class="form-foot">
      <span style="font-size:var(--text-xs);color:var(--cream-700)">JSON entra na fila do n8n</span>
      <div style="display:flex;gap:var(--sp-2)">
        <button class="btn" onclick="generateJson()">Gerar JSON</button>
        <button class="btn btn-primary" id="btnCopy" onclick="copyJson()" disabled>Copiar</button>
        <button class="btn btn-accent" id="btnDownload" onclick="downloadJson()" disabled>Baixar</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast">Copiado</div>

</div>

<script>

let FORM_MODE = 'perfil';
let LAST_JSON = null;
function openForm() { document.getElementById('modalForm').classList.add('open'); }
function closeForm() { document.getElementById('modalForm').classList.remove('open'); }
function setFormMode(m) {
  FORM_MODE = m;
  document.querySelectorAll('.form-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  document.getElementById('formPerfil').style.display = m === 'perfil' ? 'block' : 'none';
  document.getElementById('formPub').style.display = m === 'publicacao' ? 'block' : 'none';
}
function shortFromUrl(u) { const m = (u||'').match(/\/(?:p|reel|reels|tv)\/([A-Za-z0-9_-]+)/); return m ? m[1] : null; }
function generateJson() {
  let payload;
  const ts = new Date().toISOString();
  if (FORM_MODE === 'perfil') {
    const u = (document.getElementById('f_username').value||'').trim().replace(/^@/,'').toLowerCase();

ento que você esteja passando agora, que você mantenha sempre a fé e o otimismo. Legendas pela comunidade Amara.org", "language_code": "pt", "audio_duration": 90}, "DLH4czBuXbA": {"text": "Existem dias que marca a alma para sempre e o nosso dia chegou, o dia de te conhecer, filha. Foram meses sonhando com você, sentindo seu coração bater dentro de mim, imaginando seu rostinho, seu cheiro, seu jeitinho. Será que você parece mais com a mamãe ou com o papai? Flora, seu nome já era poesia antes mesmo de você nascer. Foi desejada, esperada e amada com todo o nosso coração. Você é um milagre que floresceu em nós, a promessa mais linda que Deus nos fez. Bem-vinda à vida, filha. Bem-vinda ao nosso jardim de amor. estrangeira ele vai restaurar aquilo que você fez vai se cumprir você Tem muita gente que enfrentou o mesmo que você E nem por isso desistiu, você vai perceber Vai sair mais forte do que antes O vai processo não anula a promessa, então espera você vai conhecer", "language_code": "pt", "audio_duration": 189}, "DOMteLzEbC9": {"text": "Os casos complexos de implantes dentários, os casos ditos impossíveis que nós recebemos aí de todo o Brasil e do mundo, graças ao nosso histórico de desenvolvimento de implantes de carga imediata sem cortes na América Latina, ele acontece pelo seguinte. No método clássico, geração do meu pai, do meu avô, uma boca dessas que não tem mais osso na maxila e na mandíbula, ela teria que passar por 6, 7, 8 cirurgias de 6 em 6 meses, 3, 4, 5 anos de tratamento, muito risco, muita dor, muito sofrimento no pós-operatório pra tentar chegar num resultado com muito mais dor, muito mais risco e muito mais custo. Com os implantes de carga imediata através do protocolo que a gente ajudou a desenvolver e depois próteses maravilhosas, resistentes, lindas e naturais em zircônia, a gente consegue devolver pro paciente no mesmo dia esse sorriso, essa saúde bucal, essa autoconfiança. Eu opero ele de manhã em duas, três horas, sedado, dormindo com tranquilidade e segurança. Minha equipe fabrica esses dentes no mesmo dia o paciente sai sorrindo à noite. Um pós-operatório menor, menos dor, menos risco e por incrível que pareça, menos custo. Porque se eu perco um dia e não cinco anos, apesar de usar os melhores materiais do mundo, eu gasto menos a minha hora e o paciente se beneficia de saúde, longevidade, com implantes dentários, com longa vida.", "language_code": "pt", "audio_duration": 88}};

const TIPOS_PINNED = ['Apresentação','Prova Social','Oferta/CTA','Indefinido'];
const TIPOS_DEST = ['Quem Sou','Resultados','Metodologia/Produto','FAQ','Dicas Grátis','Mentoria/Produto/Oferta','Bastidores','Específico do Nicho'];
const TIPO_BADGE_P = { 'Apresentação':'badge-brand', 'Prova Social':'badge-success', 'Oferta/CTA':'badge-accent', 'Indefinido':'badge-neutral' };
const TIPO_BADGE_D = { 'Quem Sou':'badge-brand', 'Resultados':'badge-success', 'Metodologia/Produto':'badge-info', 'FAQ':'badge-warning', 'Dicas Grátis':'badge-cream', 'Mentoria/Produto/Oferta':'badge-accent', 'Bastidores':'badge-neutral', 'Específico do Nicho':'badge-neutral' };

let MODE = 'pinned';

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtNum(n) { const x = parseInt(n||0); return x ? x.toLocaleString('pt-BR') : ''; }

function refreshTipos() {
  const tipoSel = document.getElementById('tipo');
  tipoSel.innerHTML = '<option value="">Todos tipos</option>';
  const opts = MODE === 'pinned' ? TIPOS_PINNED : TIPOS_DEST;
  opts.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tipoSel.appendChild(o); });
}

function renderPinned(rows) {
  // Group by perfil; sort items by posição
  const byPerfil = {};
  rows.forEach(r => { (byPerfil[r.perfil] = byPerfil[r.perfil] || []).push(r); });
  const perfis = Object.keys(byPerfil).sort();
  if (!perfis.length) return '<div class="empty">Nenhum resultado.</div>';
  let h = '';
  perfis.forEach(p => {
    const items = byPerfil[p].sort((a,b) => parseInt(a.posicao) - parseInt(b.posicao));
    const m = items[0];
    const oLab = ({ benchmark_externo_clinic:'Clínica', benchmark_externo_scale:'Mentoria' })[m.origem_perfil] || '';
    h += `<h2 class="section-h2"><span class="eyebrow">@</span>${p} <span class="badge ${m.trilha==='clinic'?'badge-success':'badge-accent'}">${m.trilha}</span> <span class="badge badge-cream">${oLab}</span></h2>`;
    h += '<div class="grid">';
    items.forEach(r => {
      const conf = parseFloat(r.confidence||0);
      const tsrc = r.thumb_local || r.displayUrl;
      const thumbStyle = tsrc ? `background-image:url('${tsrc}')` : '';
      const thumbCls = tsrc ? '' : 'card-thumb-empty';
      const onClick = r.shortcode ? `onclick="openModal('${r.shortcode}','${r.trilha}','Posição ${r.posicao}','${r.tipo_estrategico}','${r.formato}','${escapeHtml(r.caption_preview).slice(0,80).replace(/'/g,"\\'")}','${r.perfil}','${r.url}')"` : '';
      h += `<div class="card fade-in">
        <div class="card-thumb ${thumbCls}" style="${thumbStyle}" ${onClick}>
          <div class="badge-overlay">
            <span class="badge badge-cream">Pos ${r.posicao}</span>
            <span class="badge ${TIPO_BADGE_P[r.tipo_estrategico]||'badge-neutral'}">${r.tipo_estrategico}</span>
          </div>
          ${tsrc && r.formato==='Video' ? '<div class="play">▶</div>' : ''}
          ${!tsrc ? 'sem prévia' : ''}
        </div>
        <div class="card-body">
          <div class="card-caption">${escapeHtml(r.caption_preview)}</div>
          <div class="card-foot">
            <span>${[fmtNum(r.likes) ? '<span class="metric">♥ <strong>'+fmtNum(r.likes)+'</strong></span>' : '', fmtNum(r.comments) ? '<span class="metric">💬 <strong>'+fmtNum(r.comments)+'</strong></span>' : '', fmtNum(r.views) ? '<span class="metric">▶ <strong>'+fmtNum(r.views)+'</strong></span>' : ''].filter(x=>x).join(' ')}</span>
            <a class="card-link" href="${r.url}" target="_blank" rel="noopener">Abrir no IG</a>
          </div>
        </div>
      </div>`;
    });
    h += '</div>';
  });
  return h;
}

function renderDestaques(rows) {
  const byPerfil = {};
  rows.forEach(r => { (byPerfil[r.perfil] = byPerfil[r.perfil] || []).push(r); });
  const perfis = Object.keys(byPerfil).sort();
  if (!perfis.length) return '<div class="empty">Nenhum resultado.</div>';
  let h = '';
  perfis.forEach(p => {
    const items = byPerfil[p];
    const m = items[0];
    const oLab = ({ benchmark_externo_clinic:'Clínica', benchmark_externo_scale:'Mentoria' })[m.origem_perfil] || '';
    h += `<h2 class="section-h2"><span class="eyebrow">@</span>${p} <span class="badge ${m.trilha==='clinic'?'badge-success':'badge-accent'}">${m.trilha}</span> <span class="badge badge-cream">${oLab}</span> <span style="color:var(--cream-700);font-weight:400;font-family:var(--font-ui);font-size:var(--text-sm)">(${items.length} destaques)</span></h2>`;
    h += '<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">';
    items.forEach(r => {
      const tsrc = r.thumb_local || r.cover_url;
      const thumbStyle = tsrc ? `background-image:url('${tsrc}')` : '';
      const thumbCls = tsrc ? '' : 'card-thumb-empty';
      h += `<div class="card fade-in">
        <div class="card-thumb ${thumbCls}" style="${thumbStyle}">
          ${!r.cover_url ? 'sem prévia' : ''}
        </div>
        <div class="card-body" style="padding:var(--sp-3)">
          <h4 class="card-title">${escapeHtml(r.titulo) || '<em style="color:var(--cream-700)">sem título</em>'}</h4>
          <span class="badge ${TIPO_BADGE_D[r.template_estrategico]||'badge-neutral'}">${r.template_estrategico}</span>
        </div>
      </div>`;
    });
    h += '</div>';
  });
  return h;
}

function render() {
  const trilha = document.getElementById('trilha').value;
  const tipo = document.getElementById('tipo').value;
  const origem = document.getElementById('origem').value;
  const q = document.getElementById('q').value.trim().toLowerCase();
  if (MODE === 'pinned') {
    let rows = PINNED.filter(r =>
      (!trilha || r.trilha === trilha) &&
      (!tipo || r.tipo_estrategico === tipo) &&
      (!origem || r.origem_perfil === origem) &&
      (!q || (r.perfil+' '+r.caption_preview).toLowerCase().includes(q))
    );
    document.getElementById('results').innerHTML = renderPinned(rows);
  } else {
    let rows = DESTAQUES.filter(r =>
      (!trilha || r.trilha === trilha) &&
      (!tipo || r.template_estrategico === tipo) &&
      (!origem || r.origem_perfil === origem) &&
      (!q || (r.perfil+' '+r.titulo).toLowerCase().includes(q))
    );
    document.getElementById('results').innerHTML = renderDestaques(rows);
  }
}

document.querySelectorAll('.tab-main').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tab-main').forEach(t => t.classList.remove('active'));
  b.classList.add('active'); MODE = b.dataset.mode; refreshTipos(); render();
}));
['q','trilha','tipo','origem'].forEach(id => document.getElementById(id).addEventListener('input', render));
document.getElementById('reset').addEventListener('click', () => {
  ['q','trilha','tipo','origem'].forEach(id => document.getElementById(id).value='');
  render();
});

async function openModal(shortcode, trilha, posLabel, tipo, formato, captionShort, perfil, postUrl) {
  const m = document.getElementById('modal');
  document.getElementById('modalTitle').textContent = `@${perfil} — ${posLabel}`;
  document.getElementById('modalPlayer').innerHTML = `<iframe src="https://www.instagram.com/p/${shortcode}/embed/captioned/" allow="encrypted-media" scrolling="no"></iframe>`;
  document.getElementById('modalBody').innerHTML = `<div class="modal-meta">
    <span class="badge badge-cream">${trilha}</span>
    <span class="badge badge-brand">${tipo}</span>
    <span class="badge badge-cream">${escapeHtml(formato)}</span>
  </div>
  <div class="modal-section">
    <h4>Caption</h4>
    <div class="modal-caption">${escapeHtml(captionShort)}…</div>
  </div>
  <div class="modal-section">
    <h4>Transcrição</h4>
    <div id="transcriptBox" class="modal-transcript transcript-empty">carregando...</div>
  </div>`;
  m.classList.add('open');
  try {
    const r = await fetch(`transcripts/${shortcode}.json`);
    if (r.ok) {
      const t = await r.json();
      const box = document.getElementById('transcriptBox');
      box.classList.remove('transcript-empty');
      const lang = t.language_code ? `[${t.language_code}] ` : '';
      const dur = t.audio_duration ? ` · ${Math.round(t.audio_duration)}s` : '';
      box.innerHTML = `<div style="font-size:var(--text-2xs);color:var(--cream-700);margin-bottom:var(--sp-2)">${lang}${t.text ? t.text.length+' caracteres' : ''}${dur}</div>${escapeHtml(t.text || '(sem texto)')}`;
    } else {
      document.getElementById('transcriptBox').textContent = 'Transcrição não disponível para este vídeo.';
    }
  } catch (e) {
    document.getElementById('transcriptBox').textContent = 'Falha ao carregar transcrição.';
  }
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalPlayer').innerHTML = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

refreshTipos(); render();
</script>
