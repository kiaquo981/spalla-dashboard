<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banco Live — Cadastros via Form</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Open+Sauce+Sans:wght@300;400;500;600;700;800&display=swap");
:root{--brand-50:#f7f6f1;--brand-100:#ece9dd;--brand-300:#c2b893;--brand-500:#8a7d52;--brand-700:#554d33;--brand-900:#35301d;--cream-50:#faf9f7;--cream-100:#f5f4f0;--cream-300:#e6e3da;--cream-500:#b8b3a3;--cream-700:#807a67;--accent-50:#fdf5f0;--accent-100:#fbe8da;--accent-300:#efa97e;--accent-500:#d4703a;--accent-700:#964627;--neutral-100:#f0eee7;--neutral-200:#e5e3dc;--neutral-400:#a19d90;--neutral-600:#5a564c;--neutral-800:#2e2b25;--success:#4a8c5c;--warning:#c4942a;--danger:#c0392b;--info:#3a7ca5;--font-display:"Optima","Times New Roman",serif;--font-ui:"Open Sauce Sans",system-ui,sans-serif;--shadow-xs:0 1px 2px rgba(85,77,51,.06);--shadow-sm:0 1px 3px rgba(85,77,51,.1);--shadow-md:0 4px 8px rgba(85,77,51,.08);--shadow-lg:0 12px 24px rgba(85,77,51,.12);--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-full:9999px;--sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-6:24px;--sp-8:32px;--sp-12:48px;--text-2xs:.625rem;--text-xs:.75rem;--text-sm:.8125rem;--text-md:1rem;--text-lg:1.125rem;--text-xl:1.35rem;--text-2xl:1.62rem;--text-4xl:2.333rem}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;font-family:var(--font-ui);background:var(--cream-50);color:var(--neutral-800)}
.container{max-width:1320px;margin:0 auto;padding:var(--sp-8) var(--sp-6)}
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-6);margin-bottom:var(--sp-8);flex-wrap:wrap}
.header-title{font-family:var(--font-display);font-size:var(--text-4xl);font-weight:700;color:var(--brand-700);margin:0;letter-spacing:-.02em}
.header-meta{display:flex;gap:var(--sp-3);flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:var(--sp-1);padding:var(--sp-3) var(--sp-4);background:white;border-radius:var(--radius-md);box-shadow:var(--shadow-xs);min-width:88px}
.stat-value{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;color:var(--accent-500);line-height:1}
.stat-label{font-size:var(--text-xs);color:var(--cream-700);text-transform:uppercase;letter-spacing:.04em}
.toolbar{display:flex;gap:var(--sp-3);flex-wrap:wrap;background:white;padding:var(--sp-4);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);margin-bottom:var(--sp-6);align-items:center;position:sticky;top:0;z-index:10}
.input,.select{font-family:var(--font-ui);font-size:var(--text-sm);padding:var(--sp-2) var(--sp-3);border:1px solid var(--neutral-200);border-radius:var(--radius-md);background:white;color:var(--neutral-800);min-width:140px}
.input:focus,.select:focus{outline:none;border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(138,125,82,.12)}
.input-search{flex:1;min-width:240px}
.btn{display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4);font-size:var(--text-sm);font-weight:600;border-radius:var(--radius-md);border:1px solid var(--neutral-200);background:white;color:var(--brand-700);cursor:pointer;font-family:var(--font-ui)}
.btn:hover{background:var(--cream-100)}
.btn-primary{background:var(--brand-700);color:white;border:none}
.btn-primary:hover{background:var(--brand-900)}
.tabs-main{display:flex;gap:var(--sp-2);background:var(--cream-100);padding:var(--sp-1);border-radius:var(--radius-full);width:fit-content;margin-bottom:var(--sp-6)}
.tab-main{padding:var(--sp-2) var(--sp-4);font-size:var(--text-sm);font-weight:600;border:none;background:transparent;color:var(--cream-700);border-radius:var(--radius-full);cursor:pointer;font-family:var(--font-ui)}
.tab-main.active{background:white;color:var(--brand-700);box-shadow:var(--shadow-xs)}
.section-h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:600;color:var(--brand-700);margin:var(--sp-6) 0 var(--sp-3);display:flex;align-items:baseline;gap:var(--sp-3)}
.section-h2 .eyebrow{font-family:var(--font-ui);font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.12em;color:var(--accent-500);font-weight:700}
.grid{display:grid;gap:var(--sp-4);grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.card{background:white;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:all .25s ease;display:flex;flex-direction:column;border:1px solid var(--neutral-100);cursor:pointer}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--brand-300)}
.card-thumb{width:100%;aspect-ratio:1;background:var(--cream-100);background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end}
.card-thumb-empty{display:flex;align-items:center;justify-content:center;color:var(--cream-500);font-size:var(--text-xs);font-family:var(--font-display)}
.card-thumb .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:var(--radius-full);background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;color:var(--brand-700);font-size:18px;box-shadow:var(--shadow-md)}
.badge-overlay{position:absolute;top:var(--sp-2);left:var(--sp-2);right:var(--sp-2);display:flex;justify-content:space-between;gap:var(--sp-2)}
.card-body{padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-2);flex:1}
.card-title{font-family:var(--font-ui);font-size:var(--text-sm);font-weight:600;color:var(--neutral-800);margin:0;line-height:1.35}
.card-caption{font-size:var(--text-xs);color:var(--neutral-600);line-height:1.4;max-height:4.2em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:var(--sp-2);border-top:1px solid var(--neutral-100);font-size:var(--text-xs);color:var(--cream-700)}
.badge{display:inline-block;padding:2px var(--sp-2);border-radius:var(--radius-full);font-size:var(--text-2xs);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-brand{background:var(--brand-100);color:var(--brand-900)}.badge-accent{background:var(--accent-100);color:var(--accent-900)}.badge-cream{background:white;color:var(--brand-700);border:1px solid var(--brand-300)}.badge-success{background:#e8f5e9;color:var(--success)}.badge-warning{background:#fff3e0;color:var(--warning)}.badge-neutral{background:var(--neutral-100);color:var(--neutral-600)}.badge-info{background:#e3f2fd;color:var(--info)}
.empty{padding:var(--sp-12);text-align:center;color:var(--cream-700)}
.modal-bg{position:fixed;inset:0;background:rgba(46,43,37,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:var(--sp-6)}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:var(--radius-xl);max-width:1100px;width:100%;max-height:92vh;overflow:hidden;display:grid;grid-template-columns:minmax(0,1fr) 1.1fr;box-shadow:var(--shadow-lg)}
@media(max-width:880px){.modal{grid-template-columns:1fr;max-height:100vh;overflow-y:auto}}
.modal-player{background:black;display:flex;min-height:520px}
.modal-player iframe{width:100%;height:100%;min-height:520px;border:0}
.modal-side{display:flex;flex-direction:column;max-height:92vh;overflow:hidden}
.modal-head{padding:var(--sp-4) var(--sp-6);border-bottom:1px solid var(--neutral-200);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:600;color:var(--brand-700);margin:0}
.modal-close{font-size:var(--text-xl);background:transparent;border:none;color:var(--cream-700);cursor:pointer}
.modal-body{padding:var(--sp-4) var(--sp-6);overflow-y:auto;flex:1}
.modal-section{margin-bottom:var(--sp-4)}
.modal-section h4{margin:0 0 var(--sp-2);font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:.12em;color:var(--accent-500);font-weight:700}
.modal-transcript{font-size:var(--text-sm);color:var(--neutral-800);line-height:1.65;background:var(--cream-100);padding:var(--sp-4);border-radius:var(--radius-md);max-height:340px;overflow-y:auto;white-space:pre-wrap}
.loading{padding:var(--sp-12);text-align:center;color:var(--cream-700);font-size:var(--text-sm)}
.error{padding:var(--sp-6);background:#ffebee;color:var(--danger);border-radius:var(--radius-md);font-size:var(--text-sm)}
.refreshing{display:inline-flex;align-items:center;gap:var(--sp-2);font-size:var(--text-xs);color:var(--cream-700)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.footer{margin-top:var(--sp-12);padding-top:var(--sp-6);border-top:1px solid var(--neutral-200);font-size:var(--text-xs);color:var(--cream-700);text-align:center}
.btn-add{position:fixed;bottom:var(--sp-6);right:var(--sp-6);z-index:50;padding:var(--sp-4) var(--sp-6);font-size:var(--text-md);font-weight:600;border-radius:var(--radius-full);background:var(--brand-700);color:white;border:none;box-shadow:var(--shadow-lg);cursor:pointer;font-family:var(--font-ui)}
.btn-add:hover{background:var(--brand-900);transform:translateY(-2px)}
</style>
</head><body>
<div class="container">
  <div class="header">
    <div>
      <h1 class="header-title">Banco Live</h1>
      <p style="margin:var(--sp-2) 0 0;color:var(--cream-700);font-size:var(--text-md);max-width:680px">Referências cadastradas via formulário e processadas pelo pipeline. Atualização em tempo real <span class="refreshing"><span class="dot"></span>Live</span></p>
    </div>
    <div class="header-meta" id="stats"></div>
  </div>
  <div class="tabs-main">
    <button class="tab-main active" data-tipo="">Tudo</button>
    <button class="tab-main" data-tipo="post_fixado">Posts Fixados</button>
    <button class="tab-main" data-tipo="destaque">Destaques</button>
    <button class="tab-main" data-tipo="publicacao_avulsa">Publicações</button>
  </div>
  <div class="toolbar">
    <input type="search" class="input input-search" id="q" placeholder="Buscar perfil, caption, transcrição...">
    <select class="select" id="trilha"><option value="">Todas trilhas</option><option value="clinic">Clínica</option><option value="scale">Mentoria</option></select>
    <select class="select" id="etapa"><option value="">Todas etapas</option><option value="DESCOBERTA">Descoberta</option><option value="CONFIANCA">Confiança</option><option value="ACAO">Ação</option></select>
    <button class="btn" id="reload">↻ Recarregar</button>
  </div>
  <div id="results"><div class="loading">Carregando do banco...</div></div>
  <div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-player" id="modalPlayer"></div>
      <div class="modal-side">
        <div class="modal-head">
          <h3 class="modal-title" id="modalTitle">—</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>
  <button class="btn-add" onclick="window.location='/ref/trilhas.html#open-form'">+ Adicionar referência</button>
  <div class="footer">Fonte: agente.referencias_conteudo · Atualização sob demanda · Recarrega a cada 30s</div>
</div>
<script>
const SUPABASE_URL = "https://knusqfbvhsqworzyhvip.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtudXNxZmJ2aHNxd29yenlodmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ4NTg3MjcsImV4cCI6MjA3MDQzNDcyN30.f-m7TlmCoccBpUxLZhA4P5kr2lWBGtRIv6inzInAKCo";

const TIPO_BADGE = {'Apresentação':'badge-brand','Prova Social':'badge-success','Oferta/CTA':'badge-accent','Quem Sou':'badge-brand','Resultados':'badge-success','Metodologia/Produto':'badge-info','FAQ':'badge-warning','Dicas Grátis':'badge-cream','Mentoria/Produto/Oferta':'badge-accent','Bastidores':'badge-neutral','Específico do Nicho':'badge-neutral','Indefinido':'badge-neutral'};
const ETAPA_LABEL = {DESCOBERTA:'Descoberta',CONFIANCA:'Confiança',ACAO:'Ação'};

let DATA = [];
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtNum(n){const x=parseInt(n||0);return x?x.toLocaleString('pt-BR'):'';}

async function load(){
  const url = `${SUPABASE_URL}/rest/v1/v_referencias_publicas?select=*&order=created_at.desc&limit=500`;
  try {
    const r = await fetch(url, { headers:{ apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON }});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    render();
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="error">Falha ao carregar do banco: ${escapeHtml(e.message)}</div>`;
  }
}

function render(){
  const tipo = document.querySelector('.tab-main.active').dataset.tipo;
  const trilha = document.getElementById('trilha').value;
  const etapa = document.getElementById('etapa').value;
  const q = document.getElementById('q').value.trim().toLowerCase();
  const rows = DATA.filter(r =>
    (!tipo || r.tipo_artefato===tipo) &&
    (!trilha || r.trilha===trilha) &&
    (!etapa || r.etapa_funil===etapa) &&
    (!q || ((r.perfil||'')+' '+(r.caption||'')+' '+(r.resumo||'')+' '+(r.transcricao||'')).toLowerCase().includes(q))
  );
  // Stats
  const stats = document.getElementById('stats');
  const counts = rows.reduce((a,r)=>{a[r.tipo_artefato]=(a[r.tipo_artefato]||0)+1;return a;},{});
  stats.innerHTML = `
    <div class="stat"><span class="stat-value">${rows.length}</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-value">${counts.post_fixado||0}</span><span class="stat-label">Fixados</span></div>
    <div class="stat"><span class="stat-value">${counts.destaque||0}</span><span class="stat-label">Destaques</span></div>
    <div class="stat"><span class="stat-value">${counts.publicacao_avulsa||0}</span><span class="stat-label">Avulsas</span></div>`;

  if (!rows.length){ document.getElementById('results').innerHTML = '<div class="empty">Nenhuma referência ainda. Cadastra pelo botão "+ Adicionar".</div>'; return; }

  // Group by perfil
  const byPerfil = {};
  rows.forEach(r=>{(byPerfil[r.perfil]=byPerfil[r.perfil]||[]).push(r);});
  let h='';
  Object.keys(byPerfil).sort().forEach(p=>{
    const items = byPerfil[p];
    const trilhaLabel = items[0].trilha;
    h += `<h2 class="section-h2"><span class="eyebrow">@</span>${escapeHtml(p)} <span class="badge ${trilhaLabel==='clinic'?'badge-success':'badge-accent'}">${trilhaLabel}</span> <span style="color:var(--cream-700);font-weight:400;font-family:var(--font-ui);font-size:var(--text-sm)">(${items.length})</span></h2>`;
    h += '<div class="grid">';
    items.forEach(r=>{
      const thumb = r.thumb_url || '';
      const isVideo = r.tipo_artefato==='post_fixado' || r.tipo_artefato==='publicacao_avulsa';
      h += `<div class="card" onclick="openModal(${r.id})">
        <div class="card-thumb ${thumb?'':'card-thumb-empty'}" style="${thumb?`background-image:url('${thumb}')`:''}">
          <div class="badge-overlay">
            <span class="badge ${TIPO_BADGE[r.tipo_estrategico]||'badge-neutral'}">${escapeHtml(r.tipo_estrategico||'—')}</span>
            ${r.posicao?`<span class="badge badge-cream">Pos ${r.posicao}</span>`:''}
          </div>
          ${thumb&&isVideo?'<div class="play">▶</div>':''}
          ${!thumb?'sem prévia':''}
        </div>
        <div class="card-body">
          <h4 class="card-title">${escapeHtml(r.resumo||'—')}</h4>
          <div class="card-caption">${escapeHtml(r.caption||'')}</div>
          <div class="card-foot">
            <span>${[fmtNum(r.likes)?'♥ '+fmtNum(r.likes):'',fmtNum(r.comments)?'💬 '+fmtNum(r.comments):'',fmtNum(r.views)?'▶ '+fmtNum(r.views):''].filter(x=>x).join(' · ')}</span>
            <span class="badge badge-cream">${ETAPA_LABEL[r.etapa_funil]||'—'}</span>
          </div>
        </div>
      </div>`;
    });
    h += '</div>';
  });
  document.getElementById('results').innerHTML = h;
}

function openModal(id){
  const r = DATA.find(x=>x.id===id); if(!r) return;
  document.getElementById('modalTitle').textContent = `@${r.perfil} — ${r.tipo_estrategico||r.tipo_artefato}`;
  if (r.shortcode){
    document.getElementById('modalPlayer').innerHTML = `<iframe src="https://www.instagram.com/p/${r.shortcode}/embed/captioned/" allow="encrypted-media" scrolling="no"></iframe>`;
  } else {
    document.getElementById('modalPlayer').innerHTML = `<div style="color:var(--cream-500);padding:var(--sp-6);text-align:center">Sem post associado (destaque)</div>`;
  }
  let body = `<div style="display:flex;gap:var(--sp-2);flex-wrap:wrap;margin-bottom:var(--sp-3)">
    <span class="badge badge-cream">${r.trilha}</span>
    <span class="badge ${TIPO_BADGE[r.tipo_estrategico]||'badge-neutral'}">${escapeHtml(r.tipo_estrategico||'—')}</span>
    <span class="badge badge-brand">${ETAPA_LABEL[r.etapa_funil]||'—'}</span>
    ${r.tem_transcricao?'<span class="badge badge-success">Transcrita</span>':''}
  </div>`;
  if (r.caption) body += `<div class="modal-section"><h4>Caption</h4><div style="font-size:var(--text-sm);white-space:pre-wrap">${escapeHtml(r.caption)}</div></div>`;
  if (r.transcricao) body += `<div class="modal-section"><h4>Transcrição ${r.language_code?`[${r.language_code}]`:''}</h4><div class="modal-transcript">${escapeHtml(r.transcricao)}</div></div>`;
  if (r.notas) body += `<div class="modal-section"><h4>Notas</h4><div style="font-size:var(--text-sm);color:var(--cream-700)">${escapeHtml(r.notas)}</div></div>`;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modalPlayer').innerHTML='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

document.querySelectorAll('.tab-main').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab-main').forEach(t=>t.classList.remove('active'));b.classList.add('active');render();}));
['q','trilha','etapa'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.getElementById('reload').addEventListener('click',load);
load();
setInterval(load, 30000);
</script>
</body></html>
