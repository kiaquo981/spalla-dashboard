<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spalla API Reference</title>
    <meta
      name="description"
      content="Interactive API reference for Spalla Dashboard — mentorship management, ClickUp integration, WhatsApp automation, and AI-powered search."
    />
    <meta property="og:title" content="Spalla API Reference" />
    <meta
      property="og:description"
      content="Interactive API documentation powered by Scalar."
    />
    <style>
      /* Spalla brand: warm olive / terracotta / cream (Operon Design System) */
      :root {
        --scalar-color-1: #1a1a14;
        --scalar-color-2: #4a4a38;
        --scalar-color-3: #7a7a60;
        --scalar-background-1: #faf9f5;
        --scalar-background-2: #f2f0e8;
        --scalar-background-3: #e8e4d8;
        --scalar-border-color: #d8d4c8;
        --scalar-color-accent: #8b6f47;
        --scalar-sidebar-background-1: #f5f3ec;
        --scalar-sidebar-color-1: #1a1a14;
        --scalar-sidebar-color-2: #4a4a38;
        --scalar-sidebar-color-active: #8b6f47;
        --scalar-sidebar-background-active: #ede9de;
      }

      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <script
      id="api-reference"
      data-url="/openapi.yaml"
      data-configuration='{
        "theme": "default",
        "layout": "sidebar",
        "defaultOpenAllTags": false,
        "showSidebar": true,
        "hideModels": false,
        "hideDownloadButton": false,
        "hideDarkModeToggle": false,
        "searchHotKey": "k",
        "metaData": {
          "title": "Spalla API Reference",
          "description": "Interactive API reference for Spalla Dashboard.",
          "ogDescription": "Mentorship management, ClickUp integration, WhatsApp automation, and AI-powered search.",
          "ogTitle": "Spalla API Reference",
          "favicon": "https://spalla-dashboard.vercel.app/favicon.ico"
        },
        "servers": [
          {
            "url": "https://spalla.allinmarketing.com.br",
            "description": "Production (Railway)"
          },
          {
            "url": "http://localhost:9999",
            "description": "Local development"
          }
        ],
        "authentication": {
          "preferredSecurityScheme": "BearerAuth",
          "http": {
            "bearer": {
              "token": ""
            }
          }
        },
        "customCss": ":root { --scalar-color-accent: #8b6f47; } .sidebar { border-right: 1px solid var(--scalar-border-color); } .tag-section-title { font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; font-size: 0.7rem; } .endpoint-path { font-family: ''JetBrains Mono'', ''Fira Code'', monospace; }"
      }'
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
