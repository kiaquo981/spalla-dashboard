openapi: 3.0.3

info:
  title: Spalla Dashboard API
  version: "1.0.0"
  description: |
    API completa do Spalla — plataforma de gestão de mentorados da CASE.

    ## Autenticação

    A API usa JWT personalizado (HMAC-SHA256). Para obter um token:

    1. `POST /api/auth/login` com email + senha
    2. Copie o `access_token` da resposta
    3. Envie `Authorization: Bearer <token>` em todas as requests autenticadas
    4. Quando o token expirar (60 min), use `POST /api/auth/refresh` com o `refresh_token`

    ## Status dos endpoints

    | Badge | Significado |
    |-------|-------------|
    | *(sem badge)* | Endpoint estável e em produção |
    | `planned` | Mapeado no roadmap, backend ainda não implementado |
    | `beta` | Implementado mas sujeito a mudanças |

    ## Fluxos de automação

    O Spalla é projetado para ser consumido por agentes de IA e automações N8N:

    - **WhatsApp → Spalla → ClickUp**: mensagem no WhatsApp dispara webhook → cria tarefa no ClickUp
    - **N8N → Spalla**: qualquer step de workflow pode chamar a API para ler contexto de mentorado
    - **AI Agent → Spalla**: agentes podem buscar contexto completo de um mentorado antes de responder

  contact:
    name: CASE — Equipe Técnica
    email: tech@case.com.br
  license:
    name: Proprietary

servers:
  - url: https://spalla-backend.up.railway.app
    description: Produção (Railway)
  - url: http://localhost:9999
    description: Desenvolvimento local

tags:
  - name: Auth
    description: Autenticação e gestão de sessão
  - name: Mentees
    description: Dados de mentorados (leitura complementar — principal via Supabase direct)
  - name: Scheduling
    description: Agendamento de calls — Zoom + Google Calendar + registro no banco
  - name: Sheets Sync
    description: Sincronização de Google Sheets com Supabase
  - name: Media
    description: Acesso a arquivos de mídia do WhatsApp (Hetzner S3)
  - name: Storage & Search
    description: Pipeline de processamento de arquivos e busca semântica (pgvector)
  - name: Welcome Flow
    description: Onboarding de novos mentorados
  - name: Evolution / WhatsApp
    description: Proxy para Evolution API — WhatsApp via S2S
  - name: ClickUp
    description: |
      **[planned]** Integração com ClickUp para gestão de tarefas.
      Requer `CLICKUP_API_TOKEN` e `CLICKUP_WORKSPACE_ID` no ambiente.
  - name: Actions
    description: |
      **[planned]** Ações compostas — combinam múltiplos serviços em uma chamada única.
      Ideal para N8N e agentes de IA.
  - name: Webhooks
    description: |
      **[planned]** Receptores de eventos externos (Evolution, N8N, Zapier).
  - name: System
    description: Health check e status de integrações

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT obtido via `POST /api/auth/login`.
        TTL: 60 minutos. Renove com `POST /api/auth/refresh`.

  schemas:

    # ── Core ──────────────────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Email and password required"
      required: [error]

    User:
      type: object
      properties:
        id:
          type: integer
          example: 42
        email:
          type: string
          format: email
          example: heitor@case.com.br
        full_name:
          type: string
          example: Heitor Lima
        role:
          type: string
          enum: [equipe, admin, mentorado]
          example: equipe

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
          description: JWT de acesso — envie no header `Authorization: Bearer <token>`
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          description: JWT de renovação — use em `POST /api/auth/refresh`
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          description: Segundos até o access_token expirar
          example: 3600

    AuthResponse:
      allOf:
        - type: object
          properties:
            success:
              type: boolean
              example: true
            user:
              $ref: '#/components/schemas/User'
        - $ref: '#/components/schemas/TokenPair'

    # ── Mentees ───────────────────────────────────────────────────────────────

    MenteeEmail:
      type: object
      description: Subconjunto de dados do mentorado com email (para formulários)
      properties:
        id:
          type: integer
          example: 7
        nome:
          type: string
          example: "João Silva"
        email:
          type: string
          format: email
          nullable: true
          example: "joao@silva.com"

    MenteeOverview:
      type: object
      description: View completa vw_god_overview — lida diretamente via Supabase JS client
      properties:
        id:
          type: integer
        nome:
          type: string
        fase_jornada:
          type: string
          enum: [onboarding, concepcao, validacao, otimizacao, escala]
        risco_churn:
          type: string
          enum: [baixo, medio, alto, critico]
        cohort:
          type: string
          example: "N1"
        consultor_responsavel:
          type: string
          nullable: true
        msgs_pendentes_resposta:
          type: integer
          description: Derivado de vw_god_pendencias (reconciliado no frontend)
        tarefas_atrasadas:
          type: integer
        horas_sem_resposta_equipe:
          type: number
          nullable: true
        status_contrato:
          type: string
          nullable: true
        status_pagamento:
          type: string
          nullable: true

    MenteeContext:
      type: object
      description: Contexto completo para consumo por agentes de IA
      properties:
        mentee:
          $ref: '#/components/schemas/MenteeOverview'
        recent_interactions:
          type: array
          items:
            $ref: '#/components/schemas/Interaction'
          description: Últimas 20 interações WhatsApp
        pending_messages:
          type: array
          items:
            $ref: '#/components/schemas/Pendencia'
        upcoming_calls:
          type: array
          items:
            $ref: '#/components/schemas/Call'
        plano_acao:
          type: object
          nullable: true
          description: Status atual do Plano de Ação
        files:
          type: array
          items:
            $ref: '#/components/schemas/Arquivo'

    Pendencia:
      type: object
      properties:
        interacao_id:
          type: integer
        mentorado_id:
          type: integer
        mentorado_nome:
          type: string
        mensagem:
          type: string
        prioridade_calculada:
          type: string
        horas_sem_resposta:
          type: number
        created_at:
          type: string
          format: date-time

    Interaction:
      type: object
      properties:
        id:
          type: integer
        mentorado_id:
          type: integer
        tipo:
          type: string
          enum: [whatsapp_in, whatsapp_out, nota_interna, call, email]
        mensagem:
          type: string
          nullable: true
        respondido:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Scheduling ────────────────────────────────────────────────────────────

    Call:
      type: object
      properties:
        id:
          type: integer
        mentorado_id:
          type: integer
          nullable: true
        data_call:
          type: string
          format: date-time
        tipo_call:
          type: string
          enum: [acompanhamento, diagnostico, planejamento]
        duracao_minutos:
          type: integer
          nullable: true
        zoom_meeting_id:
          type: string
          nullable: true
        zoom_topic:
          type: string
          nullable: true
        status_call:
          type: string
          enum: [realizada, cancelada, processando]
          nullable: true
        link_gravacao:
          type: string
          nullable: true
        link_transcricao:
          type: string
          nullable: true
        observacoes_equipe:
          type: string
          nullable: true

    ZoomMeeting:
      type: object
      properties:
        meeting_id:
          type: string
          example: "123456789"
        join_url:
          type: string
          format: uri
          example: "https://zoom.us/j/123456789"
        password:
          type: string
          example: "abc123"
        start_url:
          type: string
          format: uri
          description: URL do host com ZAK token (expira em ~2h)

    CalendarEvent:
      type: object
      properties:
        event_id:
          type: string
          example: "gcal_event_id"
        html_link:
          type: string
          format: uri
          example: "https://calendar.google.com/calendar/event?eid=..."

    # ── Files & Storage ───────────────────────────────────────────────────────

    Arquivo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome_original:
          type: string
          example: "relatorio-abril.pdf"
        tipo_mime:
          type: string
          example: "application/pdf"
        tamanho_bytes:
          type: integer
          example: 204800
        status_processamento:
          type: string
          enum: [pendente, processando, concluido, erro]
        total_chunks:
          type: integer
          nullable: true
        entidade_tipo:
          type: string
          enum: [mentorado, equipe, global]
        entidade_id:
          type: integer
          nullable: true
        storage_path:
          type: string
        created_at:
          type: string
          format: date-time

    SearchResult:
      type: object
      properties:
        chunk_id:
          type: string
          format: uuid
        arquivo_id:
          type: string
          format: uuid
        arquivo_nome:
          type: string
        mentorado_nome:
          type: string
          nullable: true
        texto:
          type: string
          description: Chunk de texto extraído (~500 tokens)
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Similaridade coseno (semantic) ou rank (keyword)
        score_type:
          type: string
          enum: [cosine, rank, combined]
        page_num:
          type: integer
          nullable: true
          description: Página no documento original (PDF only)

    # ── ClickUp ───────────────────────────────────────────────────────────────

    ClickUpTask:
      type: object
      properties:
        id:
          type: string
          example: "abc123def"
        name:
          type: string
          example: "Revisar PA do João Silva"
        status:
          type: string
          example: "in progress"
        priority:
          type: integer
          nullable: true
          description: "1=Urgent, 2=High, 3=Normal, 4=Low"
        assignees:
          type: array
          items:
            type: string
          example: ["heitor", "lara"]
        due_date:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          example: "https://app.clickup.com/t/abc123def"
        list_id:
          type: string
          example: "901113377455"
        mentorado_id:
          type: integer
          nullable: true
          description: ID do mentorado vinculado (campo customizado no ClickUp)

    ClickUpList:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: "Sprint 1 (3/16 - 3/22)"
        task_count:
          type: integer

    ClickUpMember:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        profilePicture:
          type: string
          nullable: true

    # ── Webhooks ──────────────────────────────────────────────────────────────

    EvolutionWebhookPayload:
      type: object
      description: Payload enviado pela Evolution API quando um evento ocorre
      properties:
        event:
          type: string
          enum:
            - messages.upsert
            - messages.update
            - connection.update
            - qr.updated
            - send.message
          example: "messages.upsert"
        instance:
          type: string
          example: "case-spalla"
        data:
          type: object
          description: Dados do evento — varia por tipo
          properties:
            key:
              type: object
              properties:
                remoteJid:
                  type: string
                  example: "5511999990000@s.whatsapp.net"
                fromMe:
                  type: boolean
                id:
                  type: string
            message:
              type: object
              description: Conteúdo da mensagem (conversationMessage, imageMessage, audioMessage, etc.)
            pushName:
              type: string
              example: "João Silva"
            messageTimestamp:
              type: integer

    ActionCreateTaskPayload:
      type: object
      properties:
        name:
          type: string
          example: "Follow up com João Silva — sem resposta há 48h"
        list_id:
          type: string
          example: "901113377455"
          description: ID da lista/sprint no ClickUp. Usa lista padrão se omitido.
        mentorado_id:
          type: integer
          nullable: true
          description: Vincula a tarefa a um mentorado específico
        description:
          type: string
          nullable: true
        assignees:
          type: array
          items:
            type: string
          description: Usernames do ClickUp
        priority:
          type: integer
          enum: [1, 2, 3, 4]
          description: "1=Urgent, 2=High, 3=Normal, 4=Low. Default: 3"
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        whatsapp_context:
          type: object
          nullable: true
          description: Contexto da mensagem WhatsApp que originou a tarefa
          properties:
            remoteJid:
              type: string
            mensagem:
              type: string
            timestamp:
              type: integer

    ActionLogInteractionPayload:
      type: object
      required: [mentorado_id, tipo, mensagem]
      properties:
        mentorado_id:
          type: integer
        tipo:
          type: string
          enum: [whatsapp_in, whatsapp_out, nota_interna, call, email]
        mensagem:
          type: string
        respondido:
          type: boolean
          default: false
        metadata:
          type: object
          nullable: true
          description: Dados adicionais (media_key, zoom_id, etc.)

security:
  - {} # Most endpoints don't require auth — specified per-operation

paths:

  # ══════════════════════════════════════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════════════════════════════════════

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Criar conta
      description: Cria um novo usuário no sistema. Não exposto no UI público — usado para onboarding da equipe.
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: heitor@case.com.br
                password:
                  type: string
                  minLength: 6
                  example: minimo6chars
                fullName:
                  type: string
                  example: Heitor Lima
                role:
                  type: string
                  enum: [equipe, admin, mentorado]
                  default: equipe
      responses:
        "201":
          description: Conta criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Campos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing:
                  value: { error: "Email and password required" }
                short_password:
                  value: { error: "Password must be at least 6 characters" }
        "409":
          description: Email já cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                value: { error: "Email already exists" }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Autentica com email e senha. Retorna par de tokens JWT.

        > Hashes SHA-256 legados são migrados automaticamente para bcrypt no primeiro login.
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: heitor@case.com.br
                password:
                  type: string
                  example: minimo6chars
      responses:
        "200":
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                value: { error: "Invalid email or password" }

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar token
      description: Troca um refresh_token por um novo par access/refresh sem exigir senha.
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: "eyJ..."
      responses:
        "200":
          description: Novo par de tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Solicitar reset de senha
      description: |
        Sempre retorna 200 (previne enumeração de emails).

        > ⚠️ Envio de email ainda não implementado. A solicitação é logada server-side.
      operationId: authResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Sempre 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Usuário atual
      description: Valida o access_token e retorna o perfil do usuário logado.
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil do usuário
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        "401":
          description: Token inválido ou ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ══════════════════════════════════════════════════════════════════════════
  # MENTEES
  # ══════════════════════════════════════════════════════════════════════════

  /api/mentees:
    get:
      tags: [Mentees]
      summary: Listar mentorados (com email)
      description: |
        Retorna todos os mentorados com email. Complementa a view `vw_god_overview`
        lida diretamente via Supabase JS client (que não expõe email por RLS).

        Para dados completos (fases, riscos, KPIs, financeiro), acesse `vw_god_overview`
        diretamente no Supabase com o JS client.
      operationId: getMentees
      responses:
        "200":
          description: Lista de mentorados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenteeEmail'

  /api/mentees/{id}/context:
    get:
      tags: [Mentees]
      summary: Contexto completo do mentorado
      description: |
        **[planned]** Retorna contexto agregado de um mentorado para consumo por agentes de IA
        ou N8N: dados da view, últimas interações, mensagens pendentes, próximas calls, PA, arquivos.

        Ideal para pré-carregar contexto antes de um agente responder uma mensagem no WhatsApp.
      operationId: getMenteeContext
      x-status: planned
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 7
      responses:
        "200":
          description: Contexto completo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenteeContext'
        "404":
          description: Mentorado não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/mentees/{id}/interactions:
    get:
      tags: [Mentees]
      summary: Histórico de interações
      description: |
        **[planned]** Retorna o histórico de interações de um mentorado (WhatsApp, calls, notas internas).
        Suporta paginação e filtro por tipo.
      operationId: getMenteeInteractions
      x-status: planned
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tipo
          in: query
          schema:
            type: string
            enum: [whatsapp_in, whatsapp_out, nota_interna, call, email]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Histórico de interações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Interaction'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  # ══════════════════════════════════════════════════════════════════════════
  # SCHEDULING
  # ══════════════════════════════════════════════════════════════════════════

  /api/schedule-call:
    post:
      tags: [Scheduling]
      summary: Agendar call completa
      description: |
        Orquestra três serviços em sequência: cria reunião Zoom → cria evento no Google Calendar
        → insere registro em `calls_mentoria`.

        Falha parcial é normal — se Zoom não estiver configurado, Calendar e Supabase ainda funcionam.
      operationId: scheduleCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mentorado, data]
              properties:
                mentorado:
                  type: string
                  example: "João Silva"
                data:
                  type: string
                  format: date
                  example: "2026-04-10"
                mentorado_id:
                  type: integer
                  nullable: true
                  description: Se fornecido, insere registro em calls_mentoria
                email:
                  type: string
                  format: email
                  nullable: true
                  description: Convidado para Zoom e Google Calendar
                tipo:
                  type: string
                  enum: [acompanhamento, diagnostico, planejamento, onboarding, estrategia]
                  default: acompanhamento
                horario:
                  type: string
                  pattern: '^\d{2}:\d{2}$'
                  example: "10:00"
                  default: "10:00"
                duracao:
                  type: integer
                  description: Duração em minutos
                  default: 60
                notas:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Call agendada (mesmo com sub-falhas parciais)
          content:
            application/json:
              schema:
                type: object
                properties:
                  mentorado:
                    type: string
                  data:
                    type: string
                  horario:
                    type: string
                  tipo:
                    type: string
                  zoom:
                    oneOf:
                      - $ref: '#/components/schemas/ZoomMeeting'
                      - $ref: '#/components/schemas/Error'
                  calendar:
                    oneOf:
                      - $ref: '#/components/schemas/CalendarEvent'
                      - $ref: '#/components/schemas/Error'
                  supabase:
                    type: object
                    properties:
                      inserted:
                        type: boolean
                      id:
                        type: integer
        "400":
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/zoom/create-meeting:
    post:
      tags: [Scheduling]
      summary: Criar reunião Zoom
      description: Cria uma reunião Zoom standalone sem acionar Calendar ou Supabase.
      operationId: zoomCreateMeeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                  example: "Call Diagnóstico — João Silva"
                start_time:
                  type: string
                  format: date-time
                  example: "2026-04-10T10:00:00"
                duration:
                  type: integer
                  default: 60
                invitees:
                  type: array
                  items:
                    type: string
                    format: email
      responses:
        "200":
          description: Reunião criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoomMeeting'

  /api/calendar/create-event:
    post:
      tags: [Scheduling]
      summary: Criar evento no Google Calendar
      description: Cria um evento standalone no Google Calendar da conta de serviço.
      operationId: calendarCreateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
                start:
                  type: string
                  format: date-time
                end:
                  type: string
                  format: date-time
                description:
                  type: string
                  nullable: true
                attendees:
                  type: array
                  items:
                    type: string
                    format: email
                location:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Evento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEvent'

  /api/calendar/events:
    get:
      tags: [Scheduling]
      summary: Listar próximos eventos
      description: Lista os próximos 50 eventos do Google Calendar (do agora em diante).
      operationId: calendarListEvents
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    summary:
                      type: string
                    start:
                      type: string
                      format: date-time
                    end:
                      type: string
                      format: date-time
                    location:
                      type: string
                      nullable: true
                    attendees:
                      type: array
                      items:
                        type: string

  /api/calls/upcoming:
    get:
      tags: [Scheduling]
      summary: Listar calls (calls_mentoria)
      description: |
        Retorna todos os registros de `calls_mentoria` ordenados por data decrescente.
        Limite fixo de 500 registros.
      operationId: callsUpcoming
      responses:
        "200":
          description: Lista de calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Call'
                maxItems: 500

  # ══════════════════════════════════════════════════════════════════════════
  # SHEETS SYNC
  # ══════════════════════════════════════════════════════════════════════════

  /api/sheets/status:
    get:
      tags: [Sheets Sync]
      summary: Status da sincronização
      description: Retorna estado atual do sync sem disparar nova sincronização.
      operationId: sheetsStatus
      responses:
        "200":
          description: Status do sync
          content:
            application/json:
              schema:
                type: object
                properties:
                  sheets_configured:
                    type: boolean
                  last_sync:
                    type: string
                    format: date-time
                    nullable: true
                  last_result:
                    type: object
                    nullable: true
                    properties:
                      updated:
                        type: integer
                      created:
                        type: integer
                      errors:
                        type: integer
                  payments_sheet:
                    type: string
                    nullable: true
                  contracts_sheet:
                    type: string
                    nullable: true

  /api/sheets/sync:
    post:
      tags: [Sheets Sync]
      summary: Disparar sync manual
      description: Força sincronização imediata dos Google Sheets. Bloqueia até concluir.
      operationId: sheetsSync
      responses:
        "200":
          description: Resultado do sync
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                  created:
                    type: integer
                  errors:
                    type: integer
                  duration_ms:
                    type: integer

  # ══════════════════════════════════════════════════════════════════════════
  # MEDIA
  # ══════════════════════════════════════════════════════════════════════════

  /api/media/presign:
    get:
      tags: [Media]
      summary: Gerar URL presignada (S3)
      description: |
        Gera URL temporária para acesso direto ao arquivo no Hetzner S3.
        Válida por ~1 hora. Use para streaming de áudio/vídeo no browser.
      operationId: mediaPresign
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          example: "evolution-api/uuid/5511999990000@s.whatsapp.net/audioMessage/abc.ogg"
      responses:
        "200":
          description: URL presignada
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                  bucket:
                    type: string
                  endpoint:
                    type: string
        "400":
          description: Parâmetro key ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/media/stream:
    get:
      tags: [Media]
      summary: Stream de arquivo S3 via backend
      description: |
        Faz proxy do arquivo S3 através do backend para evitar CORS.
        Resposta é binária com Content-Type correto.
      operationId: mediaStream
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          example: "evolution-api/uuid/5511999990000@s.whatsapp.net/audioMessage/abc.ogg"
      responses:
        "200":
          description: Conteúdo binário do arquivo
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Arquivo não encontrado no S3

  # ══════════════════════════════════════════════════════════════════════════
  # STORAGE & SEARCH
  # ══════════════════════════════════════════════════════════════════════════

  /api/storage/process:
    post:
      tags: [Storage & Search]
      summary: Processar arquivo
      description: |
        Dispara pipeline de processamento para um arquivo já registrado em `sp_arquivos`:
        download → extração de texto → chunking → embedding → pgvector.

        Resposta imediata — processamento ocorre em background thread.
        Poll `GET /api/storage/files` ou `GET /api/storage/status` para acompanhar.
      operationId: storageProcess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [arquivo_id]
              properties:
                arquivo_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Processamento iniciado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "processing"
                  arquivo_id:
                    type: string
                    format: uuid

  /api/storage/search:
    post:
      tags: [Storage & Search]
      summary: Busca semântica em arquivos
      description: |
        Busca nos chunks processados usando similaridade vetorial (pgvector).

        **Modos:**
        - `semantic` — cosine similarity via embedding
        - `keyword` — full-text search Postgres
        - `hybrid` — combina os dois (padrão)
      operationId: storageSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  example: "protocolo de atendimento para clientes inativos"
                mode:
                  type: string
                  enum: [semantic, keyword, hybrid]
                  default: hybrid
                limit:
                  type: integer
                  default: 10
                  maximum: 50
                filters:
                  type: object
                  properties:
                    entidade_tipo:
                      type: string
                      enum: [mentorado, equipe, global]
                    entidade_id:
                      type: integer
      responses:
        "200":
          description: Resultados da busca
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchResult'
                  total:
                    type: integer
                  query:
                    type: string
                  mode:
                    type: string
                  query_time_ms:
                    type: integer

  /api/storage/files:
    get:
      tags: [Storage & Search]
      summary: Listar arquivos
      description: Lista arquivos em `sp_arquivos` com filtros opcionais por entidade.
      operationId: storageFiles
      parameters:
        - name: entidade_tipo
          in: query
          schema:
            type: string
            enum: [mentorado, equipe, global]
        - name: entidade_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Lista de arquivos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Arquivo'

  /api/storage/status:
    get:
      tags: [Storage & Search]
      summary: Status do sistema de storage
      description: Visão geral de arquivos, chunks, fila e providers configurados.
      operationId: storageStatus
      responses:
        "200":
          description: Status do storage
          content:
            application/json:
              schema:
                type: object
                properties:
                  overview:
                    type: array
                    items:
                      type: object
                      properties:
                        entidade_tipo:
                          type: string
                        total_arquivos:
                          type: integer
                        total_chunks:
                          type: integer
                        tamanho_total_mb:
                          type: number
                        pendentes:
                          type: integer
                        com_erro:
                          type: integer
                  queue:
                    type: array
                    items:
                      $ref: '#/components/schemas/Arquivo'
                  embedding_provider:
                    type: string
                  embedding_dims:
                    type: integer
                  voyage_configured:
                    type: boolean
                  openai_configured:
                    type: boolean
                  gemini_configured:
                    type: boolean

  /api/storage/reprocess:
    post:
      tags: [Storage & Search]
      summary: Reprocessar arquivos com falha
      description: |
        Reenfileira arquivos em `pendente` ou `erro` para reprocessamento.
        Taxa: 5 arquivos/segundo para não estourar limites da Voyage AI / OpenAI.
      operationId: storageReprocess
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pendente, erro, all]
                  default: pendente
      responses:
        "200":
          description: Reprocessamento iniciado
          content:
            application/json:
              schema:
                type: object
                properties:
                  queued:
                    type: integer
                  status_filter:
                    type: string

  /api/storage/test:
    post:
      tags: [Storage & Search]
      summary: Testar pipeline de embedding
      description: Executa um embedding de teste para verificar se o pipeline está operacional.
      operationId: storageTest
      responses:
        "200":
          description: Resultado do teste
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  provider:
                    type: string
                  dims:
                    type: integer
                  first_values:
                    type: array
                    items:
                      type: number
                  voyage_key_set:
                    type: boolean
                  openai_key_set:
                    type: boolean

  # ══════════════════════════════════════════════════════════════════════════
  # WELCOME FLOW
  # ══════════════════════════════════════════════════════════════════════════

  /api/welcome-flow/register:
    post:
      tags: [Welcome Flow]
      summary: Registrar novo mentorado (onboarding)
      description: |
        Endpoint público — sem auth. Cria conta de usuário e registro de mentorado.

        Senha temporária gerada automaticamente: `{primeiro_nome_lowercase}{últimos4dígitos_whatsapp}`

        Exemplo: nome="João Silva", whatsapp="11999990000" → senha="joao0000"

        **Idempotente:** se o email já existe, retorna `already_exists: true` ao invés de erro.
      operationId: welcomeFlowRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, email]
              properties:
                nome:
                  type: string
                  example: "João Silva"
                email:
                  type: string
                  format: email
                  example: "joao@silva.com"
                whatsapp:
                  type: string
                  example: "11999990000"
                  description: Usado para derivar senha temporária
      responses:
        "201":
          description: Mentorado registrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user_id:
                    type: integer
                  credentials:
                    type: object
                    properties:
                      email:
                        type: string
                      temp_password:
                        type: string
        "200":
          description: Mentorado já existe
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  already_exists:
                    type: boolean
                    example: true
                  user_id:
                    type: integer

  # ══════════════════════════════════════════════════════════════════════════
  # EVOLUTION / WHATSAPP
  # ══════════════════════════════════════════════════════════════════════════

  /api/evolution/instance-uuid:
    get:
      tags: [Evolution / WhatsApp]
      summary: Info da instância Evolution
      description: Nome da instância e coordenadas S3 para resolução de paths de mídia.
      operationId: evolutionInstanceUuid
      responses:
        "200":
          description: Info da instância
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance:
                    type: string
                    example: "case-spalla"
                  s3_bucket:
                    type: string
                  s3_endpoint:
                    type: string

  /api/evolution/{path}:
    get:
      tags: [Evolution / WhatsApp]
      summary: "Proxy GET → Evolution API"
      description: |
        Todas as requests para `/api/evolution/*` são proxiadas para a Evolution API,
        com injeção automática do `apikey` server-side.

        **Exemplos de paths úteis:**
        - `GET /api/evolution/chat/findMessages/case-spalla` — busca mensagens
        - `GET /api/evolution/chat/findContacts/case-spalla` — lista contatos
        - `GET /api/evolution/instance/connectionState/case-spalla` — status de conexão

        Veja [Evolution API docs](https://doc.evolution-api.com) para o catálogo completo.
      operationId: evolutionProxyGet
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          example: "chat/findContacts/case-spalla"
      responses:
        "200":
          description: Resposta da Evolution API (pass-through)

    post:
      tags: [Evolution / WhatsApp]
      summary: "Proxy POST → Evolution API"
      description: |
        **Exemplos:**
        - `POST /api/evolution/message/sendText/case-spalla` — enviar mensagem de texto
        - `POST /api/evolution/message/sendMedia/case-spalla` — enviar mídia
      operationId: evolutionProxyPost
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Resposta da Evolution API

    put:
      tags: [Evolution / WhatsApp]
      summary: "Proxy PUT → Evolution API"
      operationId: evolutionProxyPut
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Resposta da Evolution API

    delete:
      tags: [Evolution / WhatsApp]
      summary: "Proxy DELETE → Evolution API"
      operationId: evolutionProxyDelete
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resposta da Evolution API

  # ══════════════════════════════════════════════════════════════════════════
  # CLICKUP [planned]
  # ══════════════════════════════════════════════════════════════════════════

  /api/clickup/tasks:
    get:
      tags: [ClickUp]
      summary: Listar tarefas
      description: |
        **[planned]** Lista tarefas do workspace ClickUp com filtros.

        Requer: `CLICKUP_API_TOKEN` + `CLICKUP_WORKSPACE_ID` no ambiente.
      operationId: clickupListTasks
      x-status: planned
      parameters:
        - name: list_id
          in: query
          schema:
            type: string
          description: ID da lista/sprint. Usa lista padrão se omitido.
          example: "901113377455"
        - name: status
          in: query
          schema:
            type: string
          example: "in progress"
        - name: mentorado_id
          in: query
          schema:
            type: integer
          description: Filtra tarefas vinculadas a um mentorado específico
        - name: assignee
          in: query
          schema:
            type: string
          description: Username do membro
      responses:
        "200":
          description: Lista de tarefas
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClickUpTask'
                  total:
                    type: integer

    post:
      tags: [ClickUp]
      summary: Criar tarefa
      description: |
        **[planned]** Cria uma nova tarefa no ClickUp.

        Pode ser chamado via N8N quando uma mensagem WhatsApp exige follow-up,
        ou por agente de IA após análise do contexto do mentorado.
      operationId: clickupCreateTask
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionCreateTaskPayload'
      responses:
        "201":
          description: Tarefa criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  task:
                    $ref: '#/components/schemas/ClickUpTask'

  /api/clickup/tasks/{task_id}:
    patch:
      tags: [ClickUp]
      summary: Atualizar tarefa
      description: |
        **[planned]** Atualiza status, assignees ou outros campos de uma tarefa.
      operationId: clickupUpdateTask
      x-status: planned
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "complete"
                assignees:
                  type: object
                  properties:
                    add:
                      type: array
                      items:
                        type: integer
                    rem:
                      type: array
                      items:
                        type: integer
                due_date:
                  type: string
                  format: date
                priority:
                  type: integer
                  enum: [1, 2, 3, 4]
      responses:
        "200":
          description: Tarefa atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClickUpTask'

  /api/clickup/tasks/{task_id}/comments:
    post:
      tags: [ClickUp]
      summary: Comentar em tarefa
      description: |
        **[planned]** Adiciona comentário em uma tarefa do ClickUp.
        Útil para N8N logar eventos ("Call realizada às 10h").
      operationId: clickupAddComment
      x-status: planned
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment_text]
              properties:
                comment_text:
                  type: string
                  example: "Call realizada. PA revisado. Próxima call: 24/04."
      responses:
        "201":
          description: Comentário adicionado

  /api/clickup/lists:
    get:
      tags: [ClickUp]
      summary: Listar sprints/listas
      description: |
        **[planned]** Retorna as listas/sprints disponíveis no workspace.
        Útil para popular dropdowns de seleção de sprint ao criar tarefas.
      operationId: clickupListLists
      x-status: planned
      responses:
        "200":
          description: Listas disponíveis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClickUpList'

  /api/clickup/members:
    get:
      tags: [ClickUp]
      summary: Listar membros do workspace
      description: |
        **[planned]** Retorna membros do workspace com seus IDs numéricos.
        Necessário para assignee lookup ao criar/atualizar tarefas.
      operationId: clickupListMembers
      x-status: planned
      responses:
        "200":
          description: Membros do workspace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClickUpMember'

  # ══════════════════════════════════════════════════════════════════════════
  # ACTIONS [planned]
  # ══════════════════════════════════════════════════════════════════════════

  /api/actions/create-task:
    post:
      tags: [Actions]
      summary: Criar tarefa ClickUp (com contexto Spalla)
      description: |
        **[planned]** Ação composta: cria tarefa no ClickUp e vincula ao mentorado no Spalla.

        Ideal para ser chamado por:
        - N8N quando Evolution detecta mensagem sem resposta há X horas
        - Agente de IA após análise do contexto do mentorado
        - WhatsApp: enviar mensagem específica → N8N → esta action

        O campo `whatsapp_context` preserva o contexto da mensagem original.
      operationId: actionCreateTask
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionCreateTaskPayload'
            examples:
              from_wa:
                summary: Criado a partir de mensagem WhatsApp
                value:
                  name: "Follow up — João Silva sem resposta"
                  list_id: "901113377455"
                  mentorado_id: 7
                  priority: 2
                  assignees: ["heitor"]
                  whatsapp_context:
                    remoteJid: "5511999990000@s.whatsapp.net"
                    mensagem: "Oi, queria saber sobre a call da semana passada"
                    timestamp: 1713600000
              manual:
                summary: Criado manualmente (sem contexto WhatsApp)
                value:
                  name: "Revisar PA — João Silva estagnado"
                  list_id: "901113377455"
                  mentorado_id: 7
                  priority: 3
      responses:
        "201":
          description: Tarefa criada e vinculada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  task:
                    $ref: '#/components/schemas/ClickUpTask'
                  spalla_linked:
                    type: boolean

  /api/actions/log-interaction:
    post:
      tags: [Actions]
      summary: Registrar interação
      description: |
        **[planned]** Registra uma interação manualmente em `interacoes_mentoria`.

        Útil para N8N logar:
        - Mensagem enviada manualmente fora do Evolution
        - Nota interna da equipe
        - Call não agendada pelo sistema
      operationId: actionLogInteraction
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionLogInteractionPayload'
      responses:
        "201":
          description: Interação registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  interacao_id:
                    type: integer

  /api/actions/schedule-call-from-message:
    post:
      tags: [Actions]
      summary: Agendar call a partir de mensagem WhatsApp
      description: |
        **[planned]** Ação composta para fluxo WhatsApp → Agendar Call:

        1. Recebe contexto da mensagem WhatsApp
        2. Identifica o mentorado pelo número
        3. Cria Zoom + Calendar + calls_mentoria
        4. Envia confirmação de volta via WhatsApp (Evolution API)

        Ideal para comando via WhatsApp: "agendar call para amanhã às 10h"
      operationId: actionScheduleCallFromMessage
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [remoteJid, data]
              properties:
                remoteJid:
                  type: string
                  description: JID do contato WhatsApp
                  example: "5511999990000@s.whatsapp.net"
                data:
                  type: string
                  format: date
                  example: "2026-04-11"
                horario:
                  type: string
                  example: "10:00"
                tipo:
                  type: string
                  enum: [acompanhamento, diagnostico, planejamento]
                  default: acompanhamento
                confirm_via_whatsapp:
                  type: boolean
                  default: true
                  description: Se true, envia mensagem de confirmação via Evolution
      responses:
        "200":
          description: Call agendada e confirmação enviada
          content:
            application/json:
              schema:
                type: object
                properties:
                  scheduled:
                    type: boolean
                  call:
                    $ref: '#/components/schemas/Call'
                  confirmation_sent:
                    type: boolean
                  zoom:
                    $ref: '#/components/schemas/ZoomMeeting'

  # ══════════════════════════════════════════════════════════════════════════
  # WEBHOOKS [planned]
  # ══════════════════════════════════════════════════════════════════════════

  /api/webhooks/evolution:
    post:
      tags: [Webhooks]
      summary: Receptor de eventos Evolution API
      description: |
        **[planned]** Recebe eventos da Evolution API via webhook.

        Configure na Evolution API:
        `POST /webhook/set/case-spalla` com URL: `https://spalla-backend.up.railway.app/api/webhooks/evolution`

        **Eventos processados:**
        - `messages.upsert` — nova mensagem recebida → registra em `interacoes_mentoria`, atualiza `respondido`
        - `messages.update` — atualização de status (lida, entregue)
        - `connection.update` — mudança de estado da conexão WhatsApp

        **Fluxo padrão:**
        mensagem recebida → identifica mentorado → registra interação → verifica regras de auto-resposta N8N
      operationId: webhookEvolution
      x-status: planned
      security:
        - {} # Autenticação via header X-Evolution-Token
      parameters:
        - name: X-Evolution-Token
          in: header
          schema:
            type: string
          description: Token de validação configurado na Evolution API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvolutionWebhookPayload'
      responses:
        "200":
          description: Evento processado
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                  processed:
                    type: boolean
                  interaction_id:
                    type: integer
                    nullable: true

  /api/webhooks/n8n:
    post:
      tags: [Webhooks]
      summary: Receptor genérico N8N
      description: |
        **[planned]** Endpoint genérico para receber triggers do N8N.

        Suporta um campo `action` que determina o que fazer:
        - `create_task` — cria tarefa no ClickUp
        - `log_interaction` — registra interação no Spalla
        - `sync_sheets` — dispara sync de Sheets
        - `schedule_call` — agenda call

        Facilita automações complexas em N8N sem precisar de múltiplos endpoints.
      operationId: webhookN8n
      x-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [create_task, log_interaction, sync_sheets, schedule_call]
                payload:
                  type: object
                  description: Dados específicos da ação (veja endpoints individuais)
                source:
                  type: string
                  description: Identificador do workflow N8N
                  example: "whatsapp-auto-responder-v2"
      responses:
        "200":
          description: Ação executada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  action:
                    type: string
                  result:
                    type: object

  # ══════════════════════════════════════════════════════════════════════════
  # SYSTEM
  # ══════════════════════════════════════════════════════════════════════════

  /api/health:
    get:
      tags: [System]
      summary: Health check
      description: Retorna status operacional de todas as integrações. Sem auth.
      operationId: health
      responses:
        "200":
          description: Status do servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  zoom_configured:
                    type: boolean
                  gcal_configured:
                    type: boolean
                  supabase_configured:
                    type: boolean
                  sheets_configured:
                    type: boolean
                  openai_configured:
                    type: boolean
                  storage_search:
                    type: boolean
                  evolution_configured:
                    type: boolean
                  s3_configured:
                    type: boolean
              example:
                status: "ok"
                zoom_configured: true
                gcal_configured: true
                supabase_configured: true
                sheets_configured: false
                openai_configured: true
                storage_search: true
                evolution_configured: true
                s3_configured: true
