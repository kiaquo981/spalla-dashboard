      tags: [Mentees]
      summary: Atualizar campos do mentorado
      description: |
        Atualiza campos específicos de um mentorado: fase da jornada,
        snooze (silenciar temporariamente) e status do WhatsApp.
      operationId: updateMentee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do mentorado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenteeRequest"
      responses:
        "200":
          description: Mentorado atualizado
          content:
            application/json:
              schema:
                type: object
                description: Mentorado com campos atualizados
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mentees/bulk:
    patch:
      tags: [Mentees]
      summary: Bulk update mentorados
      description: |
        Atualiza múltiplos mentorados de uma vez. Recebe uma lista de IDs
        e os campos a serem atualizados (fase_jornada, snoozed_until).
      operationId: bulkUpdateMentees
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateRequest"
      responses:
        "200":
          description: Mentorados atualizados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpdateResponse"
        "400":
          description: IDs ou updates ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Mentee Groups ───────────────────────────────────────
  /api/mentee-groups:
    get:
      tags: [Mentee Groups]
      summary: Listar grupos com member counts
      description: Retorna todos os grupos de mentorados com contagem e IDs dos membros.
      operationId: listMenteeGroups
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de grupos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenteeGroup"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Mentee Groups]
      summary: Criar grupo
      description: Cria um novo grupo de mentorados com nome, cor e ícone opcionais.
      operationId: createMenteeGroup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Grupo criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenteeGroup"
        "400":
          description: Nome ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mentee-groups/{id}:
    delete:
      tags: [Mentee Groups]
      summary: Deletar grupo
      description: Remove um grupo de mentorados. Os mentorados não são afetados.
      operationId: deleteMenteeGroup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do grupo
      responses:
        "200":
          description: Grupo deletado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grupo não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mentee-groups/{id}/members:
    get:
      tags: [Mentee Groups]
      summary: Listar membros de um grupo
      description: Retorna os mentorados que pertencem ao grupo especificado.
      operationId: listGroupMembers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do grupo
      responses:
        "200":
          description: Lista de membros
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Mentee Groups]
      summary: Adicionar mentorado ao grupo
      description: Adiciona um mentorado como membro do grupo especificado.
      operationId: addGroupMember
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do grupo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Membro adicionado
          content:
            application/json:
              schema:
                type: object
        "400":
          description: mentee_id ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mentee-groups/{id}/members/{mentee_id}:
    delete:
      tags: [Mentee Groups]
      summary: Remover mentorado do grupo
      description: Remove um mentorado do grupo especificado.
      operationId: removeGroupMember
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do grupo
        - name: mentee_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do mentorado
      responses:
        "200":
          description: Membro removido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Membro não encontrado no grupo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── WhatsApp ────────────────────────────────────────────
  /api/wa/inbox:
    get:
      tags: [WhatsApp]
      summary: Inbox de mentorados
      description: |
        Retorna a inbox do WhatsApp com dados da view `vw_wa_mentee_inbox`.
        Suporta filtros por saúde, fase, busca textual e ordenação.
      operationId: getWaInbox
      parameters:
        - name: health_status
          in: query
          schema:
            type: string
            enum: [verde, amarelo, vermelho, snoozed]
          description: Filtrar por status de saúde
        - name: fase_jornada
          in: query
          schema:
            type: string
            enum: [onboarding, execucao, resultado, renovacao]
          description: Filtrar por fase da jornada
        - name: search
          in: query
          schema:
            type: string
          description: Busca textual no nome (ilike)
        - name: sort
          in: query
          schema:
            type: string
            enum: [sla_desc, unread_desc, last_message_desc]
            default: sla_desc
          description: Ordenação dos resultados
      responses:
        "200":
          description: Inbox do WhatsApp
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxItem"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/wa/media:
    get:
      tags: [WhatsApp]
      summary: Mídia WA de mentorado
      description: Retorna os arquivos de mídia do WhatsApp associados ao mentorado.
      operationId: getWaMedia
      parameters:
        - name: mentee_id
          in: query
          required: true
          schema:
            type: integer
          description: ID do mentorado
      responses:
        "200":
          description: Lista de arquivos de mídia
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaMediaItem"
        "400":
          description: mentee_id ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/wa/labels/summary:
    get:
      tags: [WhatsApp]
      summary: Contagem de labels por tipo de tópico
      description: |
        Retorna a contagem de labels (tópicos) agrupados por slug.
        Opcionalmente filtra por mentorado e janela de tempo.
      operationId: getWaLabelsSummary
      parameters:
        - name: mentee_id
          in: query
          schema:
            type: integer
          description: Filtrar por mentorado (opcional)
        - name: days
          in: query
          schema:
            type: integer
            default: 30
          description: Janela de tempo em dias
      responses:
        "200":
          description: Resumo de labels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelSummaryItem"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/wa/presence/{mentorado_id}:
    get:
      tags: [WhatsApp]
      summary: Presenças ativas (últimos 60s)
      description: |
        Retorna os usuários que estão ativamente visualizando a conversa
        com o mentorado especificado (heartbeat nos últimos 60 segundos).
      operationId: getWaPresence
      parameters:
        - name: mentorado_id
          in: path
          required: true
          schema:
            type: integer
          description: ID do mentorado
      responses:
        "200":
          description: Lista de presenças ativas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceItem"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/wa/presence:
    post:
      tags: [WhatsApp]
      summary: Heartbeat de presença
      description: |
        Registra que um usuário está ativo na conversa de um mentorado.
        Deve ser chamado periodicamente (a cada ~30s) para manter presença.
      operationId: sendPresenceHeartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceHeartbeatRequest"
      responses:
        "200":
          description: Presença registrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [WhatsApp]
      summary: Limpar presença
      description: Remove a presença de um usuário na conversa de um mentorado.
      operationId: clearPresence
      parameters:
        - name: mentorado_id
          in: query
          required: true
          schema:
            type: integer
          description: ID do mentorado
        - name: user_email
          in: query
          required: true
          schema:
            type: string
            format: email
          description: Email do usuário
      responses:
        "200":
          description: Presença removida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Parâmetros ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Scheduling ──────────────────────────────────────────
  /api/schedule-call:
    post:
      tags: [Scheduling]
      summary: Agendar call (orquestração completa)
      description: |
        Orquestra criação completa de uma call: cria reunião no Zoom,
        evento no Google Calendar e registro no banco de dados.
        Fluxo: Zoom → Calendar → DB (calls_mentoria).
      operationId: scheduleCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleCallRequest"
      responses:
        "200":
          description: Call agendada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  zoom:
                    type: object
                    description: Dados da reunião Zoom criada
                  calendar:
                    type: object
                    description: Dados do evento Calendar criado
                  db:
                    type: object
                    description: Registro inserido no banco
        "400":
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro na criação (Zoom, Calendar ou DB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/zoom/create-meeting:
    post:
      tags: [Scheduling]
      summary: Criar reunião Zoom standalone
      description: Cria uma reunião no Zoom sem integração com Calendar ou banco.
      operationId: createZoomMeeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoomMeetingRequest"
      responses:
        "200":
          description: Reunião Zoom criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  join_url:
                    type: string
                    format: uri
                  start_url:
                    type: string
                    format: uri
                  topic:
                    type: string
        "500":
          description: Erro ao criar reunião
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/calendar/create-event:
    post:
      tags: [Scheduling]
      summary: Criar evento no Google Calendar
      description: Cria um evento no Google Calendar com os dados fornecidos.
      operationId: createCalendarEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEventRequest"
      responses:
        "200":
          description: Evento criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  htmlLink:
                    type: string
                    format: uri
                  summary:
                    type: string
                  start:
                    type: object
                  end:
                    type: object
        "500":
          description: Erro ao criar evento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/calendar/events:
    get:
      tags: [Scheduling]
      summary: Listar próximos eventos
      description: Retorna os próximos eventos do Google Calendar configurado.
      operationId: listCalendarEvents
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "500":
          description: Erro ao listar eventos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/calendar/event/{event_id}:
    delete:
      tags: [Scheduling]
      summary: Deletar evento do Calendar
      description: Remove um evento do Google Calendar pelo ID.
      operationId: deleteCalendarEvent
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
          description: ID do evento no Google Calendar
      responses:
        "200":
          description: Evento deletado
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Evento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro ao deletar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/calls/upcoming:
    get:
      tags: [Scheduling]
      summary: Listar calls agendadas
      description: |
        Retorna as calls registradas na tabela calls_mentoria,
        ordenadas por data decrescente (limite 500).
      operationId: listUpcomingCalls
      responses:
        "200":
          description: Lista de calls
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    mentorado:
                      type: string
                    data:
                      type: string
                      format: date
                    tipo:
                      type: string
                    zoom_link:
                      type: string
                    status:
                      type: string
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Sheets Sync ─────────────────────────────────────────
  /api/sheets/status:
    get:
      tags: [Sheets Sync]
      summary: Status da sincronização
      description: |
        Retorna informações sobre a configuração e último estado de
        sincronização entre Google Sheets e Supabase.
      operationId: getSheetsSyncStatus
      responses:
        "200":
          description: Status da sync
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetsSyncStatus"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sheets/sync:
    post:
      tags: [Sheets Sync]
      summary: Disparar sync manual
      description: |
        Dispara sincronização manual das planilhas Google Sheets
        (pagamentos e contratos) para o Supabase.
      operationId: triggerSheetsSync
      responses:
        "200":
          description: Resultado da sincronização
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  synced:
                    type: integer
                    description: Número de registros sincronizados
                  errors:
                    type: array
                    items:
                      type: string
        "500":
          description: Erro na sincronização
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Media ───────────────────────────────────────────────
  /api/media/presign:
    get:
      tags: [Media]
      summary: Gerar URL presignada S3
      description: |
        Gera uma URL presignada para acesso direto a um arquivo
        no Hetzner S3. Útil para downloads ou exibição de mídia.
      operationId: getPresignedUrl
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: "Caminho do objeto no S3 (ex: media/audio/abc123.ogg)"
      responses:
        "200":
          description: URL presignada gerada
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                  bucket:
                    type: string
                  endpoint:
                    type: string
        "400":
          description: Parâmetro key ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro ao gerar URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/media/stream:
    get:
      tags: [Media]
      summary: Stream de arquivo S3 (proxy)
      description: |
        Faz proxy/stream de um arquivo do Hetzner S3, retornando o conteúdo
        binário com o content-type correto. Usado para reprodução de áudio/vídeo
        e exibição de imagens diretamente no frontend.
      operationId: streamMedia
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: Caminho do objeto no S3
      responses:
        "200":
          description: Conteúdo binário do arquivo
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
            audio/*:
              schema:
                type: string
                format: binary
            video/*:
              schema:
                type: string
                format: binary
        "400":
          description: Parâmetro key ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Arquivo não encontrado no S3
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro ao acessar S3
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Storage & Search ────────────────────────────────────
  /api/storage/process:
    post:
      tags: [Storage & Search]
      summary: Processar arquivo
      description: |
        Pipeline completo de processamento: download do arquivo,
        extração de texto, chunking, geração de embeddings e
        armazenamento no pgvector para busca semântica.
      operationId: processFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessFileRequest"
      responses:
        "200":
          description: Arquivo processado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  chunks:
                    type: integer
                    description: Número de chunks gerados
                  arquivo_id:
                    type: integer
        "400":
          description: arquivo_id ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro no processamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/storage/search:
    post:
      tags: [Storage & Search]
      summary: Busca semântica/keyword/hybrid
      description: |
        Realiza busca nos documentos processados usando três modos:
        - **semantic**: busca por similaridade de embeddings (pgvector)
        - **keyword**: busca textual (full-text search)
        - **hybrid**: combinação de ambos (padrão)

        Aceita filtros opcionais por entidade (mentorado, equipe, global).
      operationId: searchStorage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Resultados da busca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Query ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro na busca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/storage/files:
    get:
      tags: [Storage & Search]
      summary: Listar arquivos
      description: |
        Retorna a lista de arquivos registrados na tabela sp_arquivos.
        Pode ser filtrado por tipo e ID da entidade.
      operationId: listStorageFiles
      parameters:
        - name: entidade_tipo
          in: query
          schema:
            type: string
            enum: [mentorado, equipe, global]
          description: Filtrar por tipo de entidade
        - name: entidade_id
          in: query
          schema:
            type: integer
          description: Filtrar por ID da entidade
      responses:
        "200":
          description: Lista de arquivos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    nome:
                      type: string
                    mime_type:
                      type: string
                    status:
                      type: string
                    entidade_tipo:
                      type: string
                    entidade_id:
                      type: integer
                    created_at:
                      type: string
                      format: date-time
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/storage/status:
    get:
      tags: [Storage & Search]
      summary: Status do sistema de storage
      description: |
        Retorna informações sobre o estado do sistema de storage:
        visão geral, fila de processamento e provedores configurados.
      operationId: getStorageStatus
      responses:
        "200":
          description: Status do storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageStatus"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/storage/test:
    post:
      tags: [Storage & Search]
      summary: Testar pipeline de embedding
      description: |
        Executa um teste do pipeline de embedding, retornando as
        dimensões do vetor e informações do provedor configurado.
      operationId: testStoragePipeline
      responses:
        "200":
          description: Resultado do teste
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  dimensions:
                    type: integer
                    description: Dimensões do vetor de embedding
                  provider:
                    type: string
                    description: Provedor de embeddings em uso
        "500":
          description: Erro no teste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/storage/reprocess:
    post:
      tags: [Storage & Search]
      summary: Reprocessar arquivos com falha
      description: |
        Reprocessa arquivos que falharam ou estão pendentes.
        Seleciona por status: pendente, erro ou todos.
      operationId: reprocessFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReprocessRequest"
      responses:
        "200":
          description: Resultado do reprocessamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  reprocessed:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        "500":
          description: Erro no reprocessamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Copilot ─────────────────────────────────────────────
  /api/copilot:
    post:
      tags: [Copilot]
      summary: AI assistant contextual
      description: |
        Assistente de IA contextual para consultores. Utiliza GPT-4o-mini
        com enriquecimento de contexto do mentorado (quando mentee_id é
        fornecido). Suporta histórico de conversa para contexto multi-turn.
      operationId: askCopilot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopilotRequest"
      responses:
        "200":
          description: Resposta do Copilot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopilotResponse"
        "400":
          description: message ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro na geração da resposta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Dossiê Production ───────────────────────────────────
  /api/ds/update-stage:
    post:
      tags: [Dossiê Production]
      summary: Atualizar estágio de dossiê (state machine)
      description: |
        Atualiza o estágio de produção de um dossiê seguindo uma state machine.
        Transições inválidas retornam 409.

        **Transições válidas:**
        pendente → producao_ia → revisao_mariza → revisao_kaique →
        revisao_queila → aprovado → publicado

        Requer JWT com role `admin` ou `equipe`.
      operationId: updateDossieStage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStageRequest"
      responses:
        "200":
          description: Estágio atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStageResponse"
        "400":
          description: Campos obrigatórios ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token ausente, inválido ou role insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Transição de estado inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Biblioteca ──────────────────────────────────────────
  /api/biblioteca:
    get:
      tags: [Biblioteca]
      summary: Listar documentos ou buscar por slug
      description: |
        Sem parâmetros: retorna lista de documentos (sem conteúdo) da view
        `vw_sp_documentos_lista`.

        Com `slug`: retorna documento único identificado pelo deep_link_slug.

        Com `mentee_id` e/ou `tipo`: filtra a listagem.
      operationId: listBiblioteca
      parameters:
        - name: slug
          in: query
          schema:
            type: string
          description: deep_link_slug do documento (retorna documento único)
        - name: mentee_id
          in: query
          schema:
            type: integer
          description: Filtrar por mentorado
        - name: tipo
          in: query
          schema:
            type: string
          description: Filtrar por tipo de documento
      responses:
        "200":
          description: Lista de documentos ou documento único
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: "#/components/schemas/DocumentListItem"
                  - $ref: "#/components/schemas/DocumentFull"
        "404":
          description: Documento não encontrado (quando slug fornecido)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/biblioteca/{id}:
    get:
      tags: [Biblioteca]
      summary: Documento por UUID (com conteúdo)
      description: |
        Retorna documento completo incluindo o campo conteudo_md
        (conteúdo em Markdown).
      operationId: getBibliotecaDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do documento
      responses:
        "200":
          description: Documento completo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentFull"
        "404":
          description: Documento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Welcome Flow ────────────────────────────────────────
  /api/welcome-flow/register:
    post:
      tags: [Welcome Flow]
      summary: Onboarding de novo mentorado (público, idempotente)
      description: |
        Registra um novo mentorado no fluxo de boas-vindas. Endpoint público
        (sem autenticação). Idempotente: se o email já existe, retorna as
        credenciais existentes sem erro.

        Gera senha temporária automaticamente no formato:
        `{primeiroNome_lowercase}{últimos4digitos_whatsapp}`

        Exemplo: nome "Maria Silva", whatsapp "5511999998888" → senha "maria8888"
      operationId: welcomeFlowRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WelcomeRegisterRequest"
      responses:
        "200":
          description: Mentorado registrado (ou já existente)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomeRegisterResponse"
        "400":
          description: Nome ou email ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Evolution / WhatsApp Proxy ──────────────────────────
  /api/evolution/instance-uuid:
    get:
      tags: [Evolution / WhatsApp]
      summary: Info da instância Evolution
      description: |
        Retorna informações da instância Evolution configurada:
        nome da instância e coordenadas do S3.
      operationId: getEvolutionInstanceInfo
      responses:
        "200":
          description: Informações da instância
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance_name:
                    type: string
                  s3_bucket:
                    type: string
                  s3_endpoint:
                    type: string
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/evolution/{path}:
    get:
      tags: [Evolution / WhatsApp]
      summary: Proxy GET para Evolution API
      description: |
        Proxy transparente para a Evolution API. Injeta automaticamente
        o apikey configurado no servidor. O path é encaminhado integralmente.
      operationId: evolutionProxyGet
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: "Caminho da Evolution API (ex: instance/info)"
      responses:
        "200":
          description: Resposta da Evolution API
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Erro no proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Evolution / WhatsApp]
      summary: Proxy POST para Evolution API
      description: |
        Proxy transparente para a Evolution API (POST).
        Injeta automaticamente o apikey e encaminha body + path.
      operationId: evolutionProxyPost
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Caminho da Evolution API
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Body encaminhado para a Evolution API
      responses:
        "200":
          description: Resposta da Evolution API
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Erro no proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Evolution / WhatsApp]
      summary: Proxy PUT para Evolution API
      description: |
        Proxy transparente para a Evolution API (PUT).
        Injeta automaticamente o apikey e encaminha body + path.
      operationId: evolutionProxyPut
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Caminho da Evolution API
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Body encaminhado para a Evolution API
      responses:
        "200":
          description: Resposta da Evolution API
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Erro no proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Evolution / WhatsApp]
      summary: Proxy DELETE para Evolution API
      description: |
        Proxy transparente para a Evolution API (DELETE).
        Injeta automaticamente o apikey e encaminha o path.
      operationId: evolutionProxyDelete
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Caminho da Evolution API
      responses:
        "200":
          description: Resposta da Evolution API
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Erro no proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── ClickUp ────────────────────────────────────────────
  /api/clickup/command-center:
    get:
      tags: [ClickUp]
      summary: Sprint tasks, team summary, activity
      description: |
        Retorna visão consolidada do Command Center: tasks da sprint atual,
        totais, subtasks, distribuição por status e membro, atividade recente
        e tarefas concluídas. Requer CLICKUP_API_TOKEN configurado no servidor.
      operationId: getClickUpCommandCenter
      responses:
        "200":
          description: Dados do Command Center
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandCenterResponse"
        "500":
          description: Erro ao consultar ClickUp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/clickup/sync-subtasks:
    post:
      tags: [ClickUp]
      summary: Sync subtasks do ClickUp para god_task_subtasks
      description: |
        Busca subtasks do ClickUp e faz upsert na tabela god_task_subtasks
        do Supabase, sincronizando o estado das tarefas.
      operationId: syncClickUpSubtasks
      responses:
        "200":
          description: Resultado da sincronização
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  synced:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        "500":
          description: Erro na sincronização
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── System ──────────────────────────────────────────────

  /:
    get:
      tags: [System]
      summary: Informações do serviço
      description: Retorna informações básicas da API, link para documentação e status.
      operationId: serviceInfo
      responses:
        "200":
          description: Informações do serviço
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: Spalla Dashboard API
                  version:
                    type: string
                    example: "1.0.0"
                  status:
                    type: string
                    example: operational
                  docs:
                    type: string
                    example: https://spalla-dashboard.vercel.app/api-docs
                  health:
                    type: string
                    example: /api/health
                  endpoints:
                    type: integer
                    example: 57

  /api/health:
    get:
      tags: [System]
      summary: Health check
      description: |
        Retorna o status geral do sistema e a configuração das integrações
        (Zoom, Google Calendar, Supabase, Sheets, OpenAI, Storage/Search).
      operationId: healthCheck
      responses:
        "200":
          description: Status do sistema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── API Keys ──────────────────────────────────────────────

  /api/keys:
    get:
      tags: [API Keys]
      summary: Listar API keys
      description: |
        Lista todas as API keys (sem revelar a key completa).
        Mostra apenas o prefixo, label, role, status e timestamps.
        Requer JWT com role admin.
      operationId: listApiKeys
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    key_prefix:
                      type: string
                      example: "sk_spalla_a1b2..."
                    label:
                      type: string
                      example: n8n-production
                    role:
                      type: string
                      enum: [integration, readonly]
                    active:
                      type: boolean
                    created_at:
                      type: string
                      format: date-time
                    last_used_at:
                      type: string
                      format: date-time
                      nullable: true
                    created_by:
                      type: string
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Requer role admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/keys/generate:
    post:
      tags: [API Keys]
      summary: Gerar nova API key
      description: |
        Gera uma nova API key para integrações externas.
        A key completa (`sk_spalla_...`) é retornada **apenas uma vez**.
        Armazene-a com segurança.

        **Uso:**
        ```
        curl -H "X-API-Key: sk_spalla_..." https://web-production-2cde5.up.railway.app/api/mentees
        ```
      operationId: generateApiKey
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  description: Nome descritivo (ex. "n8n-production")
                  example: n8n-production
                role:
                  type: string
                  enum: [integration, readonly]
                  default: integration
                  description: "integration = acesso total, readonly = apenas GET"
      responses:
        "201":
          description: API key gerada
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: Key completa — armazene com segurança
                    example: sk_spalla_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6
                  key_id:
                    type: string
                    format: uuid
                  key_prefix:
                    type: string
                    example: "sk_spalla_a1b2..."
                  label:
                    type: string
                  role:
                    type: string
                  warning:
                    type: string
                    example: "Store this key safely — it will NOT be shown again."
        "400":
          description: Label ausente ou role inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Requer role admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/keys/{key_id}:
    delete:
      tags: [API Keys]
      summary: Revogar API key
      description: Desativa uma API key imediatamente. Irreversível.
      operationId: revokeApiKey
      security:
        - BearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Key revogada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  key_id:
                    type: string
                    format: uuid
                  revoked:
                    type: boolean
                    example: true
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Requer role admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Key não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
