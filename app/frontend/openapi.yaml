openapi: 3.0.3

info:
  title: Spalla Dashboard API
  version: "1.0.0"
  description: |
    API completa do Spalla — plataforma de gestão de mentorados da CASE.

    ## Autenticação

    A API usa JWT personalizado (HMAC-SHA256). Para obter um token:

    1. `POST /api/auth/login` com email + senha
    2. Copie o `access_token` da resposta
    3. Envie `Authorization: Bearer <token>` em todas as requests autenticadas
    4. Quando o token expirar (60 min), use `POST /api/auth/refresh` com o `refresh_token`

    ## Tags

    Os endpoints estão organizados por domínio funcional. Consulte cada tag
    para entender o contexto de cada grupo de rotas.

servers:
  - url: https://web-production-2cde5.up.railway.app
    description: Produção (Railway)
  - url: http://localhost:9999
    description: Desenvolvimento local

tags:
  - name: Auth
    description: Autenticação e gestão de sessão
  - name: Mentees
    description: Dados de mentorados, portfolio, triage, notes, offboard
  - name: Mentee Groups
    description: Agrupamento de mentorados
  - name: WhatsApp
    description: Inbox, media, labels, presence (WA DM v2)
  - name: Scheduling
    description: Agendamento de calls — Zoom + Google Calendar + registro no banco
  - name: Sheets Sync
    description: Sincronização de Google Sheets com Supabase
  - name: Media
    description: Acesso a arquivos de mídia do WhatsApp (Hetzner S3)
  - name: Storage & Search
    description: Pipeline de processamento de arquivos e busca semântica (pgvector)
  - name: Copilot
    description: AI assistant contextual para consultores
  - name: Dossiê Production
    description: Produção e controle de dossiês (state machine)
  - name: Biblioteca
    description: Documentos e dossiês publicados
  - name: Welcome Flow
    description: Onboarding de novos mentorados
  - name: Evolution / WhatsApp
    description: Proxy para Evolution API — WhatsApp via S2S
  - name: ClickUp
    description: Integração com ClickUp para gestão de tarefas e sprints
  - name: API Keys
    description: |
      Gerenciamento de API keys para integrações externas (n8n, webhooks, automações).
      Keys são geradas com prefixo `sk_spalla_` e armazenadas como hash SHA-256.
      A key completa é exibida apenas uma vez na criação.
  - name: System
    description: Health check, status de integrações e informações do serviço

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT HMAC-SHA256. Obtido via POST /api/auth/login.
        TTL do access_token: 60 minutos.
        Renove via POST /api/auth/refresh com o refresh_token.

    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API Key para integrações externas. Gerada via POST /api/keys/generate.
        Envie no header: `X-API-Key: sk_spalla_...`
        Aceito em todos os endpoints que aceitam Bearer JWT.

  schemas:
    # ── Auth ──────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: consultor@case.com.br
        password:
          type: string
          minLength: 6
          example: "s3cur3P@ss"
        fullName:
          type: string
          example: Maria Silva
        role:
          type: string
          enum: [equipe, admin, mentorado]
          default: equipe

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: consultor@case.com.br
        password:
          type: string
          example: "s3cur3P@ss"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    ResetPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    AuthTokenResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: "#/components/schemas/UserSummary"
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Tempo de expiração em segundos
          example: 3600

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"

    # ── Mentees ───────────────────────────────────────────
    MenteeBasic:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
          example: João Oliveira
        email:
          type: string
          format: email

    MenteePortfolioItem:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        email:
          type: string
        health:
          type: string
          enum: [green, yellow, red]
          description: Indicador de saúde do mentorado
        priority_score:
          type: number
          format: float
        snoozed:
          type: boolean
        days_since_activity:
          type: integer
        unread_count:
          type: integer
        negative_topics:
          type: integer
        recent_topics:
          type: array
          items:
            type: string

    TriageItem:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        score:
          type: number
          format: float
        level:
          type: string
        factors:
          type: array
          items:
            type: string

    NoteObject:
      type: object
      properties:
        id:
          type: integer
        mentorado_id:
          type: integer
        tipo:
          type: string
          enum:
            - checkpoint_mensal
            - feedback_aula
            - registro_ligacao
            - livre
            - nota_livre
        conteudo:
          type: object
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string

    CreateNoteRequest:
      type: object
      required: [tipo]
      properties:
        tipo:
          type: string
          enum:
            - checkpoint_mensal
            - feedback_aula
            - registro_ligacao
            - livre
            - nota_livre
        conteudo:
          type: object
          description: Conteúdo livre da nota (JSON)
        tags:
          type: array
          items:
            type: string

    OffboardRequest:
      type: object
      required: [motivo]
      properties:
        motivo:
          type: string
          enum: [reembolso, conclusao, cancelamento, outro]
        obs:
          type: string

    UpdateMenteeRequest:
      type: object
      properties:
        fase_jornada:
          type: string
          enum: [onboarding, execucao, resultado, renovacao, encerrado]
        snoozed_until:
          type: string
          format: date-time
        wa_status:
          type: string
          enum: [aguardando, em_andamento, bloqueado, resolvido]

    BulkUpdateRequest:
      type: object
      required: [ids, updates]
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
        updates:
          type: object
          properties:
            fase_jornada:
              type: string
              enum: [onboarding, execucao, resultado, renovacao, encerrado]
            snoozed_until:
              type: string
              format: date-time

    BulkUpdateResponse:
      type: object
      properties:
        updated:
          type: integer
        mentees:
          type: array
          items:
            type: object

    # ── Mentee Groups ─────────────────────────────────────
    MenteeGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        cor:
          type: string
          example: "#6366f1"
        icon:
          type: string
          example: folder
        member_count:
          type: integer
        member_ids:
          type: array
          items:
            type: string
            format: uuid

    CreateGroupRequest:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: Turma Q1 2026
        cor:
          type: string
          default: "#6366f1"
          example: "#6366f1"
        icon:
          type: string
          default: folder
          example: folder

    AddMemberRequest:
      type: object
      required: [mentee_id]
      properties:
        mentee_id:
          type: string
          format: uuid

    # ── WhatsApp ──────────────────────────────────────────
    InboxItem:
      type: object
      description: Linha da view vw_wa_mentee_inbox
      properties:
        id:
          type: integer
        nome:
          type: string
        health_status:
          type: string
          enum: [verde, amarelo, vermelho, snoozed]
        fase_jornada:
          type: string
        unread_count:
          type: integer
        last_message_at:
          type: string
          format: date-time
        sla_hours:
          type: number

    WaMediaItem:
      type: object
      properties:
        id:
          type: integer
        media_key:
          type: string
        mime_type:
          type: string
        file_name:
          type: string
        created_at:
          type: string
          format: date-time

    LabelSummaryItem:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        count:
          type: integer

    PresenceItem:
      type: object
      properties:
        user_email:
          type: string
          format: email
        user_name:
          type: string
        last_seen:
          type: string
          format: date-time

    PresenceHeartbeatRequest:
      type: object
      required: [mentorado_id, user_email]
      properties:
        mentorado_id:
          type: integer
        user_email:
          type: string
          format: email
        user_name:
          type: string

    # ── Scheduling ────────────────────────────────────────
    ScheduleCallRequest:
      type: object
      required: [mentorado, data]
      properties:
        mentorado:
          type: string
          description: Nome do mentorado
        data:
          type: string
          format: date
          example: "2026-04-01"
        mentorado_id:
          type: integer
        email:
          type: string
          format: email
        tipo:
          type: string
          enum: [acompanhamento, diagnostico, planejamento, onboarding, estrategia]
          default: acompanhamento
        horario:
          type: string
          pattern: '^\d{2}:\d{2}$'
          default: "10:00"
          example: "10:00"
        duracao:
          type: integer
          default: 60
          description: Duração em minutos
        notas:
          type: string

    CreateZoomMeetingRequest:
      type: object
      properties:
        topic:
          type: string
        start_time:
          type: string
          format: date-time
        duration:
          type: integer
          default: 60
        invitees:
          type: array
          items:
            type: string
            format: email

    CreateCalendarEventRequest:
      type: object
      properties:
        summary:
          type: string
        start_iso:
          type: string
          format: date-time
        end_iso:
          type: string
          format: date-time
        description:
          type: string
        attendees:
          type: array
          items:
            type: string
            format: email
        location:
          type: string

    # ── Sheets Sync ───────────────────────────────────────
    SheetsSyncStatus:
      type: object
      properties:
        sheets_configured:
          type: boolean
        last_sync:
          type: string
          format: date-time
          nullable: true
        last_result:
          type: string
          nullable: true
        payments_sheet:
          type: string
          nullable: true
        contracts_sheet:
          type: string
          nullable: true

    # ── Storage & Search ──────────────────────────────────
    ProcessFileRequest:
      type: object
      properties:
        arquivo_id:
          type: integer

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          example: "plano de ação mentorado"
        mode:
          type: string
          enum: [semantic, keyword, hybrid]
          default: hybrid
        limit:
          type: integer
          default: 10
          maximum: 50
        filters:
          type: object
          properties:
            entidade_tipo:
              type: string
              enum: [mentorado, equipe, global]
            entidade_id:
              type: integer

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
        total:
          type: integer
        query_time_ms:
          type: number

    StorageStatus:
      type: object
      properties:
        overview:
          type: object
        queue:
          type: object
        providers:
          type: object

    ReprocessRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, erro, all]
          default: pendente

    # ── Copilot ───────────────────────────────────────────
    CopilotRequest:
      type: object
      required: [message]
      properties:
        mentee_id:
          type: integer
          nullable: true
        message:
          type: string
          example: "Quais são os próximos passos pra esse mentorado?"
        history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string

    CopilotResponse:
      type: object
      properties:
        reply:
          type: string
        context_used:
          type: boolean

    # ── Dossiê Production ─────────────────────────────────
    UpdateStageRequest:
      type: object
      required: [mentorado_slug, dossie_tipo, estagio]
      properties:
        mentorado_slug:
          type: string
          example: joao-oliveira
        dossie_tipo:
          type: string
          enum: [oferta, funil, conteudo]
        estagio:
          type: string
          enum:
            - pendente
            - producao_ia
            - revisao_mariza
            - revisao_kaique
            - revisao_queila
            - aprovado
            - publicado

    UpdateStageResponse:
      type: object
      properties:
        ok:
          type: boolean
        mentorado:
          type: string
        tipo:
          type: string
        estagio:
          type: string
        responsavel:
          type: string
        audit_event:
          type: object

    # ── Biblioteca ────────────────────────────────────────
    DocumentListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mentorado_id:
          type: integer
        tipo:
          type: string
        titulo:
          type: string
        deep_link_slug:
          type: string
        estagio:
          type: string
        created_at:
          type: string
          format: date-time

    DocumentFull:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mentorado_id:
          type: integer
        tipo:
          type: string
        titulo:
          type: string
        deep_link_slug:
          type: string
        estagio:
          type: string
        conteudo_md:
          type: string
          description: Conteúdo completo em Markdown
        created_at:
          type: string
          format: date-time

    # ── Welcome Flow ──────────────────────────────────────
    WelcomeRegisterRequest:
      type: object
      required: [nome, email]
      properties:
        nome:
          type: string
          example: Maria Silva
        email:
          type: string
          format: email
          example: maria@email.com
        whatsapp:
          type: string
          example: "5511999998888"

    WelcomeRegisterResponse:
      type: object
      properties:
        success:
          type: boolean
        credentials:
          type: object
          properties:
            email:
              type: string
            temp_password:
              type: string
              description: "Formato: {primeiroNome_lowercase}{últimos4digitos_whatsapp}"

    # ── ClickUp ───────────────────────────────────────────
    CommandCenterResponse:
      type: object
      properties:
        sprint:
          type: object
        total:
          type: integer
        subtasks_total:
          type: integer
        by_status:
          type: object
        by_member:
          type: object
        activity:
          type: array
          items:
            type: object
        concluidas:
          type: array
          items:
            type: object

    # ── System ────────────────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        zoom_configured:
          type: boolean
        gcal_configured:
          type: boolean
        supabase_configured:
          type: boolean
        sheets_configured:
          type: boolean
        openai_configured:
          type: boolean
        storage_search:
          type: boolean

    # ── Shared ────────────────────────────────────────────
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string

# ═══════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════

paths:
  # ── Auth ────────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Criar conta
      description: |
        Registra um novo usuário no sistema. Não requer autenticação.
        Retorna o par de tokens (access + refresh) junto com os dados do usuário.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Conta criada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Dados inválidos (email duplicado, senha curta, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Autentica o usuário e retorna par de tokens JWT.
        O access_token expira em 60 minutos.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Email ou senha ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar token
      description: |
        Gera um novo par de tokens a partir do refresh_token.
        Use quando o access_token expirar (60 min).
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Novo par de tokens gerado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: refresh_token ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: refresh_token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Solicitar reset de senha (stub)
      description: |
        Endpoint de reset de senha. Atualmente é um stub que sempre retorna 200
        independentemente do email fornecido.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Solicitação recebida (sempre retorna sucesso)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Retorna usuário atual
      description: Retorna os dados do usuário autenticado pelo JWT.
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Mentees ─────────────────────────────────────────────
  /api/mentees:
    get:
      tags: [Mentees]
      summary: Listar mentorados com email
      description: Retorna a lista completa de mentorados com id, nome e email.
      operationId: listMentees
      responses:
        "200":
          description: Lista de mentorados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenteeBasic"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mentees/portfolio:
    get:
      tags: [Mentees]
      summary: Carteira do consultor
      description: |
        Retorna mentorados atribuídos ao consultor autenticado,
        enriquecidos com health score, priority score, contadores de
        mensagens não lidas, tópicos negativos e atividade recente.
        Filtra automaticamente por `consultor_responsavel` = email do JWT.
      operationId: getPortfolio
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Carteira enriquecida
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenteePortfolioItem"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mentees/triage:
    get:
      tags: [Mentees]
      summary: Triage scores (server-side)
      description: |
        Retorna a lista de mentorados com scores de triage calculados
        no servidor, ordenados por score decrescente. Inclui fatores
        que contribuíram para o score.
      operationId: getMenteeTriage
      responses:
        "200":
          description: Lista de triage ordenada por score
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TriageItem"
        "500":
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/mentees/{id}/notes:
    get:
      tags: [Mentees]
      summary: Listar notas de um mentorado
      description: Retorna todas as notas associadas ao mentorado especificado.
      operationId: listMenteeNotes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID do mentorado
