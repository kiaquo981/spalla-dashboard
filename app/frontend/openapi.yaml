openapi: 3.0.3

info:
  title: Spalla Dashboard API
  version: "1.0.0"
  description: |
    API completa do **Spalla** — plataforma de gestao de mentorados da CASE Mentoring.
    O Spalla centraliza o acompanhamento de mentorados, comunicacao via WhatsApp,
    agendamento de calls, producao de dossies, busca semantica em documentos e
    integracao com ferramentas externas (ClickUp, Zoom, Google Calendar, Google Sheets).

    ---

    ## Autenticacao

    A API suporta dois metodos de autenticacao: **JWT Bearer** e **API Key**.

    ### Fluxo JWT (recomendado para frontend)

    O Spalla usa JWT personalizado com assinatura HMAC-SHA256. O fluxo completo:

    1. **Obter tokens** — Faca `POST /api/auth/login` com email e senha.
       A resposta inclui `access_token` (valido por 60 minutos) e `refresh_token`.
    2. **Enviar em cada request** — Inclua o header `Authorization: Bearer <access_token>`
       em todas as requests que exigem autenticacao.
    3. **Renovar quando expirar** — Quando receber 401, faca `POST /api/auth/refresh`
       com o `refresh_token` para obter um novo par de tokens.
    4. **Logout** — Descarte os tokens no cliente. Nao existe endpoint de logout server-side.

    ```bash
    # Exemplo completo
    TOKEN=$(curl -s -X POST https://web-production-2cde5.up.railway.app/api/auth/login \
      -H "Content-Type: application/json" \
      -d '{"email":"consultor@case.com.br","password":"s3cur3P@ss"}' \
      | jq -r '.access_token')

    curl -H "Authorization: Bearer $TOKEN" \
      https://web-production-2cde5.up.railway.app/api/mentees
    ```

    ### API Key (recomendado para integracoes)

    Para automacoes (N8N, webhooks, agentes de IA), use API Keys com prefixo `sk_spalla_`.
    Gere uma key via `POST /api/keys/generate` (requer JWT admin) e envie no header:

    ```
    X-API-Key: sk_spalla_a1b2c3d4e5f6...
    ```

    API Keys sao aceitas em todos os endpoints que aceitam Bearer JWT.
    A key completa e exibida **apenas uma vez** na criacao — armazene com seguranca.

    ---

    ## Formato de Erros

    Todos os erros seguem o mesmo formato JSON:

    ```json
    {
      "error": "Descricao curta do erro",
      "details": "Informacoes adicionais quando disponivel"
    }
    ```

    Os codigos HTTP mais comuns:
    - `400` — Dados invalidos ou campos obrigatorios ausentes
    - `401` — Token ausente, invalido ou expirado
    - `403` — Permissao insuficiente (ex: role admin necessario)
    - `404` — Recurso nao encontrado
    - `409` — Conflito de estado (ex: transicao invalida de dossie)
    - `500` — Erro interno do servidor

    ---

    ## Rate Limits

    Atualmente a API **nao impoe rate limits**. Isso pode mudar em versoes futuras.
    Recomendamos nao exceder 60 requests/minuto por API Key para garantir
    estabilidade do servico.

    ---

    ## Casos de Uso de Automacao

    A API foi projetada para ser consumida por:

    - **Frontend Spalla** — Dashboard Alpine.js com autenticacao JWT
    - **N8N Workflows** — Automacoes de onboarding, notificacoes, sincronizacao
    - **Agentes de IA** — Copilot contextual, producao de dossies, classificacao de mensagens
    - **WhatsApp Webhooks** — Recebimento e processamento de mensagens via Evolution API
    - **Google Sheets Sync** — Sincronizacao bidirecional de dados financeiros

    ---

    ## Tags

    Os endpoints estao organizados por dominio funcional. Consulte cada tag
    para entender o contexto de cada grupo de rotas.

servers:
  - url: https://web-production-2cde5.up.railway.app
    description: Producao (Railway)
  - url: http://localhost:9999
    description: Desenvolvimento local

tags:
  - name: Auth
    description: |
      Autenticacao e gestao de sessao de usuarios do Spalla.
      Inclui registro de novos usuarios, login com JWT, renovacao de tokens
      e consulta de dados do usuario autenticado. O sistema usa JWT HMAC-SHA256
      com access_token (60min) e refresh_token para renovacao transparente.
  - name: Mentees
    description: |
      Gestao completa de mentorados — o recurso central do Spalla.
      Permite listar mentorados, consultar a carteira enriquecida do consultor
      (com health score, prioridade e contadores), acessar triage scores,
      gerenciar notas de acompanhamento, atualizar fases da jornada e
      desativar mentorados (offboard). Suporta operacoes em lote (bulk update).
  - name: Mentee Groups
    description: |
      Agrupamento logico de mentorados para organizacao do consultor.
      Grupos permitem segmentar mentorados por turma, perfil ou qualquer
      criterio customizado. Cada grupo tem nome, cor e icone configuravel,
      e suporta adicao/remocao de membros individualmente.
  - name: WhatsApp
    description: |
      Inbox unificada e gestao de conversas WhatsApp (DM v2).
      Alimenta o painel de mensagens do Spalla com dados da view
      `vw_wa_mentee_inbox`, incluindo status de saude, contagem de nao-lidas,
      SLA de resposta e filtros avancados. Tambem gerencia midias, labels
      (topicos classificados por IA) e presenca em tempo real.
  - name: Scheduling
    description: |
      Agendamento completo de calls de mentoria — Zoom + Google Calendar + banco de dados.
      O endpoint principal (`/api/schedule-call`) orquestra todo o fluxo automaticamente:
      cria a reuniao no Zoom, o evento no Calendar e o registro na tabela `calls_mentoria`.
      Tambem oferece endpoints individuais para cada servico e listagem de calls agendadas.
  - name: Sheets Sync
    description: |
      Sincronizacao de dados financeiros entre Google Sheets e Supabase.
      Permite verificar o status da configuracao, disparar sync manual e
      acompanhar o resultado da ultima sincronizacao. Usado para manter
      dados de pagamentos e contratos atualizados no banco.
  - name: Media
    description: |
      Acesso a arquivos de midia do WhatsApp armazenados no Hetzner S3.
      Oferece dois modos: URL presignada (para downloads diretos) e
      stream/proxy (para reproducao de audio/video e exibicao de imagens
      diretamente no frontend sem expor credenciais S3 ao cliente).
  - name: Storage & Search
    description: |
      Pipeline de processamento de arquivos e busca semantica com pgvector.
      Recebe documentos (PDFs, audios transcritos, textos), extrai conteudo,
      gera chunks, cria embeddings e armazena no PostgreSQL para busca
      semantica, keyword ou hibrida. Inclui monitoramento de fila,
      reprocessamento de falhas e teste do pipeline.
  - name: Copilot
    description: |
      Assistente de IA contextual para consultores da CASE.
      Usa GPT-4o-mini com enriquecimento automatico de contexto do mentorado
      (historico de mensagens, notas, dossies) quando `mentee_id` e fornecido.
      Suporta historico de conversa para interacoes multi-turn e responde
      perguntas sobre proximo passo, estrategia e acompanhamento.
  - name: Dossie Production
    description: |
      Producao e controle de dossies seguindo uma state machine rigorosa.
      Cada dossie (oferta, funil ou conteudo) passa por estagios sequenciais:
      pendente, producao_ia, revisao_mariza, revisao_kaique, revisao_queila,
      aprovado e publicado. Transicoes invalidas sao bloqueadas com HTTP 409.
      Cada transicao gera um evento de auditoria automaticamente.
  - name: Biblioteca
    description: |
      Documentos e dossies publicados, prontos para consulta.
      A biblioteca e a camada de leitura dos dossies finalizados. Permite
      listar documentos com filtros por mentorado e tipo, buscar por
      deep_link_slug (para URLs amigaveis) e acessar o conteudo completo
      em Markdown. Alimenta a area "Meus Documentos" do mentorado.
  - name: Welcome Flow
    description: |
      Fluxo de onboarding automatizado para novos mentorados.
      Endpoint publico (sem autenticacao) e idempotente — pode ser chamado
      multiplas vezes para o mesmo email sem erro. Gera credenciais
      temporarias automaticamente no formato `{nome}{4digitos_whatsapp}`
      e registra o mentorado no sistema para acesso imediato ao Spalla.
  - name: Evolution / WhatsApp
    description: |
      Proxy transparente para a Evolution API — integracao server-to-server
      com WhatsApp. Injeta automaticamente o apikey configurado no servidor,
      permitindo que o frontend acesse a Evolution API sem expor credenciais.
      Suporta todos os metodos HTTP (GET, POST, PUT, DELETE) e encaminha
      path e body integralmente para a Evolution.
  - name: ClickUp
    description: |
      Integracao com ClickUp para gestao de tarefas e sprints da equipe CASE.
      O Command Center consolida tasks da sprint atual com totais, distribuicao
      por status e membro, atividade recente e tarefas concluidas.
      Tambem permite sincronizar subtasks do ClickUp para a tabela
      `god_task_subtasks` no Supabase.
  - name: API Keys
    description: |
      Gerenciamento de API keys para integracoes externas (N8N, webhooks, automacoes).
      Keys sao geradas com prefixo `sk_spalla_` e armazenadas como hash SHA-256.
      A key completa e exibida apenas uma vez na criacao — armazene com seguranca.
      Requer role `admin` para todas as operacoes. Keys podem ser listadas,
      geradas e revogadas (revogacao e irreversivel e imediata).
  - name: System
    description: |
      Health check, status de integracoes e informacoes gerais do servico.
      O endpoint raiz (`/`) retorna metadados da API, enquanto `/api/health`
      verifica a configuracao de todas as integracoes: Zoom, Google Calendar,
      Supabase, Google Sheets, OpenAI e Storage/Search. Util para
      monitoramento e dashboards de status.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT HMAC-SHA256. Obtido via POST /api/auth/login.
        TTL do access_token: 60 minutos.
        Renove via POST /api/auth/refresh com o refresh_token.

    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API Key para integracoes externas. Gerada via POST /api/keys/generate.
        Envie no header: `X-API-Key: sk_spalla_...`
        Aceito em todos os endpoints que aceitam Bearer JWT.

  schemas:
    # ── Auth ──────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Email do usuario. Deve ser unico no sistema.
          example: consultor@case.com.br
        password:
          type: string
          minLength: 6
          description: Senha com minimo de 6 caracteres.
          example: "s3cur3P@ss"
        fullName:
          type: string
          description: Nome completo do usuario exibido na interface.
          example: Maria Silva
        role:
          type: string
          enum: [equipe, admin, mentorado]
          default: equipe
          description: |
            Papel do usuario no sistema. `equipe` = consultor padrao,
            `admin` = acesso total incluindo API keys, `mentorado` = acesso limitado.
      example:
        email: mariza@case.com.br
        password: "ConsultorCase2026!"
        fullName: Mariza Oliveira
        role: equipe

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Email cadastrado no sistema.
          example: consultor@case.com.br
        password:
          type: string
          description: Senha do usuario.
          example: "s3cur3P@ss"
      example:
        email: consultor@case.com.br
        password: "s3cur3P@ss"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Token de renovacao obtido no login ou no ultimo refresh.
      example:
        refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c2VyXzEyMyIsInR5cGUiOiJyZWZyZXNoIiwiZXhwIjoxNzExMjAwMDAwfQ.abc123"

    ResetPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email da conta para a qual solicitar o reset de senha.
      example:
        email: consultor@case.com.br

    AuthTokenResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indica se a operacao foi bem-sucedida.
          example: true
        user:
          $ref: "#/components/schemas/UserSummary"
        access_token:
          type: string
          description: Token JWT para autenticacao. Valido por 60 minutos.
        refresh_token:
          type: string
          description: Token para renovacao. Valido por 30 dias.
        expires_in:
          type: integer
          description: Tempo de expiracao do access_token em segundos.
          example: 3600
      example:
        success: true
        user:
          id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          email: consultor@case.com.br
          full_name: Maria Silva
        access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhMWIyYzNkNCIsImVtYWlsIjoiY29uc3VsdG9yQGNhc2UuY29tLmJyIiwicm9sZSI6ImVxdWlwZSJ9.xyz789"
        refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhMWIyYzNkNCIsInR5cGUiOiJyZWZyZXNoIn0.abc456"
        expires_in: 3600

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador unico do usuario.
        email:
          type: string
          format: email
          description: Email do usuario.
        full_name:
          type: string
          description: Nome completo do usuario.
      example:
        id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        email: consultor@case.com.br
        full_name: Maria Silva

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
      example:
        user:
          id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          email: consultor@case.com.br
          full_name: Maria Silva

    # ── Mentees ───────────────────────────────────────────
    MenteeBasic:
      type: object
      properties:
        id:
          type: integer
          description: ID numerico do mentorado na tabela `mentorados`.
        nome:
          type: string
          description: Nome completo do mentorado.
          example: Dra. Juliene Azevedo
        email:
          type: string
          format: email
          description: Email principal do mentorado.
      example:
        id: 7
        nome: Dra. Juliene Azevedo
        email: juliene@clinicaazevedo.com.br

    MenteePortfolioItem:
      type: object
      description: |
        Mentorado enriquecido com metricas de acompanhamento.
        Usado na visao de carteira do consultor para priorizar atendimento.
      properties:
        id:
          type: integer
          description: ID numerico do mentorado.
        nome:
          type: string
          description: Nome completo do mentorado.
        email:
          type: string
          description: Email principal do mentorado.
        health:
          type: string
          enum: [green, yellow, red]
          description: |
            Indicador de saude do mentorado calculado automaticamente.
            `green` = tudo em dia, `yellow` = atencao necessaria,
            `red` = risco — requer acao imediata.
        priority_score:
          type: number
          format: float
          description: |
            Score de prioridade calculado no servidor (0-100). Quanto maior,
            mais urgente o atendimento. Combina inatividade, mensagens
            nao-lidas e topicos negativos.
        snoozed:
          type: boolean
          description: Se o mentorado esta silenciado temporariamente.
        days_since_activity:
          type: integer
          description: Dias desde a ultima atividade registrada (mensagem ou nota).
        unread_count:
          type: integer
          description: Quantidade de mensagens WhatsApp nao lidas.
        negative_topics:
          type: integer
          description: Quantidade de topicos negativos (problema, risco) nos ultimos 30 dias.
        recent_topics:
          type: array
          description: Lista dos slugs de topicos mais recentes classificados pela IA.
          items:
            type: string
            enum: [duvida, feedback, problema, pedido, risco, elogio, neutro]
      example:
        id: 7
        nome: Dra. Juliene Azevedo
        email: juliene@clinicaazevedo.com.br
        health: yellow
        priority_score: 72.5
        snoozed: false
        days_since_activity: 5
        unread_count: 3
        negative_topics: 1
        recent_topics: [duvida, feedback, problema]

    TriageItem:
      type: object
      description: |
        Item de triage com score calculado no servidor.
        Usado para priorizar atendimento automaticamente.
      properties:
        id:
          type: integer
          description: ID do mentorado.
        nome:
          type: string
          description: Nome do mentorado.
        score:
          type: number
          format: float
          description: Score de triage (0-100). Quanto maior, mais urgente.
        level:
          type: string
          description: Nivel de urgencia derivado do score.
          enum: [critico, alto, medio, baixo]
        factors:
          type: array
          description: Lista de fatores que contribuiram para o score.
          items:
            type: string
      example:
        id: 12
        nome: Thiago Monteiro
        score: 85.3
        level: critico
        factors:
          - "12 dias sem atividade"
          - "7 mensagens nao lidas"
          - "2 topicos de risco"

    NoteObject:
      type: object
      description: |
        Nota de acompanhamento vinculada a um mentorado.
        Pode ser checkpoint mensal, feedback de aula, registro de ligacao ou nota livre.
      properties:
        id:
          type: integer
          description: ID auto-incrementado da nota.
        mentorado_id:
          type: integer
          description: ID do mentorado associado.
        tipo:
          type: string
          enum:
            - checkpoint_mensal
            - feedback_aula
            - registro_ligacao
            - livre
            - nota_livre
          description: |
            Categoria da nota. `checkpoint_mensal` = revisao periodica,
            `feedback_aula` = pos-aula, `registro_ligacao` = pos-call,
            `livre`/`nota_livre` = anotacao generica.
        conteudo:
          type: object
          description: Conteudo da nota em formato JSON livre. A estrutura depende do tipo.
        tags:
          type: array
          items:
            type: string
          description: Tags de classificacao livre.
        created_at:
          type: string
          format: date-time
          description: Data/hora de criacao no formato ISO 8601.
        created_by:
          type: string
          description: Email do usuario que criou a nota.
      example:
        id: 145
        mentorado_id: 7
        tipo: registro_ligacao
        conteudo:
          resumo: "Juliene relatou dificuldade em precificar a mentoria. Orientei usar a formula de valor percebido."
          proximos_passos: "Enviar modelo de proposta comercial ate sexta."
          duracao_min: 35
        tags: [precificacao, oferta, urgente]
        created_at: "2026-03-20T14:30:00Z"
        created_by: mariza@case.com.br

    CreateNoteRequest:
      type: object
      required: [tipo]
      properties:
        tipo:
          type: string
          enum:
            - checkpoint_mensal
            - feedback_aula
            - registro_ligacao
            - livre
            - nota_livre
          description: Categoria da nota a ser criada.
        conteudo:
          type: object
          description: Conteudo livre da nota (JSON). Estrutura flexivel por tipo.
        tags:
          type: array
          items:
            type: string
          description: Tags opcionais para classificacao.
      example:
        tipo: checkpoint_mensal
        conteudo:
          resumo: "Mentorado progrediu bem na producao de conteudo. Bio atualizada, destaques reorganizados."
          pontos_positivos: ["Bio profissional", "Conteudo consistente"]
          pontos_atencao: ["Frequencia de stories baixa", "Funil de aula nao iniciado"]
          meta_proximo_mes: "Lancar funil de aula com turma piloto"
        tags: [checkpoint, conteudo, funil]

    OffboardRequest:
      type: object
      required: [motivo]
      properties:
        motivo:
          type: string
          enum: [reembolso, conclusao, cancelamento, outro]
          description: |
            Motivo do offboard. `reembolso` = solicitou devolucao,
            `conclusao` = completou a mentoria, `cancelamento` = desistiu,
            `outro` = motivo nao categorizado.
        obs:
          type: string
          description: Observacao adicional sobre o offboard (opcional).
      example:
        motivo: conclusao
        obs: "Mentorada completou os 6 meses com sucesso. Resultados excelentes no funil de aula."

    UpdateMenteeRequest:
      type: object
      description: |
        Campos atualizaveis de um mentorado. Todos os campos sao opcionais —
        envie apenas os que deseja alterar.
      properties:
        fase_jornada:
          type: string
          enum: [onboarding, execucao, resultado, renovacao, encerrado]
          description: |
            Fase atual da jornada do mentorado. `onboarding` = primeiras semanas,
            `execucao` = implementando estrategia, `resultado` = colhendo resultados,
            `renovacao` = periodo de renovacao, `encerrado` = finalizado.
        snoozed_until:
          type: string
          format: date-time
          description: Data/hora ate a qual o mentorado ficara silenciado (snooze).
        wa_status:
          type: string
          enum: [aguardando, em_andamento, bloqueado, resolvido]
          description: Status de atendimento no WhatsApp.
      example:
        fase_jornada: execucao
        wa_status: em_andamento

    BulkUpdateRequest:
      type: object
      required: [ids, updates]
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
          description: Lista de UUIDs dos mentorados a serem atualizados.
        updates:
          type: object
          properties:
            fase_jornada:
              type: string
              enum: [onboarding, execucao, resultado, renovacao, encerrado]
              description: Nova fase da jornada para todos os mentorados selecionados.
            snoozed_until:
              type: string
              format: date-time
              description: Data/hora de snooze para todos os mentorados selecionados.
      example:
        ids:
          - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
          - "c3d4e5f6-a7b8-9012-cdef-123456789012"
        updates:
          fase_jornada: execucao

    BulkUpdateResponse:
      type: object
      properties:
        updated:
          type: integer
          description: Quantidade de mentorados efetivamente atualizados.
        mentees:
          type: array
          description: Lista dos mentorados atualizados com seus dados apos a mudanca.
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              nome:
                type: string
              fase_jornada:
                type: string
      example:
        updated: 3
        mentees:
          - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            nome: Dra. Juliene Azevedo
            fase_jornada: execucao
          - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
            nome: Thiago Monteiro
            fase_jornada: execucao
          - id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
            nome: Danyella Truiz
            fase_jornada: execucao

    # ── Mentee Groups ─────────────────────────────────────
    MenteeGroup:
      type: object
      description: Grupo logico de mentorados para organizacao do consultor.
      properties:
        id:
          type: string
          format: uuid
          description: Identificador unico do grupo.
        nome:
          type: string
          description: Nome do grupo.
        cor:
          type: string
          description: Cor em hexadecimal para identificacao visual.
          example: "#6366f1"
        icon:
          type: string
          description: Nome do icone (Lucide icons).
          example: folder
        member_count:
          type: integer
          description: Quantidade de membros no grupo.
        member_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Lista de UUIDs dos mentorados membros.
      example:
        id: "f1e2d3c4-b5a6-7890-abcd-ef1234567890"
        nome: Turma Q1 2026
        cor: "#6366f1"
        icon: folder
        member_count: 4
        member_ids:
          - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          - "b2c3d4e5-f6a7-8901-bcde-f12345678901"

    CreateGroupRequest:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          description: Nome do grupo. Deve ser descritivo para facil identificacao.
          example: Turma Q1 2026
        cor:
          type: string
          default: "#6366f1"
          description: Cor hexadecimal para o badge visual do grupo.
          example: "#6366f1"
        icon:
          type: string
          default: folder
          description: Nome do icone Lucide (folder, users, star, etc).
          example: folder
      example:
        nome: Turma Q1 2026
        cor: "#10b981"
        icon: users

    AddMemberRequest:
      type: object
      required: [mentee_id]
      properties:
        mentee_id:
          type: string
          format: uuid
          description: UUID do mentorado a ser adicionado ao grupo.
      example:
        mentee_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    # ── WhatsApp ──────────────────────────────────────────
    InboxItem:
      type: object
      description: |
        Linha da view `vw_wa_mentee_inbox`. Representa um mentorado na inbox
        do WhatsApp com todas as metricas de atendimento.
      properties:
        id:
          type: integer
          description: ID do mentorado.
        nome:
          type: string
          description: Nome completo do mentorado.
        health_status:
          type: string
          enum: [verde, amarelo, vermelho, snoozed]
          description: |
            Status de saude visual. `verde` = resposta em dia, `amarelo` = atencao,
            `vermelho` = SLA estourado, `snoozed` = silenciado temporariamente.
        fase_jornada:
          type: string
          description: Fase atual da jornada (onboarding, execucao, resultado, renovacao).
        unread_count:
          type: integer
          description: Quantidade de mensagens nao lidas do mentorado.
        last_message_at:
          type: string
          format: date-time
          description: Data/hora da ultima mensagem recebida.
        sla_hours:
          type: number
          description: Horas desde a ultima mensagem nao respondida. Null se respondida.
        wa_phone:
          type: string
          description: Numero de WhatsApp no formato internacional (5511999887766).
        last_message_preview:
          type: string
          description: Preview das primeiras palavras da ultima mensagem.
        consultor_responsavel:
          type: string
          description: Email do consultor responsavel pelo mentorado.
      example:
        id: 7
        nome: Dra. Juliene Azevedo
        health_status: amarelo
        fase_jornada: execucao
        unread_count: 3
        last_message_at: "2026-03-23T18:45:00Z"
        sla_hours: 4.5
        wa_phone: "5511999887766"
        last_message_preview: "Oi, preciso de ajuda com a precifica..."
        consultor_responsavel: mariza@case.com.br

    WaMediaItem:
      type: object
      description: Arquivo de midia do WhatsApp armazenado no Hetzner S3.
      properties:
        id:
          type: integer
          description: ID do registro de midia.
        media_key:
          type: string
          description: Chave do objeto no S3 (path completo incluindo bucket prefix).
        mime_type:
          type: string
          description: Tipo MIME do arquivo (audio/ogg, image/jpeg, video/mp4, etc).
        file_name:
          type: string
          description: Nome original do arquivo quando disponivel.
        created_at:
          type: string
          format: date-time
          description: Data/hora de recebimento da midia.
      example:
        id: 892
        media_key: "media/audio/5511999887766/msg_20260323_184500.ogg"
        mime_type: "audio/ogg"
        file_name: "audio_20260323.ogg"
        created_at: "2026-03-23T18:45:00Z"

    LabelSummaryItem:
      type: object
      description: |
        Contagem agregada de um tipo de topico (label) classificado pela IA
        a partir das mensagens do WhatsApp.
      properties:
        slug:
          type: string
          description: Identificador unico do topico.
          enum: [duvida, feedback, problema, pedido, risco, elogio, neutro]
        name:
          type: string
          description: Nome legivel do topico para exibicao.
        color:
          type: string
          description: Cor hexadecimal associada ao topico.
        icon:
          type: string
          description: Nome do icone Lucide associado.
        count:
          type: integer
          description: Quantidade de mensagens classificadas com este topico no periodo.
      example:
        slug: duvida
        name: Duvida
        color: "#f59e0b"
        icon: help-circle
        count: 23

    PresenceItem:
      type: object
      description: Registro de presenca ativa de um usuario em uma conversa.
      properties:
        user_email:
          type: string
          format: email
          description: Email do usuario presente na conversa.
        user_name:
          type: string
          description: Nome do usuario para exibicao visual.
        last_seen:
          type: string
          format: date-time
          description: Ultima vez que o heartbeat foi registrado.
      example:
        user_email: mariza@case.com.br
        user_name: Mariza Oliveira
        last_seen: "2026-03-23T19:02:30Z"

    PresenceHeartbeatRequest:
      type: object
      required: [mentorado_id, user_email]
      properties:
        mentorado_id:
          type: integer
          description: ID do mentorado cuja conversa o usuario esta visualizando.
        user_email:
          type: string
          format: email
          description: Email do usuario que esta ativo na conversa.
        user_name:
          type: string
          description: Nome do usuario para exibicao aos outros consultores.
      example:
        mentorado_id: 7
        user_email: mariza@case.com.br
        user_name: Mariza Oliveira

    # ── Scheduling ────────────────────────────────────────
    ScheduleCallRequest:
      type: object
      required: [mentorado, data]
      properties:
        mentorado:
          type: string
          description: Nome do mentorado (usado como titulo da reuniao).
        data:
          type: string
          format: date
          description: Data da call no formato YYYY-MM-DD.
          example: "2026-04-01"
        mentorado_id:
          type: integer
          description: ID do mentorado no banco (opcional, mas recomendado para tracking).
        email:
          type: string
          format: email
          description: Email do mentorado para convite automatico no Calendar.
        tipo:
          type: string
          enum: [acompanhamento, diagnostico, planejamento, onboarding, estrategia]
          default: acompanhamento
          description: |
            Tipo da call. `acompanhamento` = check-in regular, `diagnostico` = primeira call,
            `planejamento` = definicao de estrategia, `onboarding` = boas-vindas,
            `estrategia` = revisao de rota.
        horario:
          type: string
          pattern: '^\d{2}:\d{2}$'
          default: "10:00"
          description: Horario no formato HH:MM (fuso de Sao Paulo).
          example: "10:00"
        duracao:
          type: integer
          default: 60
          description: Duracao em minutos. Padrao 60min.
        notas:
          type: string
          description: Notas para descricao do evento no Calendar.
      example:
        mentorado: "Dra. Juliene Azevedo"
        data: "2026-04-01"
        mentorado_id: 7
        email: juliene@clinicaazevedo.com.br
        tipo: acompanhamento
        horario: "10:00"
        duracao: 60
        notas: "Revisar resultados do funil de aula. Trazer metricas de conversao."

    CreateZoomMeetingRequest:
      type: object
      properties:
        topic:
          type: string
          description: Titulo da reuniao Zoom.
        start_time:
          type: string
          format: date-time
          description: Data/hora de inicio no formato ISO 8601.
        duration:
          type: integer
          default: 60
          description: Duracao em minutos.
        invitees:
          type: array
          items:
            type: string
            format: email
          description: Emails dos participantes para convite automatico.
      example:
        topic: "CASE Mentoria — Dra. Juliene Azevedo — Acompanhamento"
        start_time: "2026-04-01T13:00:00Z"
        duration: 60
        invitees:
          - juliene@clinicaazevedo.com.br

    CreateCalendarEventRequest:
      type: object
      properties:
        summary:
          type: string
          description: Titulo do evento no Google Calendar.
        start_iso:
          type: string
          format: date-time
          description: Inicio do evento em ISO 8601.
        end_iso:
          type: string
          format: date-time
          description: Fim do evento em ISO 8601.
        description:
          type: string
          description: Descricao do evento (aceita Markdown).
        attendees:
          type: array
          items:
            type: string
            format: email
          description: Emails dos participantes.
        location:
          type: string
          description: Local ou link da reuniao (normalmente link do Zoom).
      example:
        summary: "Mentoria CASE — Dra. Juliene Azevedo"
        start_iso: "2026-04-01T13:00:00Z"
        end_iso: "2026-04-01T14:00:00Z"
        description: "Call de acompanhamento. Pauta: resultados do funil de aula."
        attendees:
          - juliene@clinicaazevedo.com.br
          - queila@case.com.br
        location: "https://zoom.us/j/1234567890"

    # ── Sheets Sync ───────────────────────────────────────
    SheetsSyncStatus:
      type: object
      description: |
        Status da configuracao e ultimo resultado da sincronizacao
        entre Google Sheets e Supabase.
      properties:
        sheets_configured:
          type: boolean
          description: Se as credenciais do Google Sheets estao configuradas.
        last_sync:
          type: string
          format: date-time
          nullable: true
          description: Data/hora da ultima sincronizacao executada com sucesso.
        last_result:
          type: object
          nullable: true
          description: Resultado detalhado da ultima sincronizacao.
          properties:
            success:
              type: boolean
              description: Se a ultima sync foi bem-sucedida.
            synced:
              type: integer
              description: Quantidade de registros sincronizados.
            errors:
              type: array
              items:
                type: string
              description: Lista de erros encontrados durante a sync.
            duration_ms:
              type: number
              description: Duracao da sync em milissegundos.
        payments_sheet:
          type: string
          nullable: true
          description: ID da planilha de pagamentos configurada.
        contracts_sheet:
          type: string
          nullable: true
          description: ID da planilha de contratos configurada.
      example:
        sheets_configured: true
        last_sync: "2026-03-23T06:00:00Z"
        last_result:
          success: true
          synced: 47
          errors: []
          duration_ms: 3420
        payments_sheet: "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
        contracts_sheet: "1CyiNWt1YSB6oGNeKwCeEazHUnrsqumsbt85PhWF3vnt"

    # ── Storage & Search ──────────────────────────────────
    ProcessFileRequest:
      type: object
      properties:
        arquivo_id:
          type: integer
          description: ID do arquivo na tabela `sp_arquivos` a ser processado.
      example:
        arquivo_id: 234

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Texto da busca. Pode ser uma pergunta ou palavras-chave.
          example: "plano de acao mentorado"
        mode:
          type: string
          enum: [semantic, keyword, hybrid]
          default: hybrid
          description: |
            Modo de busca. `semantic` = similaridade de embeddings via pgvector,
            `keyword` = full-text search PostgreSQL, `hybrid` = combinacao ponderada
            dos dois (padrao e recomendado).
        limit:
          type: integer
          default: 10
          maximum: 50
          description: Quantidade maxima de resultados. Maximo 50.
        filters:
          type: object
          description: Filtros opcionais para restringir escopo da busca.
          properties:
            entidade_tipo:
              type: string
              enum: [mentorado, equipe, global]
              description: Tipo de entidade associada ao documento.
            entidade_id:
              type: integer
              description: ID da entidade para filtrar (ex. ID do mentorado).
      example:
        query: "como estruturar oferta de mentoria"
        mode: hybrid
        limit: 5
        filters:
          entidade_tipo: mentorado
          entidade_id: 7

    SearchResponse:
      type: object
      description: Resultado de uma busca semantica/keyword/hybrid.
      properties:
        results:
          type: array
          description: Lista de resultados ordenados por relevancia.
          items:
            type: object
            properties:
              id:
                type: integer
                description: ID do chunk no banco.
              arquivo_id:
                type: integer
                description: ID do arquivo de origem.
              arquivo_nome:
                type: string
                description: Nome do arquivo de origem.
              conteudo:
                type: string
                description: Trecho do texto que fez match.
              score:
                type: number
                format: float
                description: Score de relevancia (0-1). Maior = mais relevante.
              entidade_tipo:
                type: string
                description: Tipo da entidade associada.
              entidade_id:
                type: integer
                description: ID da entidade associada.
        total:
          type: integer
          description: Quantidade total de resultados encontrados.
        query_time_ms:
          type: number
          description: Tempo de execucao da query em milissegundos.
      example:
        results:
          - id: 1523
            arquivo_id: 234
            arquivo_nome: "dossie-oferta-juliene.md"
            conteudo: "A oferta da Dra. Juliene deve focar em 3 pilares: diagnostico individual, protocolos autorais e implementacao supervisionada..."
            score: 0.92
            entidade_tipo: mentorado
            entidade_id: 7
          - id: 1524
            arquivo_id: 235
            arquivo_nome: "manual-concepcao-oferta-v2.md"
            conteudo: "Toda oferta de mentoria precisa responder 4 perguntas: pra quem, qual problema, qual transformacao e por que voce..."
            score: 0.87
            entidade_tipo: global
            entidade_id: null
        total: 2
        query_time_ms: 145.3

    StorageStatus:
      type: object
      description: |
        Visao completa do sistema de storage: metricas gerais,
        fila de processamento e provedores configurados.
      properties:
        overview:
          type: object
          description: Metricas gerais do acervo.
          properties:
            total_arquivos:
              type: integer
              description: Quantidade total de arquivos registrados.
            total_chunks:
              type: integer
              description: Quantidade total de chunks gerados.
            total_embeddings:
              type: integer
              description: Quantidade total de embeddings armazenados.
            size_mb:
              type: number
              description: Tamanho total dos arquivos em MB.
        queue:
          type: object
          description: Estado da fila de processamento.
          properties:
            pendentes:
              type: integer
              description: Arquivos aguardando processamento.
            processando:
              type: integer
              description: Arquivos em processamento agora.
            erro:
              type: integer
              description: Arquivos que falharam no processamento.
            concluidos:
              type: integer
              description: Arquivos processados com sucesso.
        providers:
          type: object
          description: Provedores de servico configurados.
          properties:
            embedding:
              type: string
              description: Provedor de embeddings (openai, local, etc).
            storage:
              type: string
              description: Provedor de armazenamento de arquivos (hetzner_s3, local).
            vector_db:
              type: string
              description: Banco vetorial (pgvector).
      example:
        overview:
          total_arquivos: 156
          total_chunks: 4320
          total_embeddings: 4320
          size_mb: 234.7
        queue:
          pendentes: 3
          processando: 1
          erro: 2
          concluidos: 150
        providers:
          embedding: openai
          storage: hetzner_s3
          vector_db: pgvector

    ReprocessRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, erro, all]
          default: pendente
          description: |
            Filtro de quais arquivos reprocessar. `pendente` = apenas pendentes,
            `erro` = apenas com erro, `all` = todos que nao estao concluidos.
      example:
        status: erro

    # ── Copilot ───────────────────────────────────────────
    CopilotRequest:
      type: object
      required: [message]
      properties:
        mentee_id:
          type: integer
          nullable: true
          description: |
            ID do mentorado para enriquecimento de contexto. Quando fornecido,
            o Copilot busca historico de mensagens, notas e dossies do mentorado
            para responder com mais precisao.
        message:
          type: string
          description: Mensagem/pergunta do consultor para o Copilot.
          example: "Quais sao os proximos passos pra esse mentorado?"
        history:
          type: array
          description: Historico de mensagens anteriores para contexto multi-turn.
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
                description: Quem enviou a mensagem.
              content:
                type: string
                description: Conteudo da mensagem.
      example:
        mentee_id: 7
        message: "A Juliene esta com dificuldade na precificacao. O que posso sugerir?"
        history:
          - role: user
            content: "Resume a situacao da Juliene"
          - role: assistant
            content: "Dra. Juliene Azevedo esta na fase de execucao, com dossie de oferta aprovado. Ultimo contato ha 5 dias."

    CopilotResponse:
      type: object
      properties:
        reply:
          type: string
          description: Resposta gerada pelo Copilot com base no contexto disponivel.
        context_used:
          type: boolean
          description: Se o Copilot usou contexto do mentorado (mentee_id fornecido e dados encontrados).
      example:
        reply: "Com base no dossie de oferta da Juliene, sugiro usar a formula de valor percebido: o investimento do mentorado deve representar no maximo 10% do retorno esperado em 12 meses. Como ela atende medicos com faturamento medio de R$30k/mes, uma mentoria de R$7k tem payback em menos de 1 mes. Envie o modelo de proposta comercial com essa argumentacao."
        context_used: true

    # ── Dossie Production ─────────────────────────────────
    UpdateStageRequest:
      type: object
      required: [mentorado_slug, dossie_tipo, estagio]
      properties:
        mentorado_slug:
          type: string
          description: Slug do mentorado (formato kebab-case do nome).
          example: juliene-azevedo
        dossie_tipo:
          type: string
          enum: [oferta, funil, conteudo]
          description: |
            Tipo do dossie. `oferta` = dossie de concepcao de oferta,
            `funil` = dossie de funil de vendas, `conteudo` = dossie de posicionamento e conteudo.
        estagio:
          type: string
          enum:
            - pendente
            - producao_ia
            - revisao_mariza
            - revisao_kaique
            - revisao_queila
            - aprovado
            - publicado
          description: |
            Novo estagio. A transicao deve seguir a ordem sequencial:
            pendente → producao_ia → revisao_mariza → revisao_kaique →
            revisao_queila → aprovado → publicado.
            Saltos ou retrocessos retornam HTTP 409.
      example:
        mentorado_slug: juliene-azevedo
        dossie_tipo: oferta
        estagio: revisao_mariza

    UpdateStageResponse:
      type: object
      properties:
        ok:
          type: boolean
          description: Se a transicao foi realizada com sucesso.
        mentorado:
          type: string
          description: Nome do mentorado afetado.
        tipo:
          type: string
          description: Tipo do dossie atualizado.
        estagio:
          type: string
          description: Novo estagio apos a transicao.
        responsavel:
          type: string
          description: Responsavel pelo novo estagio (derivado automaticamente).
        audit_event:
          type: object
          description: Evento de auditoria gerado automaticamente.
          properties:
            id:
              type: integer
              description: ID do evento de auditoria.
            acao:
              type: string
              description: Acao registrada.
            de:
              type: string
              description: Estagio anterior.
            para:
              type: string
              description: Novo estagio.
            usuario:
              type: string
              description: Email do usuario que executou a transicao.
            created_at:
              type: string
              format: date-time
      example:
        ok: true
        mentorado: Dra. Juliene Azevedo
        tipo: oferta
        estagio: revisao_mariza
        responsavel: mariza@case.com.br
        audit_event:
          id: 342
          acao: transicao_estagio
          de: producao_ia
          para: revisao_mariza
          usuario: kaique@case.com.br
          created_at: "2026-03-23T15:30:00Z"

    # ── Biblioteca ────────────────────────────────────────
    DocumentListItem:
      type: object
      description: Resumo de documento para listagem (sem conteudo).
      properties:
        id:
          type: string
          format: uuid
          description: UUID do documento.
        mentorado_id:
          type: integer
          description: ID do mentorado associado.
        tipo:
          type: string
          description: Tipo do documento (oferta, funil, conteudo).
        titulo:
          type: string
          description: Titulo do documento para exibicao.
        deep_link_slug:
          type: string
          description: Slug unico para URL amigavel.
        estagio:
          type: string
          description: Estagio atual na state machine de producao.
        created_at:
          type: string
          format: date-time
          description: Data de criacao.
      example:
        id: "d1e2f3a4-b5c6-7890-abcd-ef1234567890"
        mentorado_id: 7
        tipo: oferta
        titulo: "Dossie de Oferta — Dra. Juliene Azevedo"
        deep_link_slug: "dossie-oferta-juliene-azevedo"
        estagio: publicado
        created_at: "2026-03-15T10:00:00Z"

    DocumentFull:
      type: object
      description: Documento completo incluindo conteudo em Markdown.
      properties:
        id:
          type: string
          format: uuid
          description: UUID do documento.
        mentorado_id:
          type: integer
          description: ID do mentorado associado.
        tipo:
          type: string
          description: Tipo do documento.
        titulo:
          type: string
          description: Titulo do documento.
        deep_link_slug:
          type: string
          description: Slug para URL amigavel.
        estagio:
          type: string
          description: Estagio atual.
        conteudo_md:
          type: string
          description: Conteudo completo do documento em Markdown.
        created_at:
          type: string
          format: date-time
          description: Data de criacao.
      example:
        id: "d1e2f3a4-b5c6-7890-abcd-ef1234567890"
        mentorado_id: 7
        tipo: oferta
        titulo: "Dossie de Oferta — Dra. Juliene Azevedo"
        deep_link_slug: "dossie-oferta-juliene-azevedo"
        estagio: publicado
        conteudo_md: "# Dossie de Oferta — Dra. Juliene Azevedo\n\n## Contexto\n\nDra. Juliene e medica dermatologista com 12 anos de experiencia...\n\n## Publico-Alvo\n\nMedicos e dentistas que faturam entre R$15k e R$30k/mes..."
        created_at: "2026-03-15T10:00:00Z"

    # ── Welcome Flow ──────────────────────────────────────
    WelcomeRegisterRequest:
      type: object
      required: [nome, email]
      properties:
        nome:
          type: string
          description: Nome completo do novo mentorado.
          example: Debora Cadore
        email:
          type: string
          format: email
          description: Email do mentorado (sera usado para login).
          example: debora@cadore.com.br
        whatsapp:
          type: string
          description: WhatsApp com DDI+DDD+numero (sem formatacao). Usado para gerar a senha temporaria.
          example: "5551998765432"
      example:
        nome: Debora Cadore
        email: debora@cadore.com.br
        whatsapp: "5551998765432"

    WelcomeRegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Se o registro foi realizado (ou mentorado ja existia).
        credentials:
          type: object
          description: Credenciais de acesso geradas automaticamente.
          properties:
            email:
              type: string
              description: Email de login.
            temp_password:
              type: string
              description: "Senha temporaria no formato: {primeiroNome_lowercase}{ultimos4digitos_whatsapp}"
      example:
        success: true
        credentials:
          email: debora@cadore.com.br
          temp_password: debora5432

    # ── ClickUp ───────────────────────────────────────────
    CommandCenterResponse:
      type: object
      description: |
        Visao consolidada do Command Center com dados da sprint atual do ClickUp.
        Usado para alimentar o dashboard de gestao de tarefas da equipe.
      properties:
        sprint:
          type: object
          description: Informacoes da sprint ativa.
          properties:
            id:
              type: string
              description: ID da lista/sprint no ClickUp.
            name:
              type: string
              description: Nome da sprint.
            start_date:
              type: string
              format: date
              description: Data de inicio da sprint.
            end_date:
              type: string
              format: date
              description: Data de fim da sprint.
        total:
          type: integer
          description: Total de tasks na sprint.
        subtasks_total:
          type: integer
          description: Total de subtasks na sprint.
        by_status:
          type: object
          description: Contagem de tasks agrupadas por status.
          properties:
            to_do:
              type: integer
              description: Tasks a fazer.
            in_progress:
              type: integer
              description: Tasks em andamento.
            review:
              type: integer
              description: Tasks em revisao.
            done:
              type: integer
              description: Tasks concluidas.
            blocked:
              type: integer
              description: Tasks bloqueadas.
        by_member:
          type: object
          description: Contagem de tasks agrupadas por membro da equipe.
          additionalProperties:
            type: integer
        activity:
          type: array
          description: Ultimas atividades registradas (mudancas de status, comentarios).
          items:
            type: object
            properties:
              task_id:
                type: string
                description: ID da task.
              task_name:
                type: string
                description: Nome da task.
              action:
                type: string
                description: Tipo de atividade (status_change, comment, etc).
              user:
                type: string
                description: Nome do usuario que realizou a acao.
              date:
                type: string
                format: date-time
                description: Data/hora da atividade.
        concluidas:
          type: array
          description: Lista de tasks concluidas na sprint.
          items:
            type: object
            properties:
              id:
                type: string
                description: ID da task.
              name:
                type: string
                description: Nome da task.
              assignee:
                type: string
                description: Responsavel.
              completed_at:
                type: string
                format: date-time
                description: Data/hora de conclusao.
      example:
        sprint:
          id: "901113377456"
          name: "Sprint 2 (3/23 - 3/29)"
          start_date: "2026-03-23"
          end_date: "2026-03-29"
        total: 18
        subtasks_total: 42
        by_status:
          to_do: 5
          in_progress: 7
          review: 3
          done: 2
          blocked: 1
        by_member:
          Kaique: 8
          Mariza: 6
          Gabriel: 4
        activity:
          - task_id: "abc123"
            task_name: "Implementar widget Zoom"
            action: status_change
            user: Kaique
            date: "2026-03-23T14:30:00Z"
          - task_id: "def456"
            task_name: "Corrigir login redirect"
            action: comment
            user: Mariza
            date: "2026-03-23T14:15:00Z"
        concluidas:
          - id: "ghi789"
            name: "Deploy WhatsApp sync v2"
            assignee: Gabriel
            completed_at: "2026-03-23T11:00:00Z"

    # ── System ────────────────────────────────────────────
    HealthResponse:
      type: object
      description: Status do sistema e configuracao de todas as integracoes.
      properties:
        status:
          type: string
          description: Status geral do sistema.
          example: ok
        zoom_configured:
          type: boolean
          description: Se as credenciais do Zoom estao configuradas.
        gcal_configured:
          type: boolean
          description: Se as credenciais do Google Calendar estao configuradas.
        supabase_configured:
          type: boolean
          description: Se a conexao com Supabase esta ativa.
        sheets_configured:
          type: boolean
          description: Se as credenciais do Google Sheets estao configuradas.
        openai_configured:
          type: boolean
          description: Se a API key da OpenAI esta configurada.
        storage_search:
          type: boolean
          description: Se o pipeline de storage/search esta operacional.
      example:
        status: ok
        zoom_configured: true
        gcal_configured: true
        supabase_configured: true
        sheets_configured: true
        openai_configured: true
        storage_search: true

    # ── Shared ────────────────────────────────────────────
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          description: Sempre `true` em caso de sucesso.
          example: true
      example:
        ok: true

    ErrorResponse:
      type: object
      description: |
        Formato padrao de erro retornado por todos os endpoints.
        O campo `error` sempre esta presente. O campo `details` e opcional.
      properties:
        error:
          type: string
          description: Descricao curta e legivel do erro.
        details:
          type: string
          description: Informacoes adicionais sobre o erro (quando disponivel).
      example:
        error: "Token expirado"
        details: "O access_token expirou. Use POST /api/auth/refresh com o refresh_token."

# ═══════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════

paths:
  # ── Auth ────────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Criar conta
      description: |
        Registra um novo usuario no sistema Spalla. Nao requer autenticacao.
        Retorna o par de tokens (access + refresh) junto com os dados do usuario,
        permitindo login imediato apos o registro. O email deve ser unico —
        tentar registrar um email ja existente retorna erro 400.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: mariza@case.com.br
              password: "ConsultorCase2026!"
              fullName: Mariza Oliveira
              role: equipe
      responses:
        "200":
          description: Conta criada com sucesso — tokens e dados do usuario retornados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              example:
                success: true
                user:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  email: mariza@case.com.br
                  full_name: Mariza Oliveira
                access_token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhMWIyIiwiZW1haWwiOiJtYXJpemFAY2FzZS5jb20uYnIiLCJyb2xlIjoiZXF1aXBlIn0.tok123"
                refresh_token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhMWIyIiwidHlwZSI6InJlZnJlc2gifQ.ref456"
                expires_in: 3600
        "400":
          description: Dados invalidos — email duplicado, senha curta ou campos ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Email ja cadastrado"
                details: "O email mariza@case.com.br ja esta registrado no sistema."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
                details: "Falha ao criar usuario no banco de dados."

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Autentica o usuario com email e senha, retornando um par de tokens JWT.
        O `access_token` expira em 60 minutos e deve ser enviado no header
        `Authorization: Bearer <token>` em todas as requests autenticadas.
        Quando expirar, use `POST /api/auth/refresh` com o `refresh_token`
        para obter um novo par sem precisar de login novamente.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: consultor@case.com.br
              password: "s3cur3P@ss"
      responses:
        "200":
          description: Login bem-sucedido — par de tokens retornado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              example:
                success: true
                user:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  email: consultor@case.com.br
                  full_name: Maria Silva
                access_token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhMWIyIiwiZW1haWwiOiJjb25zdWx0b3JAY2FzZS5jb20uYnIifQ.acc123"
                refresh_token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhMWIyIiwidHlwZSI6InJlZnJlc2gifQ.ref456"
                expires_in: 3600
        "400":
          description: Email ou senha ausente na requisicao
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campos obrigatorios ausentes"
                details: "Os campos 'email' e 'password' sao obrigatorios."
        "401":
          description: Credenciais invalidas — email nao encontrado ou senha incorreta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Credenciais invalidas"
                details: "Email ou senha incorretos."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
                details: "Falha na autenticacao."

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar token
      description: |
        Gera um novo par de tokens a partir de um `refresh_token` valido.
        Use este endpoint quando o `access_token` expirar (apos 60 minutos).
        O refresh_token antigo e invalidado e um novo e retornado — implemente
        rotacao de tokens no cliente para manter a sessao ativa indefinidamente.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refresh_token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhMWIyIiwidHlwZSI6InJlZnJlc2gifQ.ref456"
      responses:
        "200":
          description: Novo par de tokens gerado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
              example:
                success: true
                user:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  email: consultor@case.com.br
                  full_name: Maria Silva
                access_token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhMWIyIiwibmV3IjoidHJ1ZSJ9.newacc789"
                refresh_token: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhMWIyIiwidHlwZSI6InJlZnJlc2giLCJuZXciOnRydWV9.newref012"
                expires_in: 3600
        "400":
          description: Campo refresh_token ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'refresh_token' e obrigatorio."
        "401":
          description: Refresh token invalido, expirado ou ja utilizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
                details: "O refresh_token fornecido e invalido ou ja foi utilizado."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Solicitar reset de senha (stub)
      description: |
        Endpoint de reset de senha. Atualmente e um **stub** que sempre retorna 200
        independentemente do email fornecido, sem enviar email real. Implementado
        para que o frontend tenha o fluxo completo de autenticacao. A implementacao
        real com envio de email sera adicionada em versao futura.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
            example:
              email: consultor@case.com.br
      responses:
        "200":
          description: Solicitacao recebida (sempre retorna sucesso, mesmo se email nao existe)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
              example:
                success: true
                message: "Se o email estiver cadastrado, voce recebera instrucoes para redefinir sua senha."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Retorna usuario atual
      description: |
        Retorna os dados do usuario autenticado pelo JWT. Endpoint util para
        validar se o token ainda e valido e para obter informacoes do usuario
        logado (nome, email, ID) sem precisar decodificar o JWT no cliente.
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dados do usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
              example:
                user:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  email: consultor@case.com.br
                  full_name: Maria Silva
        "401":
          description: Token ausente, invalido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
                details: "O access_token fornecido e invalido ou expirou. Use POST /api/auth/refresh."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── Mentees ─────────────────────────────────────────────
  /api/mentees:
    get:
      tags: [Mentees]
      summary: Listar mentorados com email
      description: |
        Retorna a lista completa de mentorados cadastrados no sistema com ID,
        nome e email. Util para popular dropdowns, selects e buscas rapidas
        no frontend. Nao requer autenticacao — retorna apenas dados basicos.
        Para dados enriquecidos com metricas de acompanhamento, use `/api/mentees/portfolio`.
      operationId: listMentees
      responses:
        "200":
          description: Lista de mentorados com dados basicos (id, nome, email)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenteeBasic"
              example:
                - id: 7
                  nome: Dra. Juliene Azevedo
                  email: juliene@clinicaazevedo.com.br
                - id: 12
                  nome: Thiago Monteiro
                  email: thiago@monteiroodonto.com
                - id: 23
                  nome: Danyella Truiz
                  email: danyella@truiz.com.br
                - id: 31
                  nome: Paula Anna
                  email: paula@paulaanna.com.br
                - id: 35
                  nome: Renata Campos
                  email: renata@camposnutricao.com.br
                - id: 42
                  nome: Debora Cadore
                  email: debora@cadore.com.br
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
                details: "Falha ao consultar tabela mentorados."

  /api/mentees/portfolio:
    get:
      tags: [Mentees]
      summary: Carteira do consultor
      description: |
        Retorna mentorados atribuidos ao consultor autenticado, enriquecidos
        com health score, priority score, contadores de mensagens nao lidas,
        topicos negativos e atividade recente. Filtra automaticamente por
        `consultor_responsavel` = email extraido do JWT. Este e o endpoint
        principal da tela de carteira do Spalla — use para construir a
        visao priorizada de atendimento.
      operationId: getPortfolio
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Carteira enriquecida com metricas de acompanhamento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenteePortfolioItem"
              example:
                - id: 12
                  nome: Thiago Monteiro
                  email: thiago@monteiroodonto.com
                  health: red
                  priority_score: 92.1
                  snoozed: false
                  days_since_activity: 14
                  unread_count: 8
                  negative_topics: 3
                  recent_topics: [risco, problema, duvida]
                - id: 7
                  nome: Dra. Juliene Azevedo
                  email: juliene@clinicaazevedo.com.br
                  health: yellow
                  priority_score: 72.5
                  snoozed: false
                  days_since_activity: 5
                  unread_count: 3
                  negative_topics: 1
                  recent_topics: [duvida, feedback]
                - id: 42
                  nome: Debora Cadore
                  email: debora@cadore.com.br
                  health: green
                  priority_score: 15.0
                  snoozed: false
                  days_since_activity: 1
                  unread_count: 0
                  negative_topics: 0
                  recent_topics: [elogio, feedback]
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
                details: "Autenticacao necessaria para acessar a carteira."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentees/triage:
    get:
      tags: [Mentees]
      summary: Triage scores (server-side)
      description: |
        Retorna a lista de mentorados com scores de triage calculados no servidor,
        ordenados por score decrescente (mais urgente primeiro). Inclui os fatores
        que contribuiram para o score de cada mentorado. Ideal para dashboards
        de priorizacao e alertas automaticos. Nao requer autenticacao.
      operationId: getMenteeTriage
      responses:
        "200":
          description: Lista de triage ordenada por score decrescente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TriageItem"
              example:
                - id: 12
                  nome: Thiago Monteiro
                  score: 85.3
                  level: critico
                  factors:
                    - "14 dias sem atividade"
                    - "8 mensagens nao lidas"
                    - "3 topicos de risco"
                - id: 31
                  nome: Paula Anna
                  score: 62.0
                  level: alto
                  factors:
                    - "7 dias sem atividade"
                    - "4 mensagens nao lidas"
                - id: 7
                  nome: Dra. Juliene Azevedo
                  score: 35.8
                  level: medio
                  factors:
                    - "5 dias sem atividade"
                    - "1 topico negativo"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentees/{id}/notes:
    get:
      tags: [Mentees]
      summary: Listar notas de um mentorado
      description: |
        Retorna todas as notas associadas ao mentorado especificado, ordenadas
        da mais recente para a mais antiga. Inclui checkpoints mensais, feedbacks
        de aula, registros de ligacao e notas livres. Requer autenticacao JWT.
      operationId: listMenteeNotes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID numerico do mentorado na tabela `mentorados`.
      responses:
        "200":
          description: Lista de notas ordenadas por data decrescente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NoteObject"
              example:
                - id: 145
                  mentorado_id: 7
                  tipo: registro_ligacao
                  conteudo:
                    resumo: "Juliene relatou dificuldade em precificar a mentoria."
                    proximos_passos: "Enviar modelo de proposta comercial."
                    duracao_min: 35
                  tags: [precificacao, oferta]
                  created_at: "2026-03-20T14:30:00Z"
                  created_by: mariza@case.com.br
                - id: 132
                  mentorado_id: 7
                  tipo: checkpoint_mensal
                  conteudo:
                    resumo: "Bio atualizada, destaques reorganizados. Funil de aula pendente."
                    meta_proximo_mes: "Lancar funil de aula piloto"
                  tags: [checkpoint, conteudo]
                  created_at: "2026-03-01T10:00:00Z"
                  created_by: mariza@case.com.br
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
    post:
      tags: [Mentees]
      summary: Criar nota
      description: |
        Cria uma nova nota de acompanhamento para o mentorado. O campo `tipo`
        define a categoria da nota, e o `conteudo` aceita qualquer estrutura
        JSON. O `created_by` e preenchido automaticamente com o email do JWT.
        Use tags para classificar e facilitar buscas futuras.
      operationId: createMenteeNote
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID numerico do mentorado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
            example:
              tipo: registro_ligacao
              conteudo:
                resumo: "Call de diagnostico com Thiago. Problema principal: base fria, nenhum funil ativo."
                proximos_passos: "Montar funil de resgate de base (msgs A1-A5)."
                duracao_min: 45
              tags: [diagnostico, funil, urgente]
      responses:
        "201":
          description: Nota criada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteObject"
              example:
                id: 203
                mentorado_id: 12
                tipo: registro_ligacao
                conteudo:
                  resumo: "Call de diagnostico com Thiago. Problema principal: base fria, nenhum funil ativo."
                  proximos_passos: "Montar funil de resgate de base (msgs A1-A5)."
                  duracao_min: 45
                tags: [diagnostico, funil, urgente]
                created_at: "2026-03-24T09:15:00Z"
                created_by: mariza@case.com.br
        "400":
          description: Dados invalidos — tipo ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'tipo' e obrigatorio."
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentees/{id}/offboard:
    post:
      tags: [Mentees]
      summary: Desativar mentorado
      description: |
        Desativa (offboard) um mentorado com o motivo informado. A fase_jornada
        e atualizada para `encerrado` e o registro e mantido no banco para
        historico. Possiveis motivos: reembolso, conclusao, cancelamento ou outro.
        Esta acao nao pode ser desfeita via API — reativacao requer intervencao manual.
      operationId: offboardMentee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID numerico do mentorado a ser desativado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OffboardRequest"
            example:
              motivo: conclusao
              obs: "Mentorada completou os 6 meses. Funil de aula rodando, R$42k faturados."
      responses:
        "200":
          description: Mentorado desativado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  nome:
                    type: string
                  fase_jornada:
                    type: string
                  motivo_offboard:
                    type: string
                  offboard_at:
                    type: string
                    format: date-time
              example:
                id: 35
                nome: Renata Campos
                fase_jornada: encerrado
                motivo_offboard: conclusao
                offboard_at: "2026-03-24T10:00:00Z"
        "400":
          description: Motivo ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Motivo obrigatorio"
                details: "O campo 'motivo' e obrigatorio. Valores aceitos: reembolso, conclusao, cancelamento, outro."
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentees/{id}:
    patch:
      tags: [Mentees]
      summary: Atualizar campos do mentorado
      description: |
        Atualiza campos especificos de um mentorado. Todos os campos sao opcionais —
        envie apenas os que deseja alterar. Campos atualizaveis: fase da jornada,
        snooze (silenciar temporariamente ate uma data) e status do WhatsApp.
        Para atualizar multiplos mentorados de uma vez, use `PATCH /api/mentees/bulk`.
      operationId: updateMentee
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID numerico do mentorado a ser atualizado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenteeRequest"
            example:
              fase_jornada: execucao
              wa_status: em_andamento
      responses:
        "200":
          description: Mentorado atualizado com campos modificados
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  nome:
                    type: string
                  fase_jornada:
                    type: string
                  wa_status:
                    type: string
                  snoozed_until:
                    type: string
                    format: date-time
                    nullable: true
              example:
                id: 7
                nome: Dra. Juliene Azevedo
                fase_jornada: execucao
                wa_status: em_andamento
                snoozed_until: null
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentees/bulk:
    patch:
      tags: [Mentees]
      summary: Bulk update mentorados
      description: |
        Atualiza multiplos mentorados de uma vez com os mesmos valores.
        Recebe uma lista de UUIDs e os campos a serem atualizados.
        Util para mover toda uma turma de fase (ex: onboarding → execucao)
        ou aplicar snooze coletivo durante feriados.
      operationId: bulkUpdateMentees
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateRequest"
            example:
              ids:
                - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
              updates:
                fase_jornada: execucao
      responses:
        "200":
          description: Mentorados atualizados com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpdateResponse"
              example:
                updated: 2
                mentees:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    nome: Dra. Juliene Azevedo
                    fase_jornada: execucao
                  - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    nome: Thiago Monteiro
                    fase_jornada: execucao
        "400":
          description: IDs ou updates ausentes/invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campos obrigatorios ausentes"
                details: "Os campos 'ids' e 'updates' sao obrigatorios."
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── Mentee Groups ───────────────────────────────────────
  /api/mentee-groups:
    get:
      tags: [Mentee Groups]
      summary: Listar grupos com member counts
      description: |
        Retorna todos os grupos de mentorados com contagem de membros e lista
        de UUIDs dos mentorados associados. Use para renderizar a sidebar
        de grupos no frontend e para filtros rapidos na carteira.
      operationId: listMenteeGroups
      security:
