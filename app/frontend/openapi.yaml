      responses:
        "200":
          description: Lista de grupos com metadados e membros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenteeGroup"
              example:
                - id: "f1e2d3c4-b5a6-7890-abcd-ef1234567890"
                  nome: Turma Q1 2026
                  cor: "#6366f1"
                  icon: folder
                  member_count: 4
                  member_ids:
                    - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                - id: "e2f3a4b5-c6d7-8901-bcde-f12345678901"
                  nome: Mentorados VIP
                  cor: "#f59e0b"
                  icon: star
                  member_count: 2
                  member_ids:
                    - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
    post:
      tags: [Mentee Groups]
      summary: Criar grupo
      description: |
        Cria um novo grupo de mentorados com nome, cor e icone configuravel.
        O grupo e criado vazio — adicione membros individualmente com
        `POST /api/mentee-groups/{id}/members`. Nomes de grupo nao precisam
        ser unicos, mas recomenda-se usar nomes descritivos.
      operationId: createMenteeGroup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
            example:
              nome: Turma Q2 2026
              cor: "#10b981"
              icon: users
      responses:
        "201":
          description: Grupo criado com sucesso (vazio, sem membros)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenteeGroup"
              example:
                id: "g1h2i3j4-k5l6-7890-abcd-ef1234567890"
                nome: Turma Q2 2026
                cor: "#10b981"
                icon: users
                member_count: 0
                member_ids: []
        "400":
          description: Nome do grupo ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'nome' e obrigatorio."
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentee-groups/{id}:
    delete:
      tags: [Mentee Groups]
      summary: Deletar grupo
      description: |
        Remove um grupo de mentorados permanentemente. Os mentorados que eram
        membros do grupo nao sao afetados — apenas a associacao e removida.
        Esta acao e irreversivel. O grupo nao pode ser restaurado apos exclusao.
      operationId: deleteMenteeGroup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do grupo a ser deletado.
      responses:
        "200":
          description: Grupo deletado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
              example:
                ok: true
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "404":
          description: Grupo nao encontrado com o UUID fornecido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Grupo nao encontrado"
                details: "Nenhum grupo com o ID fornecido."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentee-groups/{id}/members:
    get:
      tags: [Mentee Groups]
      summary: Listar membros de um grupo
      description: |
        Retorna os mentorados que pertencem ao grupo especificado com seus dados
        basicos (id, nome, email). Util para renderizar a lista de membros
        na tela de detalhes do grupo.
      operationId: listGroupMembers
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do grupo.
      responses:
        "200":
          description: Lista de mentorados membros do grupo
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    nome:
                      type: string
                    email:
                      type: string
                      format: email
              example:
                - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  nome: Dra. Juliene Azevedo
                  email: juliene@clinicaazevedo.com.br
                - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  nome: Thiago Monteiro
                  email: thiago@monteiroodonto.com
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
    post:
      tags: [Mentee Groups]
      summary: Adicionar mentorado ao grupo
      description: |
        Adiciona um mentorado como membro do grupo especificado. Se o mentorado
        ja for membro, a operacao e idempotente (nao duplica). O mentorado pode
        pertencer a multiplos grupos simultaneamente.
      operationId: addGroupMember
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do grupo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
            example:
              mentee_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "201":
          description: Membro adicionado ao grupo com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  group_id:
                    type: string
                    format: uuid
                  mentee_id:
                    type: string
                    format: uuid
                  added:
                    type: boolean
              example:
                group_id: "f1e2d3c4-b5a6-7890-abcd-ef1234567890"
                mentee_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                added: true
        "400":
          description: Campo mentee_id ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'mentee_id' e obrigatorio."
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/mentee-groups/{id}/members/{mentee_id}:
    delete:
      tags: [Mentee Groups]
      summary: Remover mentorado do grupo
      description: |
        Remove um mentorado do grupo especificado. O mentorado nao e afetado —
        apenas a associacao com o grupo e removida. Se o mentorado nao for
        membro do grupo, retorna 404.
      operationId: removeGroupMember
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do grupo.
        - name: mentee_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do mentorado a ser removido do grupo.
      responses:
        "200":
          description: Membro removido do grupo com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
              example:
                ok: true
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "404":
          description: Mentorado nao e membro deste grupo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Membro nao encontrado"
                details: "O mentorado informado nao pertence a este grupo."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── WhatsApp ────────────────────────────────────────────
  /api/wa/inbox:
    get:
      tags: [WhatsApp]
      summary: Inbox de mentorados
      description: |
        Retorna a inbox unificada do WhatsApp com dados da view `vw_wa_mentee_inbox`.
        Cada item representa um mentorado com metricas de atendimento: status de
        saude, contagem de nao-lidas, SLA de resposta e fase da jornada.
        Suporta filtros por saude, fase, busca textual e ordenacao customizada.
        Este e o endpoint principal da tela de inbox do Spalla.
      operationId: getWaInbox
      parameters:
        - name: health_status
          in: query
          schema:
            type: string
            enum: [verde, amarelo, vermelho, snoozed]
          description: Filtrar por status de saude. `verde` = em dia, `vermelho` = SLA estourado.
        - name: fase_jornada
          in: query
          schema:
            type: string
            enum: [onboarding, execucao, resultado, renovacao]
          description: Filtrar por fase da jornada do mentorado.
        - name: search
          in: query
          schema:
            type: string
          description: Busca textual no nome do mentorado (case-insensitive, parcial).
        - name: sort
          in: query
          schema:
            type: string
            enum: [sla_desc, unread_desc, last_message_desc]
            default: sla_desc
          description: |
            Ordenacao dos resultados. `sla_desc` = mais urgente primeiro,
            `unread_desc` = mais nao-lidas primeiro,
            `last_message_desc` = mensagem mais recente primeiro.
      responses:
        "200":
          description: Inbox do WhatsApp com metricas de atendimento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxItem"
              example:
                - id: 12
                  nome: Thiago Monteiro
                  health_status: vermelho
                  fase_jornada: execucao
                  unread_count: 8
                  last_message_at: "2026-03-23T10:15:00Z"
                  sla_hours: 32.5
                  wa_phone: "5511988776655"
                  last_message_preview: "Preciso falar sobre o funil, nao..."
                  consultor_responsavel: mariza@case.com.br
                - id: 7
                  nome: Dra. Juliene Azevedo
                  health_status: amarelo
                  fase_jornada: execucao
                  unread_count: 3
                  last_message_at: "2026-03-23T18:45:00Z"
                  sla_hours: 4.5
                  wa_phone: "5511999887766"
                  last_message_preview: "Oi, preciso de ajuda com a precifica..."
                  consultor_responsavel: mariza@case.com.br
                - id: 42
                  nome: Debora Cadore
                  health_status: verde
                  fase_jornada: onboarding
                  unread_count: 0
                  last_message_at: "2026-03-24T08:00:00Z"
                  sla_hours: null
                  wa_phone: "5551998765432"
                  last_message_preview: "Obrigada pelo material! Ja comecei..."
                  consultor_responsavel: mariza@case.com.br
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/wa/media:
    get:
      tags: [WhatsApp]
      summary: Midia WA de mentorado
      description: |
        Retorna os arquivos de midia do WhatsApp associados ao mentorado especificado.
        Inclui audios, imagens, videos e documentos recebidos nas conversas.
        Para acessar o conteudo do arquivo, use `/api/media/presign` ou
        `/api/media/stream` com o `media_key` retornado.
      operationId: getWaMedia
      parameters:
        - name: mentee_id
          in: query
          required: true
          schema:
            type: integer
          description: ID numerico do mentorado para filtrar midias.
      responses:
        "200":
          description: Lista de arquivos de midia do mentorado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaMediaItem"
              example:
                - id: 892
                  media_key: "media/audio/5511999887766/msg_20260323_184500.ogg"
                  mime_type: "audio/ogg"
                  file_name: "audio_20260323.ogg"
                  created_at: "2026-03-23T18:45:00Z"
                - id: 893
                  media_key: "media/image/5511999887766/img_20260322_100000.jpg"
                  mime_type: "image/jpeg"
                  file_name: "foto_consultorio.jpg"
                  created_at: "2026-03-22T10:00:00Z"
        "400":
          description: Parametro mentee_id ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Parametro obrigatorio ausente"
                details: "O parametro 'mentee_id' e obrigatorio."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/wa/labels/summary:
    get:
      tags: [WhatsApp]
      summary: Contagem de labels por tipo de topico
      description: |
        Retorna a contagem de labels (topicos) classificados pela IA, agrupados
        por slug. Cada label tem nome, cor e icone para exibicao visual.
        Opcionalmente filtra por mentorado e janela de tempo em dias.
        Util para dashboards de sentimento e graficos de topicos.
      operationId: getWaLabelsSummary
      parameters:
        - name: mentee_id
          in: query
          schema:
            type: integer
          description: Filtrar contagem por mentorado especifico. Se omitido, retorna total geral.
        - name: days
          in: query
          schema:
            type: integer
            default: 30
          description: Janela de tempo em dias retroativos. Padrao 30 dias.
      responses:
        "200":
          description: Resumo de labels com contagem por topico
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabelSummaryItem"
              example:
                - slug: duvida
                  name: Duvida
                  color: "#f59e0b"
                  icon: help-circle
                  count: 23
                - slug: feedback
                  name: Feedback
                  color: "#10b981"
                  icon: message-circle
                  count: 18
                - slug: problema
                  name: Problema
                  color: "#ef4444"
                  icon: alert-triangle
                  count: 7
                - slug: pedido
                  name: Pedido
                  color: "#6366f1"
                  icon: gift
                  count: 5
                - slug: risco
                  name: Risco
                  color: "#dc2626"
                  icon: alert-octagon
                  count: 3
                - slug: elogio
                  name: Elogio
                  color: "#22c55e"
                  icon: heart
                  count: 12
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/wa/presence/{mentorado_id}:
    get:
      tags: [WhatsApp]
      summary: Presencas ativas (ultimos 60s)
      description: |
        Retorna os usuarios que estao ativamente visualizando a conversa
        com o mentorado especificado. Considera apenas heartbeats registrados
        nos ultimos 60 segundos. Util para evitar que dois consultores
        respondam a mesma mensagem simultaneamente.
      operationId: getWaPresence
      parameters:
        - name: mentorado_id
          in: path
          required: true
          schema:
            type: integer
          description: ID do mentorado cuja conversa queremos verificar presenca.
      responses:
        "200":
          description: Lista de usuarios ativos na conversa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresenceItem"
              example:
                - user_email: mariza@case.com.br
                  user_name: Mariza Oliveira
                  last_seen: "2026-03-23T19:02:30Z"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/wa/presence:
    post:
      tags: [WhatsApp]
      summary: Heartbeat de presenca
      description: |
        Registra que um usuario esta ativo na conversa de um mentorado.
        Deve ser chamado periodicamente pelo frontend (recomendado: a cada 30
        segundos) para manter a presenca visivel aos outros consultores.
        Se nao for renovado em 60 segundos, a presenca expira automaticamente.
      operationId: sendPresenceHeartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresenceHeartbeatRequest"
            example:
              mentorado_id: 7
              user_email: mariza@case.com.br
              user_name: Mariza Oliveira
      responses:
        "200":
          description: Presenca registrada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
              example:
                ok: true
        "400":
          description: Campos obrigatorios ausentes (mentorado_id e/ou user_email)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campos obrigatorios ausentes"
                details: "Os campos 'mentorado_id' e 'user_email' sao obrigatorios."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
    delete:
      tags: [WhatsApp]
      summary: Limpar presenca
      description: |
        Remove a presenca de um usuario na conversa de um mentorado.
        Chame quando o usuario sair da tela de conversa ou fechar o navegador
        (via `beforeunload` event). Se nao for chamado, a presenca expira
        automaticamente apos 60 segundos.
      operationId: clearPresence
      parameters:
        - name: mentorado_id
          in: query
          required: true
          schema:
            type: integer
          description: ID do mentorado cuja conversa o usuario esta saindo.
        - name: user_email
          in: query
          required: true
          schema:
            type: string
            format: email
          description: Email do usuario que esta saindo da conversa.
      responses:
        "200":
          description: Presenca removida com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
              example:
                ok: true
        "400":
          description: Parametros obrigatorios ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Parametros obrigatorios ausentes"
                details: "'mentorado_id' e 'user_email' sao obrigatorios."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── Scheduling ──────────────────────────────────────────
  /api/schedule-call:
    post:
      tags: [Scheduling]
      summary: Agendar call (orquestracao completa)
      description: |
        Orquestra a criacao completa de uma call de mentoria em tres etapas:
        1. Cria reuniao no Zoom com link automatico
        2. Cria evento no Google Calendar com convites para os participantes
        3. Registra no banco de dados (tabela `calls_mentoria`)

        Se qualquer etapa falhar, as anteriores ja executadas permanecem
        (nao ha rollback automatico). O resultado inclui dados de cada etapa.
        Este e o endpoint preferido — use os endpoints individuais apenas
        quando precisar de controle granular.
      operationId: scheduleCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleCallRequest"
            example:
              mentorado: "Dra. Juliene Azevedo"
              data: "2026-04-01"
              mentorado_id: 7
              email: juliene@clinicaazevedo.com.br
              tipo: acompanhamento
              horario: "10:00"
              duracao: 60
              notas: "Revisar resultados do funil de aula."
      responses:
        "200":
          description: Call agendada com sucesso em todas as etapas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  zoom:
                    type: object
                    description: Dados da reuniao Zoom criada.
                    properties:
                      id:
                        type: integer
                      join_url:
                        type: string
                        format: uri
                      start_url:
                        type: string
                        format: uri
                  calendar:
                    type: object
                    description: Dados do evento Calendar criado.
                    properties:
                      id:
                        type: string
                      htmlLink:
                        type: string
                        format: uri
                  db:
                    type: object
                    description: Registro inserido na tabela calls_mentoria.
                    properties:
                      id:
                        type: integer
                      mentorado:
                        type: string
                      data:
                        type: string
                        format: date
                      tipo:
                        type: string
              example:
                success: true
                zoom:
                  id: 98765432100
                  join_url: "https://zoom.us/j/98765432100?pwd=abc123"
                  start_url: "https://zoom.us/s/98765432100?zak=xyz789"
                calendar:
                  id: "cal_ev_20260401_juliene"
                  htmlLink: "https://calendar.google.com/calendar/event?eid=abc123"
                db:
                  id: 89
                  mentorado: "Dra. Juliene Azevedo"
                  data: "2026-04-01"
                  tipo: acompanhamento
        "400":
          description: Campos obrigatorios ausentes (mentorado e/ou data)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campos obrigatorios ausentes"
                details: "Os campos 'mentorado' e 'data' sao obrigatorios."
        "500":
          description: Erro na criacao (Zoom, Calendar ou banco)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao criar reuniao Zoom"
                details: "Zoom API retornou 401 — verifique as credenciais."

  /api/zoom/create-meeting:
    post:
      tags: [Scheduling]
      summary: Criar reuniao Zoom standalone
      description: |
        Cria uma reuniao no Zoom sem integrar com Calendar ou banco de dados.
        Retorna o link de acesso (join_url) e o link de host (start_url).
        Use quando precisar apenas do link Zoom sem a orquestracao completa.
      operationId: createZoomMeeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoomMeetingRequest"
            example:
              topic: "CASE Mentoria — Thiago Monteiro — Diagnostico"
              start_time: "2026-04-02T15:00:00Z"
              duration: 45
              invitees:
                - thiago@monteiroodonto.com
      responses:
        "200":
          description: Reuniao Zoom criada com links de acesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: ID numerico da reuniao no Zoom.
                  join_url:
                    type: string
                    format: uri
                    description: Link para participantes entrarem.
                  start_url:
                    type: string
                    format: uri
                    description: Link para o host iniciar a reuniao.
                  topic:
                    type: string
                    description: Titulo da reuniao.
              example:
                id: 98765432101
                join_url: "https://zoom.us/j/98765432101?pwd=def456"
                start_url: "https://zoom.us/s/98765432101?zak=uvw321"
                topic: "CASE Mentoria — Thiago Monteiro — Diagnostico"
        "500":
          description: Erro ao criar reuniao no Zoom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao criar reuniao Zoom"
                details: "Zoom API indisponivel."

  /api/calendar/create-event:
    post:
      tags: [Scheduling]
      summary: Criar evento no Google Calendar
      description: |
        Cria um evento no Google Calendar com os dados fornecidos. Envia
        convites automaticos para todos os emails listados em `attendees`.
        Use quando precisar apenas do evento Calendar sem Zoom ou banco.
      operationId: createCalendarEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEventRequest"
            example:
              summary: "Mentoria CASE — Paula Anna — Planejamento"
              start_iso: "2026-04-03T14:00:00Z"
              end_iso: "2026-04-03T15:00:00Z"
              description: "Call de planejamento. Pauta: definir funil de autoridade."
              attendees:
                - paula@paulaanna.com.br
                - queila@case.com.br
              location: "https://zoom.us/j/98765432102"
      responses:
        "200":
          description: Evento criado com sucesso no Google Calendar
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID do evento no Google Calendar.
                  htmlLink:
                    type: string
                    format: uri
                    description: Link para visualizar o evento no Calendar.
                  summary:
                    type: string
                    description: Titulo do evento.
                  start:
                    type: object
                    description: Horario de inicio.
                    properties:
                      dateTime:
                        type: string
                        format: date-time
                  end:
                    type: object
                    description: Horario de termino.
                    properties:
                      dateTime:
                        type: string
                        format: date-time
              example:
                id: "cal_ev_20260403_paula"
                htmlLink: "https://calendar.google.com/calendar/event?eid=def456"
                summary: "Mentoria CASE — Paula Anna — Planejamento"
                start:
                  dateTime: "2026-04-03T14:00:00Z"
                end:
                  dateTime: "2026-04-03T15:00:00Z"
        "500":
          description: Erro ao criar evento no Calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao criar evento"
                details: "Google Calendar API retornou erro de autorizacao."

  /api/calendar/events:
    get:
      tags: [Scheduling]
      summary: Listar proximos eventos
      description: |
        Retorna os proximos eventos do Google Calendar configurado na conta
        do Spalla. Os eventos sao ordenados por data de inicio crescente.
        Inclui calls de mentoria e outros eventos da agenda.
      operationId: listCalendarEvents
      responses:
        "200":
          description: Lista de proximos eventos do Calendar
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    summary:
                      type: string
                    start:
                      type: object
                      properties:
                        dateTime:
                          type: string
                          format: date-time
                    end:
                      type: object
                      properties:
                        dateTime:
                          type: string
                          format: date-time
                    htmlLink:
                      type: string
                      format: uri
              example:
                - id: "cal_ev_20260401_juliene"
                  summary: "Mentoria CASE — Dra. Juliene Azevedo"
                  start:
                    dateTime: "2026-04-01T13:00:00Z"
                  end:
                    dateTime: "2026-04-01T14:00:00Z"
                  htmlLink: "https://calendar.google.com/calendar/event?eid=abc123"
                - id: "cal_ev_20260403_paula"
                  summary: "Mentoria CASE — Paula Anna — Planejamento"
                  start:
                    dateTime: "2026-04-03T14:00:00Z"
                  end:
                    dateTime: "2026-04-03T15:00:00Z"
                  htmlLink: "https://calendar.google.com/calendar/event?eid=def456"
        "500":
          description: Erro ao listar eventos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao listar eventos"

  /api/calendar/event/{event_id}:
    delete:
      tags: [Scheduling]
      summary: Deletar evento do Calendar
      description: |
        Remove um evento do Google Calendar pelo ID. Os participantes
        sao notificados automaticamente sobre o cancelamento. Util para
        remanejar calls ou cancelar reunioes. A remocao e permanente.
      operationId: deleteCalendarEvent
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
          description: ID do evento no Google Calendar (retornado na criacao).
      responses:
        "200":
          description: Evento deletado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  event_id:
                    type: string
              example:
                ok: true
                event_id: "cal_ev_20260401_juliene"
        "404":
          description: Evento nao encontrado no Calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Evento nao encontrado"
                details: "Nenhum evento com o ID fornecido no Google Calendar."
        "500":
          description: Erro ao deletar evento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao deletar evento"

  /api/calls/upcoming:
    get:
      tags: [Scheduling]
      summary: Listar calls agendadas
      description: |
        Retorna as calls registradas na tabela `calls_mentoria`, ordenadas
        por data decrescente (mais recente primeiro). Limite de 500 registros.
        Inclui nome do mentorado, data, tipo, link do Zoom e status.
        Use para construir a visao de agenda do consultor.
      operationId: listUpcomingCalls
      responses:
        "200":
          description: Lista de calls agendadas ordenadas por data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: ID do registro na tabela calls_mentoria.
                    mentorado:
                      type: string
                      description: Nome do mentorado.
                    data:
                      type: string
                      format: date
                      description: Data da call.
                    tipo:
                      type: string
                      description: Tipo da call.
                    zoom_link:
                      type: string
                      description: Link de acesso do Zoom.
                    status:
                      type: string
                      description: Status da call (agendada, realizada, cancelada).
              example:
                - id: 89
                  mentorado: "Dra. Juliene Azevedo"
                  data: "2026-04-01"
                  tipo: acompanhamento
                  zoom_link: "https://zoom.us/j/98765432100"
                  status: agendada
                - id: 90
                  mentorado: "Thiago Monteiro"
                  data: "2026-04-02"
                  tipo: diagnostico
                  zoom_link: "https://zoom.us/j/98765432101"
                  status: agendada
                - id: 85
                  mentorado: "Debora Cadore"
                  data: "2026-03-22"
                  tipo: onboarding
                  zoom_link: "https://zoom.us/j/98765432099"
                  status: realizada
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── Sheets Sync ─────────────────────────────────────────
  /api/sheets/status:
    get:
      tags: [Sheets Sync]
      summary: Status da sincronizacao
      description: |
        Retorna informacoes sobre a configuracao e ultimo estado de
        sincronizacao entre Google Sheets e Supabase. Inclui IDs das
        planilhas configuradas, data da ultima sync e resultado detalhado.
        Use para verificar se a sync esta funcionando antes de depender dos dados.
      operationId: getSheetsSyncStatus
      responses:
        "200":
          description: Status completo da sincronizacao
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetsSyncStatus"
              example:
                sheets_configured: true
                last_sync: "2026-03-23T06:00:00Z"
                last_result:
                  success: true
                  synced: 47
                  errors: []
                  duration_ms: 3420
                payments_sheet: "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
                contracts_sheet: "1CyiNWt1YSB6oGNeKwCeEazHUnrsqumsbt85PhWF3vnt"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/sheets/sync:
    post:
      tags: [Sheets Sync]
      summary: Disparar sync manual
      description: |
        Dispara sincronizacao manual das planilhas Google Sheets (pagamentos
        e contratos) para o Supabase. A sync e sincrona — o endpoint aguarda
        a conclusao e retorna o resultado com quantidade de registros
        sincronizados e eventuais erros. Use com cautela em producao, pois
        pode ser lento dependendo do volume de dados.
      operationId: triggerSheetsSync
      responses:
        "200":
          description: Resultado da sincronizacao manual
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Se a sync completou sem erros criticos.
                  synced:
                    type: integer
                    description: Numero de registros sincronizados.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Lista de erros encontrados (linhas com dados invalidos, etc).
              example:
                success: true
                synced: 47
                errors: []
        "500":
          description: Erro na sincronizacao
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha na sincronizacao"
                details: "Google Sheets API retornou 403 — permissoes insuficientes."

  # ── Media ───────────────────────────────────────────────
  /api/media/presign:
    get:
      tags: [Media]
      summary: Gerar URL presignada S3
      description: |
        Gera uma URL presignada para acesso direto a um arquivo no Hetzner S3.
        A URL e valida por tempo limitado (tipicamente 15 minutos) e permite
        download direto sem necessidade de credenciais S3. Use para links
        de download ou quando o frontend precisa acessar o arquivo diretamente.
      operationId: getPresignedUrl
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: "Caminho completo do objeto no S3 (ex: media/audio/5511999887766/msg_123.ogg)."
      responses:
        "200":
          description: URL presignada gerada com validade temporaria
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    description: URL presignada para acesso direto ao arquivo.
                  bucket:
                    type: string
                    description: Nome do bucket S3.
                  endpoint:
                    type: string
                    description: Endpoint do provedor S3.
              example:
                url: "https://fsn1.your-objectstorage.com/spalla-media/media/audio/5511999887766/msg_123.ogg?X-Amz-Signature=abc123&X-Amz-Expires=900"
                bucket: spalla-media
                endpoint: "https://fsn1.your-objectstorage.com"
        "400":
          description: Parametro key ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Parametro obrigatorio ausente"
                details: "O parametro 'key' e obrigatorio."
        "500":
          description: Erro ao gerar URL presignada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao gerar URL"
                details: "Erro de conexao com S3."

  /api/media/stream:
    get:
      tags: [Media]
      summary: Stream de arquivo S3 (proxy)
      description: |
        Faz proxy/stream de um arquivo do Hetzner S3, retornando o conteudo
        binario com o content-type correto. Usado para reproducao de audio/video
        e exibicao de imagens diretamente no frontend sem expor credenciais S3
        ao cliente. O Content-Type e detectado automaticamente pelo MIME do arquivo.
      operationId: streamMedia
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: Caminho completo do objeto no S3.
      responses:
        "200":
          description: Conteudo binario do arquivo com Content-Type correto
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
            audio/*:
              schema:
                type: string
                format: binary
            video/*:
              schema:
                type: string
                format: binary
        "400":
          description: Parametro key ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Parametro obrigatorio ausente"
                details: "O parametro 'key' e obrigatorio."
        "404":
          description: Arquivo nao encontrado no S3
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Arquivo nao encontrado"
                details: "O objeto 'media/audio/xyz.ogg' nao existe no bucket."
        "500":
          description: Erro ao acessar S3
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao acessar S3"

  # ── Storage & Search ────────────────────────────────────
  /api/storage/process:
    post:
      tags: [Storage & Search]
      summary: Processar arquivo
      description: |
        Executa o pipeline completo de processamento de um arquivo:
        1. Download do arquivo do S3
        2. Extracao de texto (OCR para imagens, parser para PDFs, etc)
        3. Chunking (divisao em trechos de ~500 tokens)
        4. Geracao de embeddings (OpenAI text-embedding-3-small)
        5. Armazenamento no pgvector para busca semantica

        O processamento e sincrono — o endpoint aguarda a conclusao.
        Para arquivos grandes, pode levar varios segundos.
      operationId: processFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessFileRequest"
            example:
              arquivo_id: 234
      responses:
        "200":
          description: Arquivo processado com sucesso — chunks e embeddings gerados
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  chunks:
                    type: integer
                    description: Numero de chunks gerados.
                  arquivo_id:
                    type: integer
                    description: ID do arquivo processado.
              example:
                success: true
                chunks: 23
                arquivo_id: 234
        "400":
          description: Campo arquivo_id ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'arquivo_id' e obrigatorio."
        "500":
          description: Erro no pipeline de processamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha no processamento"
                details: "Erro ao gerar embeddings — OpenAI API indisponivel."

  /api/storage/search:
    post:
      tags: [Storage & Search]
      summary: Busca semantica/keyword/hybrid
      description: |
        Realiza busca nos documentos processados usando tres modos:
        - **semantic**: busca por similaridade de embeddings via pgvector
        - **keyword**: busca textual full-text search do PostgreSQL
        - **hybrid**: combinacao ponderada dos dois (padrao e recomendado)

        Aceita filtros opcionais por entidade (mentorado, equipe, global).
        Os resultados sao ordenados por score de relevancia decrescente.
        Ideal para o Copilot buscar contexto antes de responder.
      operationId: searchStorage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
            example:
              query: "como estruturar oferta de mentoria"
              mode: hybrid
              limit: 5
              filters:
                entidade_tipo: mentorado
                entidade_id: 7
      responses:
        "200":
          description: Resultados da busca ordenados por relevancia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                results:
                  - id: 1523
                    arquivo_id: 234
                    arquivo_nome: "dossie-oferta-juliene.md"
                    conteudo: "A oferta da Dra. Juliene deve focar em 3 pilares: diagnostico individual, protocolos autorais e implementacao supervisionada..."
                    score: 0.92
                    entidade_tipo: mentorado
                    entidade_id: 7
                  - id: 1524
                    arquivo_id: 235
                    arquivo_nome: "manual-concepcao-oferta-v2.md"
                    conteudo: "Toda oferta de mentoria precisa responder 4 perguntas: pra quem, qual problema, qual transformacao e por que voce..."
                    score: 0.87
                    entidade_tipo: global
                    entidade_id: null
                total: 2
                query_time_ms: 145.3
        "400":
          description: Query ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'query' e obrigatorio."
        "500":
          description: Erro na busca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha na busca"
                details: "Erro ao gerar embedding da query."

  /api/storage/files:
    get:
      tags: [Storage & Search]
      summary: Listar arquivos
      description: |
        Retorna a lista de arquivos registrados na tabela `sp_arquivos`.
        Pode ser filtrado por tipo de entidade e ID. Inclui metadados como
        nome, MIME type, status de processamento e data de criacao.
        Use para verificar quais arquivos ja foram processados.
      operationId: listStorageFiles
      parameters:
        - name: entidade_tipo
          in: query
          schema:
            type: string
            enum: [mentorado, equipe, global]
          description: Filtrar por tipo de entidade associada ao arquivo.
        - name: entidade_id
          in: query
          schema:
            type: integer
          description: Filtrar por ID da entidade (ex. ID do mentorado).
      responses:
        "200":
          description: Lista de arquivos com metadados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: ID do arquivo.
                    nome:
                      type: string
                      description: Nome do arquivo.
                    mime_type:
                      type: string
                      description: Tipo MIME do arquivo.
                    status:
                      type: string
                      description: Status de processamento (pendente, processando, concluido, erro).
                    entidade_tipo:
                      type: string
                      description: Tipo da entidade associada.
                    entidade_id:
                      type: integer
                      description: ID da entidade.
                    created_at:
                      type: string
                      format: date-time
                      description: Data de registro.
              example:
                - id: 234
                  nome: "dossie-oferta-juliene.md"
                  mime_type: "text/markdown"
                  status: concluido
                  entidade_tipo: mentorado
                  entidade_id: 7
                  created_at: "2026-03-15T10:00:00Z"
                - id: 235
                  nome: "manual-concepcao-oferta-v2.md"
                  mime_type: "text/markdown"
                  status: concluido
                  entidade_tipo: global
                  entidade_id: null
                  created_at: "2026-03-10T08:00:00Z"
                - id: 236
                  nome: "audio-call-thiago-20260320.ogg"
                  mime_type: "audio/ogg"
                  status: pendente
                  entidade_tipo: mentorado
                  entidade_id: 12
                  created_at: "2026-03-20T15:00:00Z"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/storage/status:
    get:
      tags: [Storage & Search]
      summary: Status do sistema de storage
      description: |
        Retorna informacoes completas sobre o estado do sistema de storage:
        visao geral (total de arquivos, chunks, embeddings, tamanho),
        fila de processamento (pendentes, em processamento, erros, concluidos)
        e provedores configurados (embedding, storage, vector_db).
        Use para monitoramento e diagnostico do pipeline.
      operationId: getStorageStatus
      responses:
        "200":
          description: Status completo do sistema de storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageStatus"
              example:
                overview:
                  total_arquivos: 156
                  total_chunks: 4320
                  total_embeddings: 4320
                  size_mb: 234.7
                queue:
                  pendentes: 3
                  processando: 1
                  erro: 2
                  concluidos: 150
                providers:
                  embedding: openai
                  storage: hetzner_s3
                  vector_db: pgvector
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/storage/test:
    post:
      tags: [Storage & Search]
      summary: Testar pipeline de embedding
      description: |
        Executa um teste do pipeline de embedding com um texto de amostra.
        Retorna as dimensoes do vetor gerado e informacoes do provedor
        configurado. Util para verificar se o OpenAI esta acessivel e
        o pgvector esta operacional antes de processar arquivos em lote.
      operationId: testStoragePipeline
      responses:
        "200":
          description: Resultado do teste — pipeline operacional
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Se o teste passou.
                  dimensions:
                    type: integer
                    description: Dimensoes do vetor de embedding gerado.
                  provider:
                    type: string
                    description: Provedor de embeddings em uso.
              example:
                success: true
                dimensions: 1536
                provider: "openai/text-embedding-3-small"
        "500":
          description: Erro no teste do pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha no teste"
                details: "OpenAI API retornou 429 — rate limit excedido."

  /api/storage/reprocess:
    post:
      tags: [Storage & Search]
      summary: Reprocessar arquivos com falha
      description: |
        Reprocessa arquivos que falharam ou estao pendentes. Seleciona por
        status: `pendente` (apenas pendentes), `erro` (apenas com falha)
        ou `all` (todos que nao estao concluidos). O reprocessamento executa
        o pipeline completo novamente para cada arquivo selecionado.
      operationId: reprocessFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReprocessRequest"
            example:
              status: erro
      responses:
        "200":
          description: Resultado do reprocessamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  reprocessed:
                    type: integer
                    description: Quantidade de arquivos reprocessados com sucesso.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Lista de erros encontrados durante o reprocessamento.
              example:
                success: true
                reprocessed: 2
                errors: []
        "500":
          description: Erro no reprocessamento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha no reprocessamento"

  # ── Copilot ─────────────────────────────────────────────
  /api/copilot:
    post:
      tags: [Copilot]
      summary: AI assistant contextual
      description: |
        Assistente de IA contextual para consultores da CASE. Utiliza GPT-4o-mini
        com enriquecimento automatico de contexto do mentorado quando `mentee_id`
        e fornecido — busca historico de mensagens WhatsApp, notas de acompanhamento,
        dossies publicados e dados do portfolio. Suporta historico de conversa
        para interacoes multi-turn. Responde perguntas sobre proximo passo,
        estrategia, historico e acompanhamento de mentorados.
      operationId: askCopilot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopilotRequest"
            example:
              mentee_id: 7
              message: "A Juliene esta com dificuldade na precificacao. O que posso sugerir?"
              history:
                - role: user
                  content: "Resume a situacao da Juliene"
                - role: assistant
                  content: "Dra. Juliene Azevedo esta na fase de execucao, com dossie de oferta aprovado."
      responses:
        "200":
          description: Resposta gerada pelo Copilot com contexto do mentorado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopilotResponse"
              example:
                reply: "Com base no dossie de oferta da Juliene, sugiro usar a formula de valor percebido: o investimento do mentorado deve representar no maximo 10% do retorno esperado em 12 meses. Como ela atende medicos com faturamento medio de R$30k/mes, uma mentoria de R$7k tem payback em menos de 1 mes."
                context_used: true
        "400":
          description: Campo message ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'message' e obrigatorio."
        "500":
          description: Erro na geracao da resposta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao gerar resposta"
                details: "OpenAI API indisponivel."

  # ── Dossie Production ───────────────────────────────────
  /api/ds/update-stage:
    post:
      tags: [Dossie Production]
      summary: Atualizar estagio de dossie (state machine)
      description: |
        Atualiza o estagio de producao de um dossie seguindo uma state machine
        sequencial. Transicoes devem seguir a ordem:

        `pendente` → `producao_ia` → `revisao_mariza` → `revisao_kaique` →
        `revisao_queila` → `aprovado` → `publicado`

        Transicoes fora de ordem (saltos ou retrocessos) retornam HTTP 409.
        Cada transicao gera automaticamente um evento de auditoria com
        usuario, timestamp e estagios de origem/destino.
        Requer JWT com role `admin` ou `equipe`.
      operationId: updateDossieStage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStageRequest"
            example:
              mentorado_slug: juliene-azevedo
              dossie_tipo: oferta
              estagio: revisao_mariza
      responses:
        "200":
          description: Estagio atualizado com evento de auditoria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStageResponse"
              example:
                ok: true
                mentorado: Dra. Juliene Azevedo
                tipo: oferta
                estagio: revisao_mariza
                responsavel: mariza@case.com.br
                audit_event:
                  id: 342
                  acao: transicao_estagio
                  de: producao_ia
                  para: revisao_mariza
                  usuario: kaique@case.com.br
                  created_at: "2026-03-23T15:30:00Z"
        "400":
          description: Campos obrigatorios ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campos obrigatorios ausentes"
                details: "Os campos 'mentorado_slug', 'dossie_tipo' e 'estagio' sao obrigatorios."
        "401":
          description: Token ausente, invalido ou role insuficiente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Permissao insuficiente"
                details: "Requer role 'admin' ou 'equipe'."
        "409":
          description: Transicao de estado invalida (salto ou retrocesso)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Transicao invalida"
                details: "Nao e possivel transicionar de 'pendente' para 'aprovado'. O proximo estagio valido e 'producao_ia'."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── Biblioteca ──────────────────────────────────────────
  /api/biblioteca:
    get:
      tags: [Biblioteca]
      summary: Listar documentos ou buscar por slug
      description: |
        Endpoint dual: sem parametros retorna a lista de documentos (sem conteudo)
        da view `vw_sp_documentos_lista`. Com o parametro `slug`, retorna um
        documento unico identificado pelo `deep_link_slug` — incluindo o conteudo
        completo em Markdown. Tambem aceita filtros por `mentee_id` e `tipo`.
        Ideal para a tela de biblioteca do mentorado e links compartilhaveis.
      operationId: listBiblioteca
      parameters:
        - name: slug
          in: query
          schema:
            type: string
          description: deep_link_slug do documento. Se fornecido, retorna documento unico com conteudo.
        - name: mentee_id
          in: query
          schema:
            type: integer
          description: Filtrar documentos por mentorado especifico.
        - name: tipo
          in: query
          schema:
            type: string
          description: Filtrar por tipo de documento (oferta, funil, conteudo).
      responses:
        "200":
          description: Lista de documentos (sem conteudo) ou documento unico (com conteudo)
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: "#/components/schemas/DocumentListItem"
                  - $ref: "#/components/schemas/DocumentFull"
              example:
                - id: "d1e2f3a4-b5c6-7890-abcd-ef1234567890"
                  mentorado_id: 7
                  tipo: oferta
                  titulo: "Dossie de Oferta — Dra. Juliene Azevedo"
                  deep_link_slug: "dossie-oferta-juliene-azevedo"
                  estagio: publicado
                  created_at: "2026-03-15T10:00:00Z"
                - id: "e2f3a4b5-c6d7-8901-bcde-f12345678901"
                  mentorado_id: 7
                  tipo: funil
                  titulo: "Dossie de Funil — Dra. Juliene Azevedo"
                  deep_link_slug: "dossie-funil-juliene-azevedo"
                  estagio: revisao_queila
                  created_at: "2026-03-18T14:00:00Z"
                - id: "f3a4b5c6-d7e8-9012-cdef-123456789012"
                  mentorado_id: 23
                  tipo: oferta
                  titulo: "Dossie de Oferta — Danyella Truiz"
                  deep_link_slug: "dossie-oferta-danyella-truiz"
                  estagio: publicado
                  created_at: "2026-03-05T09:00:00Z"
        "404":
          description: Documento nao encontrado (quando slug fornecido e nao existe)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Documento nao encontrado"
                details: "Nenhum documento com slug 'dossie-oferta-xyz'."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/biblioteca/{id}:
    get:
      tags: [Biblioteca]
      summary: Documento por UUID (com conteudo)
      description: |
        Retorna documento completo incluindo o campo `conteudo_md` com o
        conteudo em Markdown. Use para renderizar o dossie completo na
        tela de leitura. Para URLs amigaveis, prefira buscar por slug
        via `GET /api/biblioteca?slug=...`.
      operationId: getBibliotecaDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID do documento na tabela sp_documentos.
      responses:
        "200":
          description: Documento completo com conteudo Markdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentFull"
              example:
                id: "d1e2f3a4-b5c6-7890-abcd-ef1234567890"
                mentorado_id: 7
                tipo: oferta
                titulo: "Dossie de Oferta — Dra. Juliene Azevedo"
                deep_link_slug: "dossie-oferta-juliene-azevedo"
                estagio: publicado
                conteudo_md: "# Dossie de Oferta — Dra. Juliene Azevedo\n\n## Contexto\n\nDra. Juliene e medica dermatologista com 12 anos de experiencia..."
                created_at: "2026-03-15T10:00:00Z"
        "404":
          description: Documento nao encontrado com o UUID fornecido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Documento nao encontrado"
                details: "Nenhum documento com o UUID fornecido."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── Welcome Flow ────────────────────────────────────────
  /api/welcome-flow/register:
    post:
      tags: [Welcome Flow]
      summary: Onboarding de novo mentorado (publico, idempotente)
      description: |
        Registra um novo mentorado no fluxo de boas-vindas. Endpoint **publico**
        (sem autenticacao) e **idempotente** — se o email ja existe, retorna
        as credenciais existentes sem erro. Projetado para ser chamado por
        automacoes N8N e webhooks de WhatsApp.

        Gera senha temporaria automaticamente no formato:
        `{primeiroNome_lowercase}{ultimos4digitos_whatsapp}`

        Exemplo: nome "Debora Cadore", whatsapp "5551998765432" gera senha "debora5432".
      operationId: welcomeFlowRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WelcomeRegisterRequest"
            example:
              nome: Debora Cadore
              email: debora@cadore.com.br
              whatsapp: "5551998765432"
      responses:
        "200":
          description: Mentorado registrado com credenciais (ou retorno de credenciais existentes)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomeRegisterResponse"
              example:
                success: true
                credentials:
                  email: debora@cadore.com.br
                  temp_password: debora5432
        "400":
          description: Nome ou email ausente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campos obrigatorios ausentes"
                details: "Os campos 'nome' e 'email' sao obrigatorios."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  # ── Evolution / WhatsApp Proxy ──────────────────────────
  /api/evolution/instance-uuid:
    get:
      tags: [Evolution / WhatsApp]
      summary: Info da instancia Evolution
      description: |
        Retorna informacoes da instancia Evolution API configurada no servidor:
        nome da instancia e coordenadas do bucket S3 onde as midias sao
        armazenadas. Util para o frontend saber qual instancia esta ativa
        e construir paths de midia corretamente.
      operationId: getEvolutionInstanceInfo
      responses:
        "200":
          description: Informacoes da instancia Evolution configurada
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance_name:
                    type: string
                    description: Nome da instancia Evolution.
                  s3_bucket:
                    type: string
                    description: Nome do bucket S3 de midias.
                  s3_endpoint:
                    type: string
                    description: Endpoint do provedor S3.
              example:
                instance_name: "spalla-whatsapp"
                s3_bucket: "spalla-media"
                s3_endpoint: "https://fsn1.your-objectstorage.com"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"

  /api/evolution/{path}:
    get:
      tags: [Evolution / WhatsApp]
      summary: Proxy GET para Evolution API
      description: |
        Proxy transparente para a Evolution API (metodo GET). Injeta
        automaticamente o apikey configurado no servidor, permitindo que o
        frontend acesse a Evolution sem expor credenciais. O path e
        encaminhado integralmente para a URL base da Evolution.
      operationId: evolutionProxyGet
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: "Caminho da Evolution API (ex: instance/info, message/findMessages/spalla-whatsapp)."
      responses:
        "200":
          description: Resposta da Evolution API encaminhada transparentemente
          content:
            application/json:
              schema:
                type: object
              example:
                instance:
                  instanceName: "spalla-whatsapp"
                  state: "open"
                  profilePicUrl: "https://..."
        "500":
          description: Erro no proxy (Evolution indisponivel ou erro de rede)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha no proxy Evolution"
                details: "Connection refused — Evolution API indisponivel."
    post:
      tags: [Evolution / WhatsApp]
      summary: Proxy POST para Evolution API
      description: |
        Proxy transparente para a Evolution API (metodo POST). Injeta
        automaticamente o apikey e encaminha body + path. Use para enviar
        mensagens, criar grupos, e outras operacoes de escrita na Evolution.
      operationId: evolutionProxyPost
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Caminho da Evolution API.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Body encaminhado integralmente para a Evolution API.
            example:
              number: "5511999887766"
              text: "Ola! Sua mentoria CASE esta confirmada."
      responses:
        "200":
          description: Resposta da Evolution API encaminhada
          content:
            application/json:
              schema:
                type: object
              example:
                key:
                  id: "msg_abc123"
                  remoteJid: "5511999887766@s.whatsapp.net"
                message:
                  conversation: "Ola! Sua mentoria CASE esta confirmada."
                status: "PENDING"
        "500":
          description: Erro no proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha no proxy Evolution"
    put:
      tags: [Evolution / WhatsApp]
      summary: Proxy PUT para Evolution API
      description: |
        Proxy transparente para a Evolution API (metodo PUT). Injeta
        automaticamente o apikey e encaminha body + path. Use para
        atualizar configuracoes de instancia e webhooks.
      operationId: evolutionProxyPut
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Caminho da Evolution API.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Body encaminhado para a Evolution API.
            example:
              webhook:
                url: "https://web-production-2cde5.up.railway.app/api/webhook/evolution"
                enabled: true
      responses:
        "200":
          description: Resposta da Evolution API encaminhada
          content:
            application/json:
              schema:
                type: object
              example:
                webhook:
                  url: "https://web-production-2cde5.up.railway.app/api/webhook/evolution"
                  enabled: true
        "500":
          description: Erro no proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha no proxy Evolution"
    delete:
      tags: [Evolution / WhatsApp]
      summary: Proxy DELETE para Evolution API
      description: |
        Proxy transparente para a Evolution API (metodo DELETE). Injeta
        automaticamente o apikey e encaminha o path. Use para remover
        instancias, webhooks e outros recursos da Evolution.
      operationId: evolutionProxyDelete
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Caminho da Evolution API.
      responses:
        "200":
          description: Resposta da Evolution API encaminhada
          content:
            application/json:
              schema:
                type: object
              example:
                status: "deleted"
        "500":
          description: Erro no proxy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha no proxy Evolution"

  # ── ClickUp ────────────────────────────────────────────
  /api/clickup/command-center:
    get:
      tags: [ClickUp]
      summary: Sprint tasks, team summary, activity
      description: |
        Retorna visao consolidada do Command Center com dados da sprint atual
        do ClickUp. Inclui: informacoes da sprint, totais de tasks e subtasks,
        distribuicao por status e por membro, atividade recente (mudancas de
        status, comentarios) e lista de tarefas concluidas. Requer
        `CLICKUP_API_TOKEN` configurado no servidor. Endpoint principal
        do dashboard de gestao de tarefas da equipe.
      operationId: getClickUpCommandCenter
      responses:
        "200":
          description: Dados consolidados do Command Center
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandCenterResponse"
              example:
                sprint:
                  id: "901113377456"
                  name: "Sprint 2 (3/23 - 3/29)"
                  start_date: "2026-03-23"
                  end_date: "2026-03-29"
                total: 18
                subtasks_total: 42
                by_status:
                  to_do: 5
                  in_progress: 7
                  review: 3
                  done: 2
                  blocked: 1
                by_member:
                  Kaique: 8
                  Mariza: 6
                  Gabriel: 4
                activity:
                  - task_id: "abc123"
                    task_name: "Implementar widget Zoom"
                    action: status_change
                    user: Kaique
                    date: "2026-03-23T14:30:00Z"
                concluidas:
                  - id: "ghi789"
                    name: "Deploy WhatsApp sync v2"
                    assignee: Gabriel
                    completed_at: "2026-03-23T11:00:00Z"
        "500":
          description: Erro ao consultar ClickUp API
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha ao consultar ClickUp"
                details: "CLICKUP_API_TOKEN nao configurado ou invalido."

  /api/clickup/sync-subtasks:
    post:
      tags: [ClickUp]
      summary: Sync subtasks do ClickUp para god_task_subtasks
      description: |
        Busca subtasks do ClickUp e faz upsert na tabela `god_task_subtasks`
        do Supabase, sincronizando o estado das tarefas. Permite manter uma
        copia local das subtasks para consultas rapidas e dashboards sem
        depender da API do ClickUp em tempo real. A sync e incremental —
        atualiza registros existentes e insere novos.
      operationId: syncClickUpSubtasks
      responses:
        "200":
          description: Resultado da sincronizacao de subtasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Se a sync completou sem erros criticos.
                  synced:
                    type: integer
                    description: Quantidade de subtasks sincronizadas.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Lista de erros encontrados durante a sync.
              example:
                success: true
                synced: 42
                errors: []
        "500":
          description: Erro na sincronizacao com ClickUp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Falha na sincronizacao"
                details: "ClickUp API retornou 429 — rate limit excedido."

  # ── System ──────────────────────────────────────────────

  /:
    get:
      tags: [System]
      summary: Informacoes do servico
      description: |
        Retorna informacoes basicas da API Spalla: nome do servico, versao,
        status operacional, link para documentacao, endpoint de health check
        e contagem total de endpoints registrados. Nao requer autenticacao.
        Ideal como primeiro endpoint para verificar se a API esta acessivel.
      operationId: serviceInfo
      responses:
        "200":
          description: Informacoes gerais do servico Spalla
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    description: Nome do servico.
                    example: Spalla Dashboard API
                  version:
                    type: string
                    description: Versao atual da API.
                    example: "1.0.0"
                  status:
                    type: string
                    description: Status operacional.
                    example: operational
                  docs:
                    type: string
                    description: URL da documentacao interativa.
                    example: https://spalla-dashboard.vercel.app/api-docs
                  health:
                    type: string
                    description: Path do endpoint de health check.
                    example: /api/health
                  endpoints:
                    type: integer
                    description: Quantidade total de endpoints registrados.
                    example: 57
              example:
                service: Spalla Dashboard API
                version: "1.0.0"
                status: operational
                docs: https://spalla-dashboard.vercel.app/api-docs
                health: /api/health
                endpoints: 57

  /api/health:
    get:
      tags: [System]
      summary: Health check
      description: |
        Retorna o status geral do sistema e a configuracao de todas as
        integracoes externas: Zoom, Google Calendar, Supabase, Google Sheets,
        OpenAI e Storage/Search. Use para monitoramento automatizado e
        dashboards de status. Todos os campos booleanos indicam se as
        credenciais da respectiva integracao estao configuradas e validas.
      operationId: healthCheck
      responses:
        "200":
          description: Status do sistema e configuracao de integracoes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                zoom_configured: true
                gcal_configured: true
                supabase_configured: true
                sheets_configured: true
                openai_configured: true
                storage_search: true
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Erro interno"
                details: "Falha ao verificar status das integracoes."

  # ── API Keys ──────────────────────────────────────────────

  /api/keys:
    get:
      tags: [API Keys]
      summary: Listar API keys
      description: |
        Lista todas as API keys registradas no sistema sem revelar a key
        completa — mostra apenas o prefixo (primeiros 16 caracteres), label,
        role, status e timestamps. Requer JWT com role `admin`. Ideal para
        a tela de gerenciamento de integracoes no painel administrativo.
      operationId: listApiKeys
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de API keys (sem revelar a key completa)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      description: UUID da key.
                    key_prefix:
                      type: string
                      description: Prefixo da key (primeiros 16 caracteres).
                      example: "sk_spalla_a1b2..."
                    label:
                      type: string
                      description: Nome descritivo da key.
                      example: n8n-production
                    role:
                      type: string
                      enum: [integration, readonly]
                      description: Nivel de acesso da key.
                    active:
                      type: boolean
                      description: Se a key esta ativa.
                    created_at:
                      type: string
                      format: date-time
                      description: Data de criacao.
                    last_used_at:
                      type: string
                      format: date-time
                      nullable: true
                      description: Ultimo uso registrado (null se nunca usada).
                    created_by:
                      type: string
                      description: Email do admin que criou a key.
              example:
                - id: "k1e2y3a4-b5c6-7890-abcd-ef1234567890"
                  key_prefix: "sk_spalla_a1b2..."
                  label: n8n-production
                  role: integration
                  active: true
                  created_at: "2026-03-10T08:00:00Z"
                  last_used_at: "2026-03-24T07:45:00Z"
                  created_by: kaique@case.com.br
                - id: "k2e3y4a5-b6c7-8901-bcde-f12345678901"
                  key_prefix: "sk_spalla_x9y8..."
                  label: webhook-evolution
                  role: integration
                  active: true
                  created_at: "2026-03-15T12:00:00Z"
                  last_used_at: "2026-03-24T08:00:00Z"
                  created_by: kaique@case.com.br
                - id: "k3e4y5a6-b7c8-9012-cdef-123456789012"
                  key_prefix: "sk_spalla_q1w2..."
                  label: dashboard-readonly
                  role: readonly
                  active: false
                  created_at: "2026-03-01T10:00:00Z"
                  last_used_at: null
                  created_by: kaique@case.com.br
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "403":
          description: Requer role admin — acesso negado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Acesso negado"
                details: "Este endpoint requer role 'admin'."

  /api/keys/generate:
    post:
      tags: [API Keys]
      summary: Gerar nova API key
      description: |
        Gera uma nova API key para integracoes externas. A key completa
        (`sk_spalla_...`) e retornada **apenas uma vez** nesta resposta —
        armazene-a com seguranca pois nao sera possivel recupera-la depois.

        Roles disponiveis:
        - `integration` — acesso total (GET + POST + PATCH + DELETE)
        - `readonly` — apenas endpoints GET

        **Uso da key gerada:**
        ```
        curl -H "X-API-Key: sk_spalla_..." https://web-production-2cde5.up.railway.app/api/mentees
        ```

        Requer JWT com role `admin`.
      operationId: generateApiKey
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  description: Nome descritivo para identificar a key (ex. "n8n-production", "webhook-evolution").
                  example: n8n-production
                role:
                  type: string
                  enum: [integration, readonly]
                  default: integration
                  description: "Nivel de acesso. `integration` = acesso total, `readonly` = apenas GET."
            example:
              label: n8n-onboarding-flow
              role: integration
      responses:
        "201":
          description: API key gerada com sucesso — ARMAZENE A KEY, nao sera exibida novamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: Key completa — armazene com seguranca. Nao sera exibida novamente.
                    example: sk_spalla_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6
                  key_id:
                    type: string
                    format: uuid
                    description: UUID para referencia e revogacao.
                  key_prefix:
                    type: string
                    description: Prefixo da key para identificacao visual.
                    example: "sk_spalla_a1b2..."
                  label:
                    type: string
                    description: Label informado na criacao.
                  role:
                    type: string
                    description: Role atribuido a key.
                  warning:
                    type: string
                    description: Aviso de que a key nao sera exibida novamente.
                    example: "Store this key safely — it will NOT be shown again."
              example:
                key: "sk_spalla_a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6"
                key_id: "k4e5y6a7-b8c9-0123-defg-h12345678901"
                key_prefix: "sk_spalla_a1b2..."
                label: n8n-onboarding-flow
                role: integration
                warning: "Store this key safely — it will NOT be shown again."
        "400":
          description: Label ausente ou role invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Campo obrigatorio ausente"
                details: "O campo 'label' e obrigatorio."
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "403":
          description: Requer role admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Acesso negado"
                details: "Este endpoint requer role 'admin'."

  /api/keys/{key_id}:
    delete:
      tags: [API Keys]
      summary: Revogar API key
      description: |
        Desativa uma API key imediatamente. A revogacao e **irreversivel** —
        qualquer integracao usando esta key parara de funcionar instantaneamente.
        Verifique se nao ha automacoes ativas dependendo da key antes de revogar.
        Requer JWT com role `admin`.
      operationId: revokeApiKey
      security:
        - BearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID da key a ser revogada (obtido via GET /api/keys ou na criacao).
      responses:
        "200":
          description: Key revogada com sucesso — efeito imediato e irreversivel
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  key_id:
                    type: string
                    format: uuid
                    description: UUID da key revogada.
                  revoked:
                    type: boolean
                    example: true
              example:
                ok: true
                key_id: "k1e2y3a4-b5c6-7890-abcd-ef1234567890"
                revoked: true
        "401":
          description: Token ausente ou invalido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Token invalido"
        "403":
          description: Requer role admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Acesso negado"
                details: "Este endpoint requer role 'admin'."
        "404":
          description: Key nao encontrada com o UUID fornecido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Key nao encontrada"
                details: "Nenhuma API key com o ID fornecido."
