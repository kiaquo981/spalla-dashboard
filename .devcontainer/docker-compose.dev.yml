# ============================================================
# Spalla Dashboard — Dev Environment
# Uso:    docker compose -f .devcontainer/docker-compose.dev.yml up -d
# Parar:  docker compose -f .devcontainer/docker-compose.dev.yml down
# SSH:    ssh -p 2225 vscode@localhost
#
# Auth:   Na primeira vez, SSH no container e rode:
#         claude login && codex login && gemini login
#         Os tokens ficam salvos no volume 'cli-auth'
# ============================================================

services:
  spalla-dev:
    container_name: spalla-dev
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
    ports:
      - "2225:22" # SSH (Maestro)
      - "9999:9999" # Backend API
    volumes:
      # --- Repo ---
      - ..:/workspace
      # --- SSH ---
      - ~/.ssh/id_ed25519.pub:/home/vscode/.ssh/authorized_keys:ro
      # --- AI CLI auth (persistent named volume) ---
      - cli-auth-claude:/home/vscode/.claude
      - cli-auth-config:/home/vscode/.config
    working_dir: /workspace
    restart: unless-stopped
    env_file:
      - .env

volumes:
  cli-auth-claude:
    name: spalla-cli-auth-claude
  cli-auth-config:
    name: spalla-cli-auth-config
